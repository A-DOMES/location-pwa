<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
    }
    .login-box {
      background: #fff;
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      text-align: center;
      width: 100%;
      max-width: 420px;
    }
    .login-box h2 {
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 26px;
      font-weight: 500;
    }
    .login-box input {
      width: 100%;
      margin: 15px 0;
      padding: 16px;
      font-size: 16px;
      border: 1.5px solid #bdc3c7;
      border-radius: 8px;
      transition: border-color 0.3s;
    }
    .login-box input:focus {
      border-color: #2980b9;
      outline: none;
    }
    .login-box button {
      width: 100%;
      padding: 16px;
      margin-top: 25px;
      background: linear-gradient(to right, #3498db, #2980b9);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: background 0.3s;
    }
    .login-box button:hover {
      background: linear-gradient(to right, #2980b9, #1f6391);
    }
    #message { 
      margin-top: 20px; 
      font-weight: bold; 
      color: #e74c3c; 
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>📍 A-DOMES | 위치정보시스템</h2>
    <input type="text" id="id" placeholder="아이디">
    <input type="password" id="pw" placeholder="비밀번호">
    <button onclick="login()">로그인</button>
    <div id="message"></div>
  </div>

  <script>
    function login() {
      var id = document.getElementById("id").value.trim();
      var pw = document.getElementById("pw").value.trim();
      if (!id || !pw) {
        document.getElementById("message").style.color = "red";
        document.getElementById("message").innerText = "아이디와 비밀번호를 입력하세요.";
        return;
      }

      google.script.run.withSuccessHandler(function(result) {
        if (result.result === "success") {
          document.getElementById("message").style.color = "green";
          document.getElementById("message").innerText = "로그인 성공! 잠시 후 이동합니다...";

          // ✅ 로그인 상태 저장
          sessionStorage.setItem("loggedIn", "true");
          sessionStorage.setItem("role", result.role);

          setTimeout(() => {
            if (result.role === "RA") {
              window.location.href = "https://a-domes.github.io/location-app/admin.html";
            } else if (result.role === "RU") {
              window.location.href = "https://a-domes.github.io/location-pwa/user.html";
            }
          }, 1000);

        } else if (result.result === "blocked") {
          document.getElementById("message").style.color = "red";
          document.getElementById("message").innerText = "계정이 비활성화되었습니다.";
        } else {
          document.getElementById("message").style.color = "red";
          document.getElementById("message").innerText = "로그인 실패. 아이디/비밀번호 확인하세요.";
        }
      }).checkPassword(id, pw);
    }
  </script>
</body>
</html>
