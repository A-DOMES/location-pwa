<!DOCTYPE html>
<html> 
<head>
  <meta charset="UTF-8">
  <title>관리자 로그인</title>
  <!-- 📌 폰트 로딩 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <!-- 📌 Font Awesome 아이콘 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- 📌 PWA 매니페스트 연결 -->
  <link rel="manifest" href="/location-pwa/manifest.json">
  <meta name="theme-color" content="#2196F3">  
  
  <!-- 모바일 대응을 위한 뷰포트 태그 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* ---------------------- 기본 페이지 ---------------------- */
    body { display:flex; justify-content:center; align-items:center;
           height:100vh; background:linear-gradient(135deg,#74ebd5,#ACB6E5);
           font-family:'Noto Sans KR','Roboto',sans-serif; }

    /* ---------------------- 로그인 박스 ---------------------- */
    .login-box { background:#fff; padding:50px 40px; border-radius:20px;
                 box-shadow:0 12px 32px rgba(0,0,0,0.2); text-align:center;
                 width:100%; max-width:420px; animation:fadeIn 1s ease-in-out; }

    @keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

    .login-box h2 { margin-bottom:30px; color:#2c3e50; font-size:28px; font-weight:600; }

    /* ---------------------- 입력 그룹 ---------------------- */
    .input-group { margin-top:40px; width:100%; }

    .login-box label { display:block; text-align:left; font-size:16px; font-weight:500;
                       color:#2c3e50; margin-top:20px; }
    .login-box label i { margin-right:8px; vertical-align:middle; }
    .user-icon { color:#3498db; }
    .lock-icon { color:#27ae60; }

    .login-box input { width:100%; margin-top:8px; padding:16px; font-size:16px;
                       border:1.5px solid #bdc3c7; border-radius:10px;
                       transition:border-color .3s, box-shadow .3s; box-sizing:border-box; }
    .login-box input:focus { border-color:#2980b9; box-shadow:0 0 8px rgba(41,128,185,.3); outline:none; }

    /* ---------------------- 로그인 버튼 ---------------------- */
    .login-box button { width:100%; padding:18px; margin-top:40px;
                        background:linear-gradient(to right,#3498db,#2980b9);
                        color:#fff; border:none; border-radius:12px;
                        cursor:pointer; font-size:18px; font-weight:500;
                        transition:transform .2s, background .3s; }
    .login-box button:hover { background:linear-gradient(to right,#2980b9,#1f6391); transform:scale(1.03); }

    /* ---------------------- 모달 ---------------------- */
    .modal { display:none; position:fixed; z-index:999; left:0; top:0;
             width:100%; height:100%; background-color:rgba(0,0,0,.3); }

    .modal-content { position:relative; top:50%; transform:translateY(-50%);
                     background:#fff; padding:30px; border-radius:12px;
                     width:90%; max-width:400px; text-align:center;
                     box-shadow:0 4px 15px rgba(0,0,0,.3); margin:0 auto; }

    .modal-content h2 { font-size:24px; margin-bottom:15px; color:#2c3e50; }
    .modal-content p { font-size:18px; color:#555; }
  </style>
  
</head>   
<body>
  <!-- 📌 로그인 박스 -->
  <div class="login-box">
    <h2>📍 A-DOMES | 관리자 로그인</h2>

    <div class="input-group">
      <label for="id"><i class="fa fa-user user-icon"></i> 아이디</label>
      <input type="text" id="id" placeholder="아이디를 입력하세요">

      <label for="pw"><i class="fa fa-lock lock-icon"></i> 비밀번호</label>
      <input type="password" id="pw" placeholder="비밀번호를 입력하세요">
    </div>

    <button onclick="login()">로그인</button>
  </div>

  <!-- 📌 로그인 모달 -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>🔑 서버에 로그인 중입니다...</h2>
      <p>잠시만 기다려주세요.</p>
    </div>
  </div>

  <!-- config.js 먼저 불러오기 -->
  <script src="config.js"></script>

  <script>
    const USER_API_URL = CONFIG.USER_URL;

    function login() {
      const id = document.getElementById("id").value.trim();
      const pw = document.getElementById("pw").value.trim();

      if (!id || !pw) {
        alert("⚠️ 아이디와 비밀번호를 입력하세요.");
        return;
      }

      const modal = document.getElementById("loginModal");
      modal.style.display = "block";
      modal.querySelector("h2").innerText = "🔑 관리자 서버에 로그인 중입니다...";
      modal.querySelector("p").innerText = "잠시만 기다려주세요.";

      const callbackName = "handleLoginResponse";
      window[callbackName] = function(result) {
        console.log("로그인 응답:", result);
        if (result.result === "success") {
          modal.querySelector("h2").innerText = "✅ 로그인 성공!";
          modal.querySelector("p").innerText = "잠시 후 이동합니다...";

          sessionStorage.setItem("loggedIn", "true");
          sessionStorage.setItem("role", result.role);
          sessionStorage.setItem("userId", id);
          sessionStorage.setItem("token", result.token);
          localStorage.setItem("nickname", result.nickname);

          setTimeout(() => {
            if (result.role === "AD") {
              window.location.href = "admin.html";
            } else {
              window.location.href = "user.html";
            }
          }, 1500);
        } else if (result.result === "blocked") {
          modal.style.display = "none";
          alert("🚫 계정이 비활성화되었습니다.");
        } else {
          modal.style.display = "none";
          alert("❌ 로그인 실패: 아이디 또는 비밀번호가 잘못되었습니다.");
        }
      };

      const script = document.createElement("script");
      script.src = `${USER_API_URL}?mode=checkPassword&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}&callback=${callbackName}`;
      document.body.appendChild(script);
    }

    window.login = login;
  </script>

  <!-- ✅ 최신 서비스 워커 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/location-app/service-worker.js')
        .then(reg => console.log('Service Worker registered:', reg))
        .catch(err => console.error('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
