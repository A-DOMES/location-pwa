<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>관리자 로그인</title>
  <!-- 📌 폰트 로딩 -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    /* 📌 전체 화면 스타일 */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #74ebd5, #ACB6E5);
      font-family: 'Noto Sans KR', 'Roboto', sans-serif;
    }
    /* 📌 로그인 박스 스타일 */
    .login-box {
      background: #fff;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.2);
      text-align: center;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .login-box h2 {
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 28px;
      font-weight: 600;
    }
    .login-box input {
      width: 100%;
      margin: 15px 0;
      padding: 16px;
      font-size: 16px;
      border: 1.5px solid #bdc3c7;
      border-radius: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
      box-sizing: border-box;
    }
    .login-box input:focus {
      border-color: #2980b9;
      box-shadow: 0 0 8px rgba(41, 128, 185, 0.3);
      outline: none;
    }
    .login-box button {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: linear-gradient(to right, #3498db, #2980b9);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: transform 0.2s, background 0.3s;
    }
    .login-box button:hover {
      background: linear-gradient(to right, #2980b9, #1f6391);
      transform: scale(1.03);
    }
  </style>
</head>
<body>
  <!-- 📌 로그인 박스 -->
  <div class="login-box">
    <h2>📍 A-DOMES | 관리자 로그인</h2>
    <!-- 📌 아이디 입력 -->
    <input type="text" id="id" placeholder="아이디">
    <!-- 📌 비밀번호 입력 -->
    <input type="password" id="pw" placeholder="비밀번호">
    <!-- 📌 로그인 버튼 -->
    <button onclick="login()">로그인</button>
  </div>

  <script>
    // ✅ 사용자 서버 웹앱 URL (로그인/권한 판별 담당)
    const USER_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzysQqG0sCmLFA6HmTooqsxcmBqYT-b_JyQ8-xNXefqS0qAgT1aR1W5pph4N-HLY3vLeg/exec";

    // 📌 로그인 함수
    function login() {
      const id = document.getElementById("id").value.trim();
      const pw = document.getElementById("pw").value.trim();

      if (!id || !pw) {
        alert("⚠️ 아이디와 비밀번호를 입력하세요.");
        return;
      }

      // 📌 사용자 서버 API 호출 (로그인 요청)
      fetch(`${USER_WEBAPP_URL}?mode=checkPassword&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`)
        .then(response => response.json())
        .then(result => {
          if (result.result === "success") {
            // 📌 로그인 성공 시 세션에 저장
            sessionStorage.setItem("loggedIn", "true");
            sessionStorage.setItem("role", result.role);
            sessionStorage.setItem("userId", id);
            sessionStorage.setItem("token", result.token); // 📌 토큰 저장 (중요!)

            if (result.role === "AD") {
              alert("✅ 관리자 로그인 성공! 잠시 후 이동합니다...");
              setTimeout(() => {
                window.location.href = "https://a-domes.github.io/location-pwa/admin.html";
              }, 1000);
            } else if (result.role === "RU") {
              alert("✅ 사용자 로그인 성공! 잠시 후 이동합니다...");
              setTimeout(() => {
                window.location.href = "https://a-domes.github.io/location-app/user.html";
              }, 1000);
            }
          } else if (result.result === "blocked") {
            alert("🚫 계정이 비활성화되었습니다.");
          } else {
            alert("❌ 로그인 실패: 아이디 또는 비밀번호가 잘못되었습니다.");
          }
        })
        .catch(error => {
          console.error(error);
          alert("❌ 서버 오류: " + error.message);
        });
    }
  </script>
</body>
</html>
