<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자용 차량 위치 추적 지도</title>
  <!-- ✅ 발급받은 API 키를 넣으세요 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
  <style>
    body { font-family: Arial, sans-serif; font-size: 18px; margin: 0; text-align: center; }
    h2 { background-color: #2196F3; color: #fff; padding: 15px; margin: 0; }
    #map { width: 100%; height: 500px; margin-top: 20px; }
    button { margin: 10px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>관리자용 차량 위치 추적 지도</h2>
<!-- 현재 위치 보기 버튼 (지도 아이콘 그림) -->
    <img src="map-current.png" 
         alt="현재 위치 보기" 
         style="cursor:pointer; width:60px; height:60px; margin:10px;"
         onclick="mode='current'; refreshMap()">
    
    <!-- 전체 경로 보기 버튼 (경로 아이콘 그림) -->
    <img src="map-paths.png" 
         alt="전체 경로 보기" 
         style="cursor:pointer; width:60px; height:60px; margin:10px;"
         onclick="mode='paths'; refreshMap()">
  <div id="map"></div>

  <script>
    var map;
    var mode = "current"; // 기본 모드: 현재 위치

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: {lat: 36.5, lng: 127.5}, // 한국 중심 좌표
        zoom: 7
      });
    }

    function refreshMap() {
      initMap();
      // ✅ doGetData() 웹앱 URL로 교체하세요
      fetch("https://script.google.com/macros/s/AKfycbzX6BC6mGl1ealnB3S6HtWwDQH0CjNjXY_p49j9PT2834A4ItMDxgK1V5gDkNXi4ZD6Ww/exec")
        .then(response => response.json())
        .then(data => {
          if (mode === "current") {
            // 현재 위치만 표시
            data.forEach(item => {
              var markerColor = (item.status === "정상") 
                ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                : "http://maps.google.com/mapfiles/ms/icons/red-dot.png";

              new google.maps.Marker({
                position: {lat: parseFloat(item.lat), lng: parseFloat(item.lng)},
                map: map,
                icon: markerColor,
                title: item.name + " (" + item.status + ", " + item.time + ")"
              });
            });
          } else if (mode === "paths") {
            // 전체 이동 경로 표시
            var grouped = {};
            data.forEach(item => {
              if (!grouped[item.name]) grouped[item.name] = [];
              grouped[item.name].push({
                lat: parseFloat(item.lat),
                lng: parseFloat(item.lng)
              });
            });

            for (var name in grouped) {
              var pathLine = new google.maps.Polyline({
                path: grouped[name],
                geodesic: true,
                strokeColor: "#" + Math.floor(Math.random()*16777215).toString(16),
                strokeOpacity: 1.0,
                strokeWeight: 2
              });
              pathLine.setMap(map);
            }
          }
        })
        .catch(err => console.error("데이터 불러오기 실패:", err));
    }

    // 페이지 로드 시 기본 모드 실행
    window.onload = refreshMap;

    // ✅ 5분마다 자동 갱신
    setInterval(refreshMap, 5 * 60 * 1000);
  </script>
</body>
</html>
