<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자용 차량 위치 추적 지도</title>
  <!-- ✅ 발급받은 API 키를 넣으세요 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
</head>
<body>
  <h2>관리자용 차량 위치 추적 지도</h2>
  <div class="button-group">
    <img src="btn-current.png"
         alt="전체 사용자 위치 보기"
         style="cursor:pointer; width:60px; height:60px; margin:10px;"
         onclick="refreshMap()">
  </div>

  <div id="map" style="width:100%; height:500px;"></div>

  <script>
    var map;
    var mode = "current"; // 기본 모드: 현재 위치

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: {lat: 36.5, lng: 127.5},
        zoom: 7
      });
    }

    function refreshMap() {
      initMap();
      fetch("YOUR_SCRIPT_URL")
        .then(response => response.json())
        .then(data => {
          if (mode === "current") {
            // 현재 위치만 표시
            data.forEach(item => {
              var markerColor = (item.status === "정상") 
                ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                : "http://maps.google.com/mapfiles/ms/icons/red-dot.png";

              new google.maps.Marker({
                position: {lat: parseFloat(item.lat), lng: parseFloat(item.lng)},
                map: map,
                icon: markerColor,
                title: item.phone + " (" + item.status + ", " + item.time + ")"
              });
            });
          } else if (mode === "paths") {
            // 사용자별 경로 표시
            var grouped = {};
            data.forEach(item => {
              if (!grouped[item.phone]) grouped[item.phone] = [];
              grouped[item.phone].push({
                lat: parseFloat(item.lat),
                lng: parseFloat(item.lng)
              });
            });

            for (var phone in grouped) {
              var pathLine = new google.maps.Polyline({
                path: grouped[phone],
                geodesic: true,
                strokeColor: "#" + Math.floor(Math.random()*16777215).toString(16), // 랜덤 색상
                strokeOpacity: 1.0,
                strokeWeight: 2
              });
              pathLine.setMap(map);
            }
          }
        })
        .catch(err => console.error("데이터 불러오기 실패:", err));
    }

    // 특정 사용자 경로 표시
    function showUserPath(userPhone, data) {
      var userPath = data.filter(item => item.phone === userPhone)
                         .map(item => ({lat: parseFloat(item.lat), lng: parseFloat(item.lng)}));

      new google.maps.Polyline({
        path: userPath,
        geodesic: true,
        strokeColor: "#FF0000",
        strokeOpacity: 0.8,
        strokeWeight: 3,
        map: map
      });
    }

    window.onload = refreshMap;
    setInterval(refreshMap, 5 * 60 * 1000);
  </script>
</body>
</html>
