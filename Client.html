<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자용 차량 위치 추적 지도</title>
  <!-- ✅ 발급받은 API 키를 넣으세요 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
</head>
<body onload="initMap()">
  <h2>관리자용 차량 위치 추적 지도</h2>
  <div class="button-group">
    <!-- 지도 버튼 -->
    <img src="btn-current.png"
         alt="전체 사용자 위치 보기"
         style="cursor:pointer; width:60px; height:60px; margin:10px;"
         onclick="showAllUsers()">
  </div>

  <!-- 지도 표시 영역 -->
  <div id="map" style="width:100%; height:500px;"></div>

  <script>
    var map;
    var mode = "current"; // 기본 모드: 현재 위치

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: {lat: 36.5, lng: 127.5}, // 한국 중심 좌표
        zoom: 7
      });
    }

    function refreshMap() {
      initMap();
      // ✅ doGetData() 웹앱 URL로 교체하세요
      fetch("https://script.google.com/macros/s/AKfycbzX6BC6mGl1ealnB3S6HtWwDQH0CjNjXY_p49j9PT2834A4ItMDxgK1V5gDkNXi4ZD6Ww/exec")
        .then(response => response.json())
        .then(data => {
          if (mode === "current") {
            // 현재 위치만 표시
            data.forEach(item => {
              var markerColor = (item.status === "정상") 
                ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                : "http://maps.google.com/mapfiles/ms/icons/red-dot.png";

              var marker = new google.maps.Marker({
                position: {lat: parseFloat(item.lat), lng: parseFloat(item.lng)},
                map: map,
                icon: markerColor,
                title: item.name + " (" + item.status + ", " + item.time + ")"
              });

              // 마커 클릭 시 해당 사용자 경로 표시
              marker.addListener("click", () => {
                showUserPath(item.name, data);
              });
            });
          } else if (mode === "paths") {
            // 전체 이동 경로 표시
            var grouped = {};
            data.forEach(item => {
              if (!grouped[item.name]) grouped[item.name] = [];
              grouped[item.name].push({
                lat: parseFloat(item.lat),
                lng: parseFloat(item.lng)
              });
            });

            for (var name in grouped) {
              var pathLine = new google.maps.Polyline({
                path: grouped[name],
                geodesic: true,
                strokeColor: "#" + Math.floor(Math.random()*16777215).toString(16),
                strokeOpacity: 1.0,
                strokeWeight: 2
              });
              pathLine.setMap(map);
            }
          }
        })
        .catch(err => console.error("데이터 불러오기 실패:", err));
    }

    // 특정 사용자 경로 표시
    function showUserPath(userName, data) {
      var userPath = data.filter(item => item.name === userName)
                         .map(item => ({lat: parseFloat(item.lat), lng: parseFloat(item.lng)}));

      new google.maps.Polyline({
        path: userPath,
        geodesic: true,
        strokeColor: "#FF0000",
        strokeOpacity: 0.8,
        strokeWeight: 3,
        map: map
      });
    }

    // 페이지 로드 시 기본 모드 실행
    window.onload = refreshMap;

    // ✅ 5분마다 자동 갱신
    setInterval(refreshMap, 5 * 60 * 1000);
  </script>
</body>
</html>
