<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치 정보 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      background-color: #f0f4f8;
      margin: 0;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 12px;
    }
    .main-card {
      border: 2px solid #1976d2;
      border-radius: 12px;
      background: #fff;
      max-width: 900px;
      width: 100%;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
    header {
      background-color: #1976d2;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 14px;
    }
    header h2 {
      font-size: 28px;
      margin: 0;
      font-weight: bold;
      color: #fff;
    }
    .info-box {
      border: 2px solid #1976d2;
      border-radius: 10px;
      background-color: #e3f2fd;
      padding: 16px;
      margin: 16px 0;
      font-size: 20px;
      line-height: 1.5;
    }
    .info-box h3 {
      margin-top: 2px;
      margin-bottom: 2px;
      color: #1565c0;
      font-size: 20px;
    }
    .info-box p {
      margin-top: 2px;
      margin-bottom: 8px;
    }
    .desc {
      display: block;
      margin-top: 6px;
      font-size: 16px;
    }
    .warning {
      display: block;
      margin-top: 4px;
      font-size: 18px;
      color: #d32f2f;
      font-weight: bold;
      white-space: nowrap;
    }

    /* 입력창 + 지도 버튼 그룹 */
    .input-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    /* 텍스트박스: 현재 크기 유지 + 우측으로 살짝 이동 */
    input[type="text"] {
      margin-left: 16px;   /* 좌측에서 살짝 띄워서 우측으로 이동한 효과 */
      /* 필요에 따라 15px, 20px 등으로 조정 가능 */
      height: 40px;
      font-size: 18px;
      padding: 8px;
      border: 2px solid #1976d2;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .map-btn {
      width: 90px;
      height: 90px;
      cursor: pointer;
    }

    /* 위치 전송 / 해제 버튼 */
    #sendBtn, #stopBtn {
      width: 100%;
      height: 50px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      margin-bottom: 6px;
    }
    
    #sendBtn {
      background: linear-gradient(to bottom, #42a5f5, #1976d2);
    }
    
    #stopBtn {
      background: linear-gradient(to bottom, #ef5350, #f44336);
      margin-top: 4px;   /* 해제 버튼을 조금 더 아래로 */
    }


    /* 모달창 */
    .modal {
      position: fixed;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4);
      z-index: 1000;
    }
    
    /* 모달 내용 */
    .modal-content {
      background-color: #fefefe;
      padding: 20px;
      border: 2px solid #2196F3;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
      text-align: center;
      font-size: 18px;
      background: linear-gradient(135deg, #e3f2fd, #bbdefb); /* 요청하신 색상 */
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    
      /* 위치 조정: margin-top으로 상단에서 중앙 방향으로 내림 */
      margin: 50% auto;   /* auto는 좌우 중앙, 20%는 위에서 내려오는 정도 */
    }

    /* 모바일 대응 */
    @media (max-width:767px) {
      header h2 { font-size: 24px; }
      .info-box { font-size: 16px; }
      .map-btn { width: 70px; height: 70px; }
      input[type="text"] { font-size: 16px; height: 36px; max-width: 65%; }
      #sendBtn, #stopBtn { font-size: 16px; height: 46px; }
      .warning { font-size: 15px; }
    }
  </style>
</head>

<body>
<div class="main-card">
  <header>
    <h2>A-DOMES | 위치 전송</h2>
  </header>

  <!-- 위치 전송 영역 -->
  <form id="locationForm" method="POST">
    <div class="center-wrapper">
      <div class="inner-group">
        <!-- 📌 닉네임이 자동으로 채워짐 -->
        <input type="text" name="phone" id="phone" 
               placeholder="회원가입 닉네임 또는 전화번호를 입력하세요">
        <div class="button-group">
          <!-- ✅ 처음엔 링크는 유지, 공간도 유지 -->
          <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden; pointer-events:none;">
            <img src="btn-current.png" alt="지도 버튼" class="map-btn">
          </a>
          <!-- ✅ 버튼 클릭 시 admin.html에서 빈값 검증 후 서버 호출 -->
          <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
          <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
    </form>
  </section>

  <!-- 앱 목적 + 주요 기능 (아래로 이동) -->
  <section class="info-box">
    <h3>앱 목적(관리자)</h3>
    <p>
      전국 어디든 목적지를 검색해 안전하게 길을 안내받을 수 있습니다.<br>
      내 위치를 기록하고 회원끼리 서로의 위치를 확인할 수 있습니다.
    </p>

    <h3>주요 기능</h3>
    <p>
      📡 나의 현재 위치 전송 및 자동 갱신<br>
      🗺️ 전국 지도 검색 및 직선 거리 확인<br>
      👥 회원 이름으로 상대 위치 확인<br>
      🚸 보호구역 · 속도제한 · 기타 알림<br>
      <span class="desc">위치전송 버튼을 누르면 입력한 값과 현재 위치가 사용자 서버에 기록됩니다.</span>
      <span class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</span>
    </p>
  </section>

  <div id="map"></div>
</div>
  

<!-- ✅ CONFIG 불러오기 -->
<script src="config.js"></script>
<script>
  let intervalId;
  let userToken = sessionStorage.getItem("token") || "";

  // ============================
  // 📌 초기 설정
  // ============================
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("locationForm").action = CONFIG.ADMIN_URL;
    
    // ✅ 닉네임을 phone 입력란에 자동 입력
    const nickname = localStorage.getItem("nickname");
    const phoneBox = document.getElementById("phone");
    if (nickname && nickname !== "undefined" && phoneBox) {
      phoneBox.value = nickname;
    }
    
    // ✅ 토큰은 sessionStorage에서 불러와 내부 변수로만 사용
    const tokenBox = document.getElementById("tokenBox");
    if (tokenBox) tokenBox.value = userToken;

    const mapBtn = document.getElementById("mapBtn");
    if (mapBtn) mapBtn.classList.add("hidden");
  });


  // ============================
  // 📌 모달창 표시/닫기
  // ============================
  window.showModal = function(message, autoClose = false) {
    document.querySelectorAll(".modal").forEach(m => m.remove());
    const modal = document.createElement("div");
    modal.className = "modal";
    const content = document.createElement("div");
    content.className = "modal-content";
    content.innerText = message;
    modal.appendChild(content);
    document.body.appendChild(modal);
    modal.style.display = "block";
    if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
  };
  window.closeModal = function() {
    document.querySelectorAll(".modal").forEach(m => m.remove());
  };

  // ============================
  // 📌 위치 전송 (POST 요청)
  // ============================
  window.sendLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치전송에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");
    if (!navigator.geolocation) {
      showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.", true);
      return;
    }

    navigator.geolocation.getCurrentPosition(function(position) {
      // ✅ POST 요청으로 doPost 실행
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "location",
          phone: phone,
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        closeModal();
        if (result.result === "success") {
          showModal("✅ 위치정보가 성공적으로 전송되었습니다.", true);
      
          // ✅ 실제 응답이 success일 때만 지도맵 버튼 활성화
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "visible";
          mapBtn.style.pointerEvents = "auto";
        } else {
          showModal("❌ " + result.message, true);
      
          // 실패 시 지도맵 버튼은 계속 숨김
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "hidden";
          mapBtn.style.pointerEvents = "none";
        }
      })
      .catch(err => {
        closeModal();
        showModal("위치 전송 실패:\n" + err.message, true);
      });

      // ✅ 자동 갱신 시작
      if (!intervalId) intervalId = setInterval(autoUpdate, CONFIG.DEFAULT_INTERVAL);
    });
  };

  // ============================
  // 📌 위치 해제 (POST 요청)
  // ============================
  window.stopLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치해제에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
    clearInterval(intervalId); intervalId = null;

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "stop",
        phone: phone,
        status: "해제",
        token: userToken
      })
    })
    .then(res => res.json())
    .then(result => {
      closeModal();
      if (result.result === "success") {
        showModal("🛑 위치정보가 해제되었습니다.", true);

        // ✅ 해제 시 지도맵 버튼 다시 숨김 (.hidden 추가)
        const mapBtn = document.getElementById("mapBtn");
        mapBtn.classList.add("hidden");
      } else {
        showModal("❌ " + result.message, true);
      }
    })
    .catch(err => {
      closeModal();
      showModal("처리 중 오류 발생:\n" + err.message, true);
    });
  };

  // ============================
  // 📌 자동 위치 갱신 (POST 요청)
  // ============================
  function autoUpdate() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function(position) {
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "autoUpdate",
          phone: document.getElementById("phone").value.trim(),
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        // 필요시 응답 처리
      })
      .catch(err => {
        console.error("자동 갱신 실패:\n" + err.message);
      });
    });
  }

  // ============================
  // 📌 PWA 서비스워커 등록
  // ============================
 // if ("serviceWorker" in navigator) {
//    navigator.serviceWorker.register("service-worker.js");
//  }
</script>
</body>
</html>
