<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치정보시스템</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      background-color: #f9f9f9;
      margin: 0;
      color: #333;
    }
    header {
      background-color: #2196F3;
      padding: 20px;
      text-align: center;
    }
    header h2 {
      font-size: 36px;
      margin: 0;
      font-weight: bold;
      color: #fff;
    }
    .info-box {
      border: 2px solid #2196F3;
      border-radius: 10px;
      background-color: #e3f2fd;
      padding: 20px;
      margin: 40px auto;
      max-width: 700px;
      text-align: left;
      font-size: 20px;
      line-height: 1.4;
    }
    .info-box h3 { margin: 10px 0 5px 0; color: #1976d2; }
    .warning { display: block; margin-top: 10px; font-size: 20px; color: #d32f2f; font-weight: bold; }
    .center-wrapper { display: flex; justify-content: center; margin-top: 20px; }
    .inner-group { text-align: left; }
    input[type="text"] {
      width: 400px; height: 30px; font-size: 20px;
      padding: 8px; margin-left: 140px; margin-bottom: 5px;
      border: 2px solid #2196F3; border-radius: 6px; display: block;
    }
    .button-group {
      display: flex; justify-content: flex-start; align-items: center;
      margin-left: 1px; margin-top: 10px; gap: 40px;
    }
    .map-btn { width: 100px; height: 100px; cursor: pointer; }

    /* ✅ 지도맵 버튼 숨김 상태: 보이지 않고 클릭도 불가, 공간도 제거 */
    .map-btn.hidden {
      display: none;
      pointer-events: none;
    }

    #sendBtn, #stopBtn {
      width: 200px; height: 50px; font-size: 20px;
      border: none; border-radius: 8px; cursor: pointer; color: white;
    }
    #sendBtn { background: linear-gradient(to bottom, #66bb6a, #4CAF50); }
    #stopBtn { background: linear-gradient(to bottom, #ef5350, #f44336); }
    .modal {
      display: none; position: fixed; z-index: 999;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 15% auto; padding: 20px;
      border: 2px solid #2196F3; border-radius: 10px;
      width: 80%; max-width: 400px; text-align: center; font-size: 18px;
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
    }
  </style>
</head>

<body>
  <header>
    <h2>A-DOMES | 위치정보시스템</h2>
  </header>

  <section class="info-box">
    <h3>앱 목적(관리자)</h3>
    <p>이 앱은 현장의 위치 정보를 기록하고 자신의 위치를 확인하기 위해 만들어졌습니다.</p>
    <h3>사용 방법(주의사항)</h3>
    <p>
      입력란의 사용할 입력값은 고유값이며 잃어버린 경우 서비스를 제공하지 않습니다.<br>
      위치 전송 버튼을 누르면 현재 위치가 구글 시트에 기록되며 자동추적 됩니다.<br>
      화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.
    </p>
    <span class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</span>
  </section>

  <!-- 위치 전송 영역 -->
  <form id="locationForm" method="POST">
    <div class="center-wrapper">
      <div class="inner-group">
        <!-- 📌 닉네임이 자동으로 채워짐 -->
        <input type="text" name="phone" id="phone" 
               placeholder="회원가입 닉네임 또는 전화번호를 입력하세요">
        <div class="button-group">
          <!-- ✅ 처음엔 링크는 유지, 공간도 유지 -->
          <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden; pointer-events:none;">
            <img src="btn-current.png" alt="지도 버튼" class="map-btn">
          </a>
          <!-- ✅ 버튼 클릭 시 admin.html에서 빈값 검증 후 서버 호출 -->
          <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
          <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
        </div>
      </div>
    </div>
  </form>
  
  <div id="map"></div>


  

<!-- ✅ CONFIG 불러오기 -->
<script src="config.js"></script>
<script>
  let intervalId;
  let userToken = sessionStorage.getItem("token") || "";

  // ============================
  // 📌 초기 설정
  // ============================
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("locationForm").action = CONFIG.ADMIN_URL;
    
    // ✅ 닉네임을 phone 입력란에 자동 입력
    const nickname = localStorage.getItem("nickname");
    const phoneBox = document.getElementById("phone");
    if (nickname && nickname !== "undefined" && phoneBox) {
      phoneBox.value = nickname;
    }
    
    // ✅ 토큰은 sessionStorage에서 불러와 내부 변수로만 사용
    const tokenBox = document.getElementById("tokenBox");
    if (tokenBox) tokenBox.value = userToken;

    const mapBtn = document.getElementById("mapBtn");
    if (mapBtn) mapBtn.classList.add("hidden");
  });


  // ============================
  // 📌 모달창 표시/닫기
  // ============================
  window.showModal = function(message, autoClose = false) {
    document.querySelectorAll(".modal").forEach(m => m.remove());
    const modal = document.createElement("div");
    modal.className = "modal";
    const content = document.createElement("div");
    content.className = "modal-content";
    content.innerText = message;
    modal.appendChild(content);
    document.body.appendChild(modal);
    modal.style.display = "block";
    if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
  };
  window.closeModal = function() {
    document.querySelectorAll(".modal").forEach(m => m.remove());
  };

  // ============================
  // 📌 위치 전송 (POST 요청)
  // ============================
  window.sendLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치전송에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");
    if (!navigator.geolocation) {
      showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.", true);
      return;
    }

    navigator.geolocation.getCurrentPosition(function(position) {
      // ✅ POST 요청으로 doPost 실행
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "location",
          phone: phone,
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        closeModal();
        if (result.result === "success") {
          showModal("✅ 위치정보가 성공적으로 전송되었습니다.", true);
      
          // ✅ 실제 응답이 success일 때만 지도맵 버튼 활성화
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "visible";
          mapBtn.style.pointerEvents = "auto";
        } else {
          showModal("❌ " + result.message, true);
      
          // 실패 시 지도맵 버튼은 계속 숨김
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "hidden";
          mapBtn.style.pointerEvents = "none";
        }
      })
      .catch(err => {
        closeModal();
        showModal("위치 전송 실패:\n" + err.message, true);
      });

      // ✅ 자동 갱신 시작
      if (!intervalId) intervalId = setInterval(autoUpdate, CONFIG.DEFAULT_INTERVAL);
    });
  };

  // ============================
  // 📌 위치 해제 (POST 요청)
  // ============================
  window.stopLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치해제에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
    clearInterval(intervalId); intervalId = null;

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "stop",
        phone: phone,
        status: "해제",
        token: userToken
      })
    })
    .then(res => res.json())
    .then(result => {
      closeModal();
      if (result.result === "success") {
        showModal("🛑 위치정보가 해제되었습니다.", true);

        // ✅ 해제 시 지도맵 버튼 다시 숨김 (.hidden 추가)
        const mapBtn = document.getElementById("mapBtn");
        mapBtn.classList.add("hidden");
      } else {
        showModal("❌ " + result.message, true);
      }
    })
    .catch(err => {
      closeModal();
      showModal("처리 중 오류 발생:\n" + err.message, true);
    });
  };

  // ============================
  // 📌 자동 위치 갱신 (POST 요청)
  // ============================
  function autoUpdate() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function(position) {
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "autoUpdate",
          phone: document.getElementById("phone").value.trim(),
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        // 필요시 응답 처리
      })
      .catch(err => {
        console.error("자동 갱신 실패:\n" + err.message);
      });
    });
  }

  // ============================
  // 📌 PWA 서비스워커 등록
  // ============================
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>
</body>
</html>
