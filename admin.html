<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치 정보 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

<style>
/* =========================== ✅ 전체 body 기본 스타일 =========================== */
body {
  font-family: Arial, sans-serif;   /* 글꼴 */
  font-size: 18px;                  /* 기본 글자 크기 */
  background-color: #f0f4f8;        /* 배경색 */
  margin: 0;                        /* 기본 여백 제거 */
  color: #333;                      /* 글자색 */
  display: flex;                    /* 중앙 정렬을 위한 flex */
  justify-content: center;          /* 가로 중앙 정렬 */
  align-items: center;              /* ✅ PC에서는 세로 중앙 정렬 */
  min-height: 100vh;                /* 화면 전체 높이 */
  padding: 12px;                    /* 화면 여백 */
}

/* =========================== ✅ 메인 카드 영역 =========================== */
.main-card {
  border: 2px solid #1976d2;        /* 파란색 테두리 */
  border-radius: 12px;              /* 모서리 둥글게 */
  background: #fff;                 /* 흰색 배경 */
  max-width: 520px;                 /* ✅ PC에서는 널찍하게 */
  width: 100%;                      /* 화면 폭 전체 */
  padding: 20px;                    /* 내부 여백 */
  box-shadow: 0 6px 16px rgba(0,0,0,0.15); /* 그림자 */
}

/* =========================== ✅ 헤더 영역 =========================== */
header {
  background-color: #1976d2;        /* 파란색 배경 */
  padding: 10px;                    /* 내부 여백 */
  text-align: center;               /* 가운데 정렬 */
  border-radius: 8px;               /* 모서리 둥글게 */
  margin-bottom: 14px;              /* 아래쪽 여백 */
}
header h2 {
  font-size: 24px;                  /* 제목 글자 크기 */
  margin: 0;                        /* 기본 여백 제거 */
  font-weight: bold;                /* 굵은 글씨 */
  color: #fff;                      /* 흰색 글자 */
}

/* =========================== ✅ 정보 박스 =========================== */
.info-box {
  border: 2px solid #1976d2;        /* 파란색 테두리 */
  border-radius: 10px;              /* 모서리 둥글게 */
  background-color: #e3f2fd;        /* 연한 파란색 배경 */
  padding: 14px;                    /* 내부 여백 */
  margin: 14px 0;                   /* 위아래 여백 */
  font-size: 17px;                  /* 글자 크기 */
  line-height: 1.5;                 /* 줄 간격 */
}
.info-box h3 {
  margin-top: 2px;                  /* 위쪽 여백 */
  margin-bottom: 2px;               /* 아래쪽 여백 */
  color: #1565c0;                   /* 진한 파란색 글자 */
  font-size: 18px;                  /* 소제목 글자 크기 */
}
.info-box p {
  margin-top: 2px;                  /* 위쪽 여백 */
  margin-bottom: 8px;               /* 아래쪽 여백 */
}

/* =========================== ✅ 주요 기능 박스 (배경색 제거) =========================== */
.info-box.features {
  background-color: transparent;    /* 배경색 없음 */
  border: none;                     /* 테두리 없음 */
}

/* =========================== ✅ 설명/경고 텍스트 =========================== */
.desc { display:block; margin-top:6px; font-size:15px; } /* 설명 텍스트 */
.warning {
  display:block;                    /* 블록 표시 */
  margin-top:6px;                   /* 위쪽 여백 */
  font-size:18px;                   /* 글자 크기 */
  color:#d32f2f;                    /* 빨간색 글자 */
  font-weight:bold;                 /* 굵게 */
  white-space:nowrap;               /* 줄바꿈 없음 */
}

/* =========================== ✅ 입력창 + 지도 버튼 그룹 =========================== */
.input-group {
  display:flex;                     /* 가로 배치 */
  align-items:center;               /* 세로 중앙 정렬 */
  gap:10px;                         /* 요소 간격 */
  margin-bottom:12px;               /* 아래쪽 여백 */
}
input[type="text"] {
  margin-left:50px;                 /* 좌측 여백 */
  width:310px;                      /* 입력창 폭 */
  height:40px;                      /* 입력창 높이 */
  font-size:18px;                   /* 글자 크기 */
  padding:8px;                      /* 내부 여백 */
  border:2px solid #1976d2;         /* 파란색 테두리 */
  border-radius:6px;                /* 모서리 둥글게 */
  box-sizing:border-box;            /* 박스 크기 계산 방식 */
}

/* =========================== ✅ 지도 버튼 =========================== */
.map-btn {
  margin-left:20px;                 /* 좌측 여백 */
  width:90px; height:90px;          /* 버튼 크기 */
  border-radius:12px;               /* 모서리 둥글게 */
  background:linear-gradient(to bottom, #64b5f6, #1976d2); /* 파란색 그라데이션 */
  box-shadow:0 4px 8px rgba(0,0,0,0.2); /* 그림자 */
  cursor:pointer;                   /* 커서 모양 */
  transition:transform 0.2s ease, background 0.3s ease; /* 애니메이션 */
}
.map-btn:hover {
  background:linear-gradient(to bottom, #90caf9, #1565c0); /* 호버 시 밝게 */
  transform:scale(1.05);            /* 살짝 커짐 */
}

/* =========================== ✅ 위치 전송 / 해제 버튼 =========================== */
#sendBtn, #stopBtn {
  margin-left:0; margin-right:auto;
  width:480px;                      /* PC에서는 넓게 */
  height:50px;                      /* 버튼 높이 */
  font-size:18px;                   /* 글자 크기 */
  border:none;                      /* 테두리 없음 */
  border-radius:8px;                /* 모서리 둥글게 */
  cursor:pointer;                   /* 커서 모양 */
  color:white;                      /* 글자색 흰색 */
  margin-bottom:6px;                /* 아래쪽 여백 */
  display:block;                    /* 블록 표시 */
  transition:transform 0.2s ease, background 0.3s ease; /* ✅ 호버 애니메이션 */
}
#sendBtn {
  background:linear-gradient(to bottom, #42a5f5, #1976d2);
  margin-top:20px;
}
#stopBtn {
  background:linear-gradient(to bottom, #ef5350, #f44336);
  margin-top:10px;
}
/* ✅ hover 시: 버튼이 위로 올라오면서 커짐 */
#sendBtn:hover, #stopBtn:hover {
  transform:translateY(-3px) scale(1.05);
}
/* ✅ active(클릭 순간)와 focus(클릭 후 포커스 유지) 시: 원래 크기로 복귀 */
#sendBtn:active, #stopBtn:active,
#sendBtn:focus, #stopBtn:focus {
  transform:none;
}

/* =========================== ✅ 모달창 전체 영역 (PC용) =========================== */
.modal {
  position:fixed; left:0; top:0;
  width:100%; height:100%;
  background-color:rgba(0,0,0,0.4); /* 반투명 배경 */
  z-index:1000;
  display:flex;
  justify-content:center;           /* 가로 중앙 */
  align-items:center;               /* ✅ PC에서는 화면 중앙 */
}
.modal-content {
  background-color:#fefefe;
  padding:14px;
  border:2px solid #2196F3;
  border-radius:10px;
  width:80%;                        /* ✅ PC에서는 크게 */
  max-width:520px;                  /* ✅ 폭 제한 넓게 */
  text-align:center;
  font-size:20px;                   /* ✅ 글자도 크게 */
  background:linear-gradient(135deg, #e3f2fd, #bbdefb); /* 파란색 그라데이션 */
  box-shadow:0 6px 16px rgba(0,0,0,0.2);
  margin:0 auto;
  margin-top:2px;                 /* ✅ PC에서 모달창을 아래로 내림(180px 기본) */
}

/* =========================== ✅ 모바일 대응 =========================== */
@media (max-width:767px) {
  header h2 { font-size:22px; }
  .info-box { font-size:15px; }

  /* 지도 버튼 (모바일용) */
  .map-btn {
    width:60px; height:60px;        /* ✅ 모바일에서는 작게 */
    margin-left:10px;               /* 모바일에서는 여백 줄임 */
    margin-top:10px;                 /* ✅ 아래로 조금 내려오도록 */
    border-radius:10px;
    background:linear-gradient(to bottom, #64b5f6, #1976d2);
    box-shadow:0 3px 6px rgba(0,0,0,0.15);
  }

  input[type="text"] {
    font-size:14px;
    height:32px;
    width:100%;                     /* 모바일에서는 꽉 채움 */
    max-width:none;
    margin-left:20px;                /* 모바일에서는 좌측 여백 줄임 */
    margin-right:0;
  }

  #sendBtn, #stopBtn {
    font-size:14px;
    height:42px;
    width:100%;                     /* 모바일에서는 버튼도 꽉 채움 */
    max-width:none;
    margin-left:0;
    margin-right:0;
  }

  .warning { font-size:15px; }

  .modal { align-items:flex-start; } /* ✅ 모바일에서는 위쪽 기준 */
  .modal-content {
    margin-top:160px;               /* ✅ 모바일에서는 위에서 100px 내려옴 */
    width:90%;                      /* 모바일에서는 폭 더 넓게 */
    max-width:300px;
    font-size:16px;                 /* 모바일에서는 글자 작게 */
  }
}
</style>
</head>
  
<body>
<div class="main-card">
  <!-- ✅ 헤더 -->
  <header>
    <h2>A-DOMES | 위치 전송</h2>
  </header>

  <!-- ✅ 입력창 및 버튼 -->
  <section class="info-box">
    <form id="locationForm" method="POST">
      <div class="input-group">
        <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden;">
          <img src="btn-current.png" alt="지도 버튼" class="map-btn">
        </a>
        <input type="text" name="phone" id="phone" placeholder="회원가입 닉네임 또는 전화번호 입력">
      </div>
      <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
      <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
    </form>
  </section>

  <!-- ✅ 주요 기능 (배경색 없음) -->
  <section class="info-box features">
    <h3>주요 기능</h3>
    <p>
      📡 나의 현재 위치 전송 및 자동 갱신<br>
      🗺️ 모든 사용자의 위치정보 파악 확인<br>
      👥 회원 정보로 실시간 경로 추적<br>
      🚸 벡터지도 · 일반지도 · 위성지도 활용<br>
      <span class="desc">관리자 전용 위지정보 관리 시스템입니다.</span>
      <span class="warning">📱 위치 전송을 위해 화면을 유지하세요!</span>
    </p>
  </section>

  <!-- ✅ 지도 표시 영역 -->
  <div id="map"></div>


<!-- ✅ CONFIG 불러오기 -->
<script src="config.js"></script>
<script>
  let intervalId;
  let userToken = sessionStorage.getItem("token") || "";

  // ============================
  // 📌 초기 설정
  // ============================
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("locationForm").action = CONFIG.ADMIN_URL;
    
    // ✅ 닉네임을 phone 입력란에 자동 입력
    const nickname = localStorage.getItem("nickname");
    const phoneBox = document.getElementById("phone");
    if (nickname && nickname !== "undefined" && phoneBox) {
      phoneBox.value = nickname;
    }
    
    // ✅ 토큰은 sessionStorage에서 불러와 내부 변수로만 사용
    const tokenBox = document.getElementById("tokenBox");
    if (tokenBox) tokenBox.value = userToken;

    const mapBtn = document.getElementById("mapBtn");
    if (mapBtn) mapBtn.classList.add("hidden");
  });


  // ============================
  // 📌 모달창 표시/닫기
  // ============================
  window.showModal = function(message, autoClose = false) {
    document.querySelectorAll(".modal").forEach(m => m.remove());
    const modal = document.createElement("div");
    modal.className = "modal";
    const content = document.createElement("div");
    content.className = "modal-content";
    content.innerText = message;
    modal.appendChild(content);
    document.body.appendChild(modal);
    modal.style.display = "block";
    if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
  };
  window.closeModal = function() {
    document.querySelectorAll(".modal").forEach(m => m.remove());
  };

  // ============================
  // 📌 위치 전송 (POST 요청)
  // ============================
  window.sendLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치전송에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");
    if (!navigator.geolocation) {
      showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.", true);
      return;
    }

    navigator.geolocation.getCurrentPosition(function(position) {
      // ✅ POST 요청으로 doPost 실행
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "location",
          phone: phone,
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        closeModal();
        if (result.result === "success") {
          showModal("✅ 위치정보가 성공적으로 전송되었습니다.", true);
      
          // ✅ 실제 응답이 success일 때만 지도맵 버튼 활성화
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "visible";
          mapBtn.style.pointerEvents = "auto";
        } else {
          showModal("❌ " + result.message, true);
      
          // 실패 시 지도맵 버튼은 계속 숨김
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "hidden";
          mapBtn.style.pointerEvents = "none";
        }
      })
      .catch(err => {
        closeModal();
        showModal("위치 전송 실패:\n" + err.message, true);
      });

      // ✅ 자동 갱신 시작
      if (!intervalId) intervalId = setInterval(autoUpdate, CONFIG.DEFAULT_INTERVAL);
    });
  };

  // ============================
  // 📌 위치 해제 (POST 요청)
  // ============================
  window.stopLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치해제에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
    clearInterval(intervalId); intervalId = null;

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "stop",
        phone: phone,
        status: "해제",
        token: userToken
      })
    })
    .then(res => res.json())
    .then(result => {
      closeModal();
      if (result.result === "success") {
        showModal("🛑 위치정보가 해제되었습니다.", true);

        // ✅ 해제 시 지도맵 버튼 다시 숨김 (.hidden 추가)
        const mapBtn = document.getElementById("mapBtn");
        mapBtn.classList.add("hidden");
      } else {
        showModal("❌ " + result.message, true);
      }
    })
    .catch(err => {
      closeModal();
      showModal("처리 중 오류 발생:\n" + err.message, true);
    });
  };

  // ============================
  // 📌 자동 위치 갱신 (POST 요청)
  // ============================
  function autoUpdate() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function(position) {
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "autoUpdate",
          phone: document.getElementById("phone").value.trim(),
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        // 필요시 응답 처리
      })
      .catch(err => {
        console.error("자동 갱신 실패:\n" + err.message);
      });
    });
  }

  // ============================
  // 📌 PWA 서비스워커 등록
  // ============================
 // if ("serviceWorker" in navigator) {
//    navigator.serviceWorker.register("service-worker.js");
//  }
</script>
</body>
</html>
