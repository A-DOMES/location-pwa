<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES | 위치 정보 시스템</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

<style>
/* 전체 body 기본 스타일 (PC용) */
    body {
      font-family: Arial, sans-serif;   /* 글꼴 */
      font-size: 18px;                  /* 기본 글자 크기 */
      background-color: #f0f4f8;        /* 배경색 */
      margin: 0;
      color: #333;                      /* 글자색 */
      display: flex;                    /* 중앙 정렬을 위한 flex */
      justify-content: center;          /* 가로 중앙 */
      align-items: center;              /* ✅ PC에서는 세로 중앙 */
      min-height: 100vh;                /* 화면 전체 높이 */
      padding: 12px;                    /* 여백 */
    }
    
    /* 메인 카드 영역 */
    .main-card {
      border: 2px solid #1976d2;
      border-radius: 12px;
      background: #fff;
      max-width: 530px;   /* ✅ PC에서는 널찍하게 */
      width: 100%;         /* ✅ 화면 폭의 80% */
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

  /* 헤더 영역 */
  header {
    background-color: #1976d2;        /* 파란색 배경 */
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 14px;
  }

  header h2 {
    font-size: 24px;
    margin: 0;
    font-weight: bold;
    color: #fff;                      /* 흰색 글자 */
  }

  /* 정보 박스 */
  .info-box {
    border: 2px solid #1976d2;
    border-radius: 10px;
    background-color: #e3f2fd;        /* 연한 파란색 배경 */
    padding: 14px;
    margin: 14px 0;
    font-size: 17px;
    line-height: 1.5;
  }

  .info-box h3 {
    margin-top: 2px;
    margin-bottom: 2px;
    color: #1565c0;                   /* 진한 파란색 글자 */
    font-size: 18px;
  }

  .info-box p {
    margin-top: 2px;
    margin-bottom: 8px;
  }

  /* 설명 텍스트 */
  .desc {
    display: block;
    margin-top: 6px;
    font-size: 15px;
  }

  /* 경고 텍스트 */
  .warning {
    display: block;
    margin-top: 4px;
    font-size: 16px;
    color: #d32f2f;                   /* 빨간색 글자 */
    font-weight: bold;
    white-space: nowrap;
  }

  /* 입력창 + 지도 버튼 그룹 */
  .input-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  /* 입력창 스타일 */
  input[type="text"] {
    margin-left: 50px;                /* 좌측 여백 (PC용) */
    width: 350px;                     /* 입력창 폭 */
    height: 40px;
    font-size: 18px;
    padding: 8px;
    border: 2px solid #1976d2;
    border-radius: 6px;
    box-sizing: border-box;
  }

  /* 지도 버튼 */
  .map-btn {
    width: 70px;
    height: 70px;
    cursor: pointer;
  }

  /* 위치 전송 / 해제 버튼 */
  #sendBtn, #stopBtn {
    margin-left: 0;
    margin-right: auto;
    width: 480px;                     /* 입력창과 폭 맞춤 */
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
    margin-bottom: 6px;
    display: block;
  }

  #sendBtn {
    background: linear-gradient(to bottom, #42a5f5, #1976d2); /* 파란색 그라데이션 */
  }

  #stopBtn {
    background: linear-gradient(to bottom, #ef5350, #f44336); /* 빨간색 그라데이션 */
    margin-top: 4px;
  }

  /* 모달창 전체 영역 (기본: PC용) */
  .modal {
    position: fixed;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.4); /* 반투명 배경 */
    z-index: 1000;
    display: flex;
    justify-content: center;           /* 가로 중앙 */
    align-items: center;               /* ✅ PC에서는 화면 중앙 */
  }

  /* 모달창 내용 (PC용) */
  .modal-content {
    background-color: #fefefe;
    padding: 14px;
    border: 2px solid #2196F3;
    border-radius: 10px;
    width: 80%;                        /* ✅ PC에서는 크게 */
    max-width: 700px;                  /* ✅ 폭 제한 넓게 */
    text-align: center;
    font-size: 18px;                   /* ✅ 글자도 크게 */
    background: linear-gradient(135deg, #e3f2fd, #bbdefb); /* 파란색 그라데이션 */
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    margin: 0 auto;
  }

  /* 모바일 대응 */
  @media (max-width:767px) {
    header h2 { font-size: 22px; }
    .info-box { font-size: 15px; }
    .map-btn { width: 60px; height: 60px; }

    input[type="text"] {
      font-size: 14px;
      height: 32px;
      width: 100%;       /* 모바일에서는 꽉 채움 */
      max-width: none;
      margin-left: 20px; /* 모바일에서는 좌측 여백 줄임 */
      margin-right: 0;
    }

    #sendBtn, #stopBtn {
      font-size: 14px;
      height: 42px;
      width: 100%;       /* 모바일에서는 버튼도 꽉 채움 */
      max-width: none;
      margin-left: 0;
      margin-right: 0;
    }

    .warning { font-size: 14px; }

    .modal {
      align-items: flex-start;         /* ✅ 모바일에서는 위쪽 기준 */
    }

    .modal-content {
      margin-top: 100px;               /* ✅ 모바일에서는 위에서 100px 내려옴 */
      width: 90%;                      /* 모바일에서는 폭 더 넓게 */
      max-width: 340px;
      font-size: 14px;                 /* 모바일에서는 글자 작게 */
    }
  }
</style>
</head>

<body>
<div class="main-card">
  <header>
  <h2>A-DOMES | 관리자 화면</h2>
  </header>
  
  <!-- 입력창 + 버튼 -->
  <section class="info-box">
    <form id="locationForm" method="POST">
      <div class="input-group">
        <!-- ✅ 처음엔 숨김 -->
        <a href="client.html" target="_blank" id="mapBtn" style="visibility:hidden;">
          <img src="btn-current.png" alt="지도 버튼" class="map-btn">
        </a>
        <input type="text" name="phone" id="phone" placeholder="회원가입 닉네임 또는 전화번호 입력">
      </div>
      <button type="button" id="sendBtn" onclick="sendLocation()">위치 전송</button>
      <button type="button" id="stopBtn" onclick="stopLocation()">위치정보 해제</button>
    </form>
  </section>

  <!-- 앱 목적/주의사항 -->
  <section class="info-box">
    <h3>앱 목적(관리자)</h3>
    <p>이 앱은 현장의 위치 정보를 기록하고 관리자가 회원들의 위치를 확인하기 위해 만들어졌습니다.</p>
    <h3>사용 방법(주의사항)</h3>
    <p>
      입력란의 값은 고유 식별자입니다.<br>
      위치 전송 버튼을 누르면 현재 위치가 서버에 기록되며 자동 추적됩니다.<br>
      화면을 켜 두시면 5분마다 자동으로 위치가 갱신됩니다.
    </p>
    <span class="warning">📱 위치 전송을 위해 화면을 끄지 마세요!</span>
  </section>

  <div id="map"></div>
</div>

<!-- ✅ CONFIG 불러오기 -->
<script src="config.js"></script>
<script>
  let intervalId;
  let userToken = sessionStorage.getItem("token") || "";

  // ============================
  // 📌 초기 설정
  // ============================
  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("locationForm").action = CONFIG.ADMIN_URL;
    
    // ✅ 닉네임을 phone 입력란에 자동 입력
    const nickname = localStorage.getItem("nickname");
    const phoneBox = document.getElementById("phone");
    if (nickname && nickname !== "undefined" && phoneBox) {
      phoneBox.value = nickname;
    }
    
    // ✅ 토큰은 sessionStorage에서 불러와 내부 변수로만 사용
    const tokenBox = document.getElementById("tokenBox");
    if (tokenBox) tokenBox.value = userToken;

    const mapBtn = document.getElementById("mapBtn");
    if (mapBtn) mapBtn.classList.add("hidden");
  });


  // ============================
  // 📌 모달창 표시/닫기
  // ============================
  window.showModal = function(message, autoClose = false) {
    document.querySelectorAll(".modal").forEach(m => m.remove());
    const modal = document.createElement("div");
    modal.className = "modal";
    const content = document.createElement("div");
    content.className = "modal-content";
    content.innerText = message;
    modal.appendChild(content);
    document.body.appendChild(modal);
    modal.style.display = "block";
    if (autoClose) setTimeout(() => { modal.remove(); }, 2000);
  };
  window.closeModal = function() {
    document.querySelectorAll(".modal").forEach(m => m.remove());
  };

  // ============================
  // 📌 위치 전송 (POST 요청)
  // ============================
  window.sendLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치전송에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 전송 중입니다...\n잠시만 기다려주세요.");
    if (!navigator.geolocation) {
      showModal("이 브라우저에서는 위치 정보를 지원하지 않습니다.", true);
      return;
    }

    navigator.geolocation.getCurrentPosition(function(position) {
      // ✅ POST 요청으로 doPost 실행
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "location",
          phone: phone,
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        closeModal();
        if (result.result === "success") {
          showModal("✅ 위치정보가 성공적으로 전송되었습니다.", true);
      
          // ✅ 실제 응답이 success일 때만 지도맵 버튼 활성화
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "visible";
          mapBtn.style.pointerEvents = "auto";
        } else {
          showModal("❌ " + result.message, true);
      
          // 실패 시 지도맵 버튼은 계속 숨김
          const mapBtn = document.getElementById("mapBtn");
          mapBtn.style.visibility = "hidden";
          mapBtn.style.pointerEvents = "none";
        }
      })
      .catch(err => {
        closeModal();
        showModal("위치 전송 실패:\n" + err.message, true);
      });

      // ✅ 자동 갱신 시작
      if (!intervalId) intervalId = setInterval(autoUpdate, CONFIG.DEFAULT_INTERVAL);
    });
  };

  // ============================
  // 📌 위치 해제 (POST 요청)
  // ============================
  window.stopLocation = function() {
    const phone = document.getElementById("phone").value.trim();
    if (!phone) {
      showModal("📌 입력값이 없습니다.\n위치해제에 사용 할 고유값을 입력하세요.", true);
      return;
    }

    showModal("위치정보 해제 처리 중입니다...\n잠시만 기다려주세요.");
    clearInterval(intervalId); intervalId = null;

    fetch(CONFIG.ADMIN_URL, {
      method: "POST",
      body: new URLSearchParams({
        mode: "stop",
        phone: phone,
        status: "해제",
        token: userToken
      })
    })
    .then(res => res.json())
    .then(result => {
      closeModal();
      if (result.result === "success") {
        showModal("🛑 위치정보가 해제되었습니다.", true);

        // ✅ 해제 시 지도맵 버튼 다시 숨김 (.hidden 추가)
        const mapBtn = document.getElementById("mapBtn");
        mapBtn.classList.add("hidden");
      } else {
        showModal("❌ " + result.message, true);
      }
    })
    .catch(err => {
      closeModal();
      showModal("처리 중 오류 발생:\n" + err.message, true);
    });
  };

  // ============================
  // 📌 자동 위치 갱신 (POST 요청)
  // ============================
  function autoUpdate() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(function(position) {
      fetch(CONFIG.ADMIN_URL, {
        method: "POST",
        body: new URLSearchParams({
          mode: "autoUpdate",
          phone: document.getElementById("phone").value.trim(),
          status: "정상",
          lat: position.coords.latitude || 0,
          lng: position.coords.longitude || 0,
          token: userToken
        })
      })
      .then(res => res.json())
      .then(result => {
        // 필요시 응답 처리
      })
      .catch(err => {
        console.error("자동 갱신 실패:\n" + err.message);
      });
    });
  }

  // ============================
  // 📌 PWA 서비스워커 등록
  // ============================
 // if ("serviceWorker" in navigator) {
//    navigator.serviceWorker.register("service-worker.js");
//  }
</script>
</body>
</html>
