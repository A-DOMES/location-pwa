<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

  <!-- ✅ CSS는 head 안에 -->
  <link rel="stylesheet" href="client.css"> 
  
  <!-- 1. config.js 먼저 (CONFIG 객체 정의) -->
  <script src="config.js"></script>

  <!-- 1. 사용자 코드 -->
  <script>
  // ---------------------- 전역 변수 ----------------------
  let map, mode = "current", markers = [], markerCluster, intervalId, allData = [];
  let polylines = []; // 경로 Polyline 저장 배열
  let geoWatchId = null;
  let originalCenter;  // 초기 중심 좌표
  let marker, currentLat, currentLng;
    
  // ---------------------- 마커 제거 함수 ----------------------
  function clearMarkers() {
    markers.forEach(m => m.setMap(null));
    markers = [];
  }

  // ---------------------- 거리 계산 함수 ----------------------
  function calculateDistance(lat1, lng1, lat2, lng2) {
    const R = 6371; // 지구 반지름 (km)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  // ---------------------- 문자열 기반 색상 함수 ----------------------
  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "#" + "00000".substring(0, 6 - c.length) + c;
  }

// ---------------------- 데이터 로딩 ----------------------
async function loadData(token = null) {
  try {
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);

    const response = await fetch(url);
    allData = await response.json();

    // 드롭다운 갱신
    populatePathSelect();

    // ✅ 데이터 정상 수신 후 지도 표시
    showMap();

    // ✅ 위치 정보 박스 갱신
        if (allData.length > 0) {
          const user = allData[0]; // 첫 번째 사용자 기준
          const locationBox = document.getElementById("locationBox");
          locationBox.innerHTML = `
            현재 위치: <br>
            위도: ${user.lat ? user.lat.toFixed(6) : "-"} <br>
            경도: ${user.lng ? user.lng.toFixed(6) : "-"} <br>
            주소: ${user.address || "-"} <br>
            <button id="shareBtn">현재 위치 공유</button>
          `;
    
          const shareBtn = document.getElementById("shareBtn");
          if (shareBtn) {
            shareBtn.onclick = async () => {
              const shareUrl =
                `https://www.google.com/maps/search/?api=1&query=${user.lat},${user.lng}`;
              await navigator.clipboard.writeText(shareUrl);

          // ✅ 공유 팝업 표시
          const popup = document.getElementById("popupMessage");
          popup.style.display = "block";
          popup.style.opacity = "1";
          setTimeout(() => {
            popup.style.opacity = "0";
            setTimeout(() => { popup.style.display = "none"; }, 2000);
          }, 3000);
        };
      }
    } else {
      document.getElementById("locationBox").innerHTML =
        "❌ 위치 데이터를 불러올 수 없습니다.";
    }
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    showMessage("⚠️ 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
  }
}


  // ---------------------- 갱신 주기 설정 ----------------------
  function setCustomInterval() {
    const value = parseInt(document.getElementById("intervalValue").value);
    const unit = document.getElementById("intervalUnit").value;

    if (isNaN(value) || value <= 0) {
      alert("1 이상의 값을 입력하세요.");
      return;
    }

    let newInterval = unit === "seconds" ? value * 1000 : value * 60000;

    clearInterval(intervalId);
    intervalId = setInterval(loadData, newInterval);

    const msgBox = document.getElementById("message-box");
    msgBox.textContent = `갱신 주기: ${value} ${unit === "minutes" ? "분" : "초"}`;
    msgBox.style.display = "block";
    setTimeout(() => { msgBox.style.display = "none"; }, 2000);
  }

  // ---------------------- 지도 초기화 ----------------------
  window.onload = () => {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 36.5, lng: 127.5 },
      zoom: 7,
      mapTypeId: "roadmap",   // 기본 지도 타입
      styles: null            // ✅ 스타일 적용하지 않음 → 일반지도
    });

    // ✅ 라이트/다크 모드 토글 (지도 준비된 뒤에 실행)
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("change", () => {
        document.body.classList.toggle("dark-mode", themeToggle.checked);
        map.setOptions({ styles: themeToggle.checked ? darkStyle : lightStyle });
      });
    }

    // ✅ 데이터 로딩 및 기본 갱신 주기
    loadData();
    intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
  };

  // ---------------------- 드롭다운 갱신 ----------------------
  function populatePathSelect(viewMode = "all") {
    const select = document.getElementById("path-user-select");
    if (!select) return;
    select.innerHTML = "";

    const allOption = document.createElement("option");
    allOption.value = "all";
    allOption.textContent = "전체";
    select.appendChild(allOption);

    let users = [];
    if (viewMode === "current") {
      const now = new Date();
      users = allData.filter(u => {
        const updated = new Date(u.updated);
        return (now - updated <= 5 * 60 * 1000);
      });
    } else {
      users = allData;
    }

    users.forEach(user => {
      const option = document.createElement("option");
      option.value = user.phone;
      option.textContent = user.phone;
      select.appendChild(option);
    });
  }

  // ---------------------- 지도 초기화 보조 ----------------------
  function clearMap() {
    if (markerCluster) {
      markerCluster.clearMarkers();
      markerCluster = null;
    }
    markers.forEach(m => m.setMap(null));
    markers = [];
    polylines.forEach(p => p.setMap(null));
    polylines = [];
  }

// ---------------------- 지도 표시 ----------------------
function showMap() {
  clearMap();
  if (!map) return;

  // ✅ 모드별 커스텀 마커 아이콘 정의
  const iconCurrent = {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: "#0000FF",   // 파랑
    fillOpacity: 1,
    strokeColor: "#FFFFFF",
    strokeWeight: 2,
    scale: 12
  };

  const iconAll = {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: "#FF0000",   // 빨강
    fillOpacity: 1,
    strokeColor: "#FFFFFF",
    strokeWeight: 2,
    scale: 12
  };

  const iconPaths = {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: "#00CC00",   // 초록
    fillOpacity: 1,
    strokeColor: "#FFFFFF",
    strokeWeight: 2,
    scale: 12
  };

  if (mode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    Object.values(latestByUser).forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        icon: iconCurrent,
        title: `${user.phone} (${user.status}, ${user.updated})`,
        animation: google.maps.Animation.BOUNCE
      });
      markers.push(marker);

      // ✅ 마커 클릭 시 위치 박스 갱신
      marker.addListener("click", () => {
        updateLocationBox(user);
        document.getElementById("locationBox").style.display = "block"; // 팝업 표시
      });
    });

  } else if (mode === "all") {
    allData.forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        icon: iconAll,
        title: `${user.phone} (${user.status}, ${user.time})`,
        animation: google.maps.Animation.BOUNCE
      });
      markers.push(marker);

      // ✅ 마커 클릭 시 위치 박스 갱신
      marker.addListener("click", () => {
        updateLocationBox(user);
        document.getElementById("locationBox").style.display = "block"; // 팝업 표시
      });
    });

  } else if (mode === "paths") {
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";

    let users = allData;
    if (selectedPhone !== "all") {
      users = allData.filter(u => u.phone === selectedPhone);
    }

    users.forEach(user => {
      const pathCoords = [];
      for (let j = 0; j < user.path.length; j += 2) {
        const lat = user.path[j];
        const lng = user.path[j + 1];
        if (lat && lng) pathCoords.push({ lat, lng });
      }
      if (pathCoords.length > 0) {
        const polyline = new google.maps.Polyline({
          path: pathCoords,
          geodesic: true,
          strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
          strokeOpacity: 1.0,
          strokeWeight: 2,
          map: map
        });
        polylines.push(polyline);

        const last = pathCoords[pathCoords.length - 1];
        const marker = new google.maps.Marker({
          position: last,
          map: map,
          icon: iconPaths,
          title: `${user.phone} / ${user.updated}`,
          animation: google.maps.Animation.BOUNCE
        });
        markers.push(marker);

        // ✅ 마커 클릭 시 위치 박스 갱신
        marker.addListener("click", () => {
          updateLocationBox(user);
          document.getElementById("locationBox").style.display = "block"; // 팝업 표시
        });
      }
    });
  }

  if (document.getElementById("clusterOption")?.checked) {
    markerCluster = new markerClusterer.MarkerClusterer({ map: map, markers: markers });
  }
  
  // ✅ 위치 정보 박스 갱신 추가 (첫 화면에도 적용)
  if (allData.length > 0) {
    const user = allData[0]; // 첫 번째 사용자 기준
    updateLocationBox(user); // 최신 버전 호출 (핀셋+닉네임 포함)
    document.getElementById("locationBox").style.display = "block"; // 팝업 표시
  } else {
    document.getElementById("locationBox").innerHTML =
      "❌ 위치 데이터를 불러올 수 없습니다.";
  }
  
  updateUserPanelContent(mode);
  }

  // ---------------------- 사용자 패널 ----------------------
  document.addEventListener("DOMContentLoaded", () => {
    const btnConnection = document.getElementById("btn-connection");
    const btnSettings = document.getElementById("btn-settings");
    const connectionPanel = document.getElementById("connection-panel");
    const settingsPanel = document.getElementById("settings-panel");
    const userPanel = document.getElementById("user-panel");
    const select = document.getElementById("path-user-select");

    // ✅ 드롭다운 선택 이벤트
    if (select) {
      select.addEventListener("change", e => {
        const selectedPhone = e.target.value;
        const title = document.getElementById("user-panel-title");

        if (selectedPhone === "all") {
          updateUserPanelContent("all");
          renderUserTable(allData, "all");
        } else {
          const user = allData.find(u => u.phone === selectedPhone);
          if (user) {
            const modeForTable = (title && title.textContent === "위치/경로 보기") ? "paths" : "current";
            updateUserPanelContent(modeForTable);
            renderUserTable([user], modeForTable);

            if (modeForTable === "paths") {
              const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
              if (pathPoints.length > 0) {
                let distanceKm = 0;
                for (let i = 1; i < pathPoints.length; i++) {
                  distanceKm += calculateDistance(
                    pathPoints[i-1].lat, pathPoints[i-1].lng,
                    pathPoints[i].lat, pathPoints[i].lng
                  );
                }
                drawPath(pathPoints, distanceKm);
              }
            } else {
              moveToUser(user.lat, user.lng, user.phone);
            }
          } else {
            renderUserTable([], "current");
          }
        }
      });
    }

    // ✅ 버튼 이벤트
    btnConnection.onclick = () => {
      settingsPanel.classList.remove("open");
      connectionPanel.classList.toggle("open");
    };

    btnSettings.onclick = () => {
      connectionPanel.classList.remove("open");
      settingsPanel.classList.toggle("open");
    };

    // ✅ 닫기 버튼 이벤트
    const closeBtn = document.getElementById("close-user-panel");
    if (closeBtn) {
      closeBtn.onclick = () => {
        userPanel.classList.remove("open");
      };
    }
  });
    

// ---------------------- 사용자 패널 열기 ----------------------
window.openUserPanel = function(viewMode) {
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");

  // 다른 패널 닫기
  connectionPanel?.classList.remove("open");
  settingsPanel?.classList.remove("open");
  userPanel?.classList.add("open");

  // 모드 갱신
  mode = viewMode;

  // ✅ 기존 마커/경로 제거
  clearMarkers();
  polylines.forEach(line => line.setMap(null));  // ← polylines만 사용
  polylines = [];

  // 패널 제목 갱신
  const title = document.getElementById("user-panel-title");
  if (title) {
    if (viewMode === "current") title.textContent = "현재 접속자";
    else if (viewMode === "all") title.textContent = "전체 사용자";
    else if (viewMode === "paths") title.textContent = "위치/경로 보기";
  }

  // 패널 내용 갱신
  updateUserPanelContent(viewMode);
};

// ---------------------- path 배열 변환 ----------------------
function parsePathArray(pathArray) {
  const points = [];
  for (let i = 0; i < pathArray.length; i += 2) {
    const lat = parseFloat(pathArray[i]);
    const lng = parseFloat(pathArray[i+1]);
    if (!isNaN(lat) && !isNaN(lng)) {
      points.push({ lat, lng });
    }
  }
  return points;
}

// ---------------------- 경로 그리기 ----------------------
function drawPath(points, distanceKm) {
  if (!map || !points || points.length === 0) return;

  // ✅ 기존 경로 지우기
  polylines.forEach(line => line.setMap(null));  // ← polylines만 사용
  polylines = [];

  // 두께 계산 (최소 5, 최대 18)
  let weight = Math.min(18, Math.max(5, Math.floor(distanceKm / 10) + 5));

  // 색상 단계
  let color = "#0000FF"; // 0~20km → 파랑
  if (distanceKm > 20) color = "#FFA500"; // 20~50km → 주황
  if (distanceKm > 50) color = "#00FF00"; // 50~100km → 초록
  if (distanceKm > 100) color = "#FF0000"; // 100km 이상 → 빨강

  const pathLine = new google.maps.Polyline({
    path: points,
    geodesic: true,
    strokeColor: color,
    strokeOpacity: 1.0,
    strokeWeight: weight
  });

  pathLine.setMap(map);
  polylines.push(pathLine);  // ← polylines에만 추가
}

    
// ---------------------- 사용자 패널 내용 업데이트 ----------------------
function updateUserPanelContent(viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];

  if (viewMode === "current") {
    // ✅ 최근 5분 이내 접속자만 추출
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);

  } else if (viewMode === "all") {
    // ✅ 전체 사용자
    users = allData;

  } else if (viewMode === "paths") {
    // ✅ 전체 사용자 경로
    users = allData;
    users.forEach(user => {
      const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
      user.distance = 0;
      if (pathPoints.length > 1) {
        for (let i = 1; i < pathPoints.length; i++) {
          user.distance += calculateDistance(
            pathPoints[i-1].lat, pathPoints[i-1].lng,
            pathPoints[i].lat, pathPoints[i].lng
          );
        }
      }
      if (pathPoints.length > 0) {
        drawPath(pathPoints, user.distance);
      }
    });
  }

  updateTableHeader(viewMode);
  renderUserTable(users, viewMode); // ✅ 항상 전체 목록 출력
}


/* ---------------------- 테이블 헤더 갱신 ---------------------- */
function updateTableHeader(viewMode) {
  const headerRow = document.getElementById("user-table-header");
  if (!headerRow) return;
  headerRow.innerHTML = "";

  if (viewMode === "paths") {
    headerRow.innerHTML = `
      <th>닉네임</th>
      <th>이동<br>거리</th>
      <th>로그인<br>시각</th>
      <th>최근 갱신</th>      
      <th>위도/경도</th>
      <th>주소</th>
    `;
  } else {
    headerRow.innerHTML = `
      <th>닉네임</th>
      <th>상태</th>
      <th>로그인<br>시각</th>
      <th>최근 갱신</th>
      <th>주소</th>
      <th>위도/경도</th>
    `;
  }
}

function getMapIdByDevice() {
  const ua = navigator.userAgent.toLowerCase();
  if (/android/.test(ua)) return CONFIG.mapIds.android;
  if (/iphone|ipad|ipod/.test(ua)) return CONFIG.mapIds.ios;
  if (/windows|macintosh|linux/.test(ua)) return CONFIG.mapIds.javascript;
  return CONFIG.mapIds.fixed;
}

/* ---------------------- 지도 초기화  ---------------------- */
// 라이트 스타일 JSON
const lightStyle = [
  { elementType: "geometry", stylers: [{ color: "#ffffff" }] },
  { elementType: "labels.text.fill", stylers: [{ color: "#000000" }] },
  { elementType: "labels.text.stroke", stylers: [{ color: "#ffffff" }] },
  { featureType: "road", elementType: "geometry", stylers: [{ color: "#cccccc" }] },
  { featureType: "water", elementType: "geometry", stylers: [{ color: "#aadaff" }] }
];

// 다크 스타일 JSON
const darkStyle = [
  { elementType: "geometry", stylers: [{ color: "#212121" }] },
  { elementType: "labels.text.fill", stylers: [{ color: "#757575" }] },
  { elementType: "labels.text.stroke", stylers: [{ color: "#212121" }] },
  { featureType: "road", elementType: "geometry", stylers: [{ color: "#383838" }] },
  { featureType: "water", elementType: "geometry", stylers: [{ color: "#000000" }] }
];

function initMap() {
  originalCenter = { lat: 36.5, lng: 127.5 };

  // 기본 지도 초기화
  map = new google.maps.Map(document.getElementById("map"), {
    center: originalCenter,
    zoom: 7,
    mapTypeId: google.maps.MapTypeId.ROADMAP,
    disableDefaultUI: false,
    mapTypeControl: true,
    mapTypeControlOptions: {
      style: google.maps.MapTypeControlStyle.DEFAULT,
      position: google.maps.ControlPosition.TOP_LEFT
    }
  });

  // ✅ 우클릭 시 초기 위치로 복귀
  google.maps.event.addListener(map, "contextmenu", function () {
    map.setOptions({ center: originalCenter, zoom: 7 });
  });

  // ✅ 데이터 로딩 (정의된 함수가 있어야 함)
  if (typeof loadData === "function") {
    loadData();
    intervalId = setInterval(loadData, 300000);
  }

  // ✅ 라이트/다크 모드 토글
  const themeToggle = document.getElementById("themeToggle");
  if (themeToggle) {
    themeToggle.addEventListener("change", () => {
      if (themeToggle.checked) {
        map.setOptions({ styles: darkStyle });
      } else {
        map.setOptions({ styles: lightStyle });
      }
    });
  }

  // ✅ 일반 지도 버튼
  const defaultMapBtn = document.getElementById("defaultMapBtn");
  if (defaultMapBtn) {
    defaultMapBtn.addEventListener("click", () => {
      map.setMapTypeId(google.maps.MapTypeId.ROADMAP);
      map.setOptions({
        styles: null,
        center: originalCenter,
        zoom: 7
      });
      if (themeToggle) themeToggle.checked = false;
      document.body.classList.remove("dark-mode");
    });
  }
}

window.initMap = initMap;

  const lat = parseFloat(document.getElementById("latInput").value);
  const lng = parseFloat(document.getElementById("lngInput").value);
  if (isNaN(lat) || isNaN(lng)) {
    alert("올바른 위도와 경도를 입력하세요.");

  new google.maps.Marker({
    position: { lat: lat, lng: lng },
    map: map,
    title: "입력한 위치",
    animation: google.maps.Animation.DROP
  });
};

window.setCustomInterval = function() {
  const value = parseInt(document.getElementById("intervalValue").value, 10);
  const unit = document.getElementById("intervalUnit").value;
  let intervalMs = 300000;
  if (unit === "minutes") intervalMs = value * 60000;
  else if (unit === "seconds") intervalMs = value * 1000;

  clearInterval(intervalId);
  intervalId = setInterval(loadData, intervalMs);

  msgBox.textContent = `갱신 주기: ${value} ${unit === "minutes" ? "분" : "초"}`;
  msgBox.style.display = "block";
  setTimeout(() => { msgBox.style.display = "none"; }, 2000);
};


// ---------------------- 관리자 모드 위치 추적 ----------------------
// 특징: 지도 중심은 고정, 마커만 움직임, 방향 레이더(부채꼴) 표시
// ✅ 기본 반경은 50m, 단위는 m (필요시 km로 표시 가능)

// ---------------------- 관리자 모드 위치 추적 ----------------------
let myMarker = null;
let radarPolygon = null;
let radarEnabled = true; // ✅ 레이더 on/off 상태 관리

// ✅ 내부 값은 항상 미터 단위로 저장
let radarRadiusMeters = 50; 
let radarUnit = "m"; // 표시 단위: m 또는 km

// ✅ 단위 변환 함수 (미터 → 도 단위)
function convertToDegrees(meters) {
  return meters / 111000; // 1도 ≈ 111,000m
}

// ✅ 레이더 갱신 함수
function updateRadarPolygon(myPos, heading) {
  if (!radarEnabled) {
    if (radarPolygon) radarPolygon.setMap(null);
    return;
  }

  const angle = 90;
  const points = [];
  const radiusInDegrees = convertToDegrees(radarRadiusMeters);

  for (let a = -angle/2; a <= angle/2; a += 5) {
    const rad = (heading + a) * Math.PI / 180;
    const latOffset = radiusInDegrees * Math.cos(rad);
    const lngOffset = radiusInDegrees * Math.sin(rad);
    points.push({
      lat: myPos.lat + latOffset,
      lng: myPos.lng + lngOffset
    });
  }
  points.unshift(myPos);

  if (radarPolygon) {
    radarPolygon.setPath(points); 
    radarPolygon.setMap(map);
  } else {
    radarPolygon = new google.maps.Polygon({
      paths: points,
      strokeColor: "#00BFFF",
      strokeOpacity: 0.8,
      strokeWeight: 2,
      fillColor: "#00BFFF",
      fillOpacity: 0.25,
      map: map
    });
  }
}

// ✅ 내 위치 추적
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    (pos) => {
      const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const heading = pos.coords.heading || 0;

      if (!myMarker) {
        myMarker = new google.maps.Marker({
          position: myPos,
          map: map,
          title: "내 위치",
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: "#FF0000",
            fillOpacity: 1,
            strokeColor: "#FFFFFF",
            strokeWeight: 2,
            scale: 10
          }
        });
      } else {
        myMarker.setPosition(myPos);
      }

      updateRadarPolygon(myPos, heading);
    },
    (err) => console.error("위치 추적 실패:", err),
    { enableHighAccuracy: true }
  );
}

// ---------------------- 슬라이더/단위 변경 + 버튼 + on/off ----------------------
document.addEventListener("DOMContentLoaded", () => {
  const slider = document.getElementById("radiusSlider");
  const radiusValue = document.getElementById("radiusValue");
  const radiusUnitSelect = document.getElementById("radiusUnit");
  const radarToggle = document.getElementById("radarToggle");
  const btnIncrease = document.getElementById("btnIncrease"); // ➕ 버튼
  const btnDecrease = document.getElementById("btnDecrease"); // ➖ 버튼

  // ✅ 슬라이더는 항상 미터 단위 (min=1, max=300000 → 300km)
  if (slider) {
    slider.min = 1;
    slider.max = 300000;
    slider.value = radarRadiusMeters;

    slider.addEventListener("input", (e) => {
      radarRadiusMeters = parseInt(e.target.value, 10);
      updateDisplay();
      if (myMarker) {
        const pos = myMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ 단위 변경
  if (radiusUnitSelect) {
    radiusUnitSelect.addEventListener("change", (e) => {
      radarUnit = e.target.value;
      updateDisplay();
      if (myMarker) {
        const pos = myMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ on/off 버튼
  if (radarToggle) {
    radarToggle.addEventListener("change", (e) => {
      radarEnabled = e.target.checked;
      if (!radarEnabled && radarPolygon) {
        radarPolygon.setMap(null);
      } else if (radarEnabled && myMarker) {
        const pos = myMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ ➕ 버튼 (미세조정: 1m씩 증가)
  if (btnIncrease) {
    btnIncrease.addEventListener("click", () => {
      radarRadiusMeters += 50;
      if (radarRadiusMeters > 300000) radarRadiusMeters = 300000;
      slider.value = radarRadiusMeters; // ✅ 슬라이더 값도 갱신
      updateDisplay();
      if (myMarker) {
        const pos = myMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ ➖ 버튼 (미세조정: 1m씩 감소)
  if (btnDecrease) {
    btnDecrease.addEventListener("click", () => {
      radarRadiusMeters -= 50;
      if (radarRadiusMeters < 1) radarRadiusMeters = 1;
      slider.value = radarRadiusMeters; // ✅ 슬라이더 값도 갱신
      updateDisplay();
      if (myMarker) {
        const pos = myMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ 표시 업데이트 함수
  function updateDisplay() {
    if (radiusUnit === "m") {
      radiusValue.textContent = radarRadiusMeters + " m";
    } else {
      radiusValue.textContent = (radarRadiusMeters / 1000).toFixed(1) + " km";
    }
  }

  updateDisplay();
});

    
/* ---------------------- 한국표준시 변환 ---------------------- */  
function formatToKST(isoString) {
  if (!isoString) return "-";
  const date = new Date(isoString);
  return date.toLocaleString("ko-KR", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

// ---------------------- 드래그 기능 (locationBox) ----------------------
function makeDraggable(element) {
  let offsetX = 0, offsetY = 0, isDown = false;

  // ▶ PC 드래그 시작
  element.addEventListener('mousedown', (e) => {
    isDown = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = ""; // 오른쪽 고정 해제
  });

  // ▶ PC 드래그 종료
  document.addEventListener('mouseup', () => { isDown = false; });

  // ▶ PC 드래그 이동
  document.addEventListener('mousemove', (e) => {
    if (isDown) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });

  // ▶ 모바일 드래그 시작
  element.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    offsetX = touch.clientX - element.offsetLeft;
    offsetY = touch.clientY - element.offsetTop;
    element.style.right = "";
    isDown = true;
  });

  // ▶ 모바일 드래그 종료
  document.addEventListener('touchend', () => { isDown = false; });

  // ▶ 모바일 드래그 이동
  document.addEventListener('touchmove', (e) => {
    if (isDown) {
      const t = e.touches[0];
      element.style.left = (t.clientX - offsetX) + 'px';
      element.style.top = (t.clientY - offsetY) + 'px';
    }
  });
}

// ---------------------- 패널 드래그 + Snap ----------------------
function makePanelDraggable(panelId) {
  const panel = document.getElementById(panelId);
  const header = panel.querySelector(".panel-header"); // 헤더만 드래그 핸들로 지정
  let isDragging = false, offsetX = 0, offsetY = 0;

  // ▶ PC 드래그 시작
  header.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  // ▶ PC 드래그 이동
  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      panel.style.left = (e.clientX - offsetX) + "px";
      panel.style.top = (e.clientY - offsetY) + "px";
    }
  });

  // ▶ PC 드래그 종료 + Snap 처리
  document.addEventListener("mouseup", () => {
    if (isDragging) {
      isDragging = false;
      const rect = panel.getBoundingClientRect();
      if (rect.left < 50) {
        // 좌측 Snap
        panel.style.left = "0px"; panel.style.right = "auto";
        panel.classList.add("snap-left"); panel.classList.remove("snap-right");
      } else if (window.innerWidth - rect.right < 50) {
        // 우측 Snap → collapsed 상태로 숨김
        panel.style.right = "0px"; panel.style.left = "auto";
        panel.classList.add("collapsed", "snap-right");
        panel.classList.remove("snap-left");
      } else {
        panel.classList.remove("snap-left", "snap-right");
      }
    }
  });

  // ▶ 모바일 드래그 시작
  header.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    offsetX = touch.clientX - panel.offsetLeft;
    offsetY = touch.clientY - panel.offsetTop;
    isDragging = true;
  });

  // ▶ 모바일 드래그 이동
  document.addEventListener("touchmove", (e) => {
    if (isDragging) {
      const t = e.touches[0];
      panel.style.left = (t.clientX - offsetX) + "px";
      panel.style.top = (t.clientY - offsetY) + "px";
    }
  });

  // ▶ 모바일 드래그 종료 + Snap 처리
  document.addEventListener("touchend", () => {
    if (isDragging) {
      isDragging = false;
      const rect = panel.getBoundingClientRect();
      if (rect.left < 50) {
        panel.style.left = "0px"; panel.style.right = "auto";
        panel.classList.add("snap-left"); panel.classList.remove("snap-right");
      } else if (window.innerWidth - rect.right < 50) {
        panel.style.right = "0px"; panel.style.left = "auto";
        panel.classList.add("collapsed", "snap-right");
        panel.classList.remove("snap-left");
      } else {
        panel.classList.remove("snap-left", "snap-right");
      }
    }
  });
}

// ---------------------- 네 면 리사이즈 ----------------------
function makeResizable(panelId) {
  const panel = document.getElementById(panelId);
  const handles = panel.querySelectorAll(".resize-handle");
  let isResizing = false, currentHandle = null;

  function getHandleType(handle) {
    if (handle.classList.contains("left")) return "left";
    if (handle.classList.contains("right")) return "right";
    if (handle.classList.contains("top")) return "top";
    return "bottom";
  }

  // ▶ PC 리사이즈 시작
  handles.forEach(handle => {
    handle.addEventListener("mousedown", () => {
      isResizing = true; currentHandle = getHandleType(handle);
      document.body.style.userSelect = "none";
    });
  });

  // ▶ PC 리사이즈 이동
  document.addEventListener("mousemove", (e) => {
    if (!isResizing) return;
    const rect = panel.getBoundingClientRect();
    if (currentHandle === "right") {
      const newWidth = e.clientX - rect.left;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "left") {
      const newWidth = rect.right - e.clientX;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "bottom") {
      const newHeight = e.clientY - rect.top;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    } else if (currentHandle === "top") {
      const newHeight = rect.bottom - e.clientY;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    }
  });

  // ▶ PC 리사이즈 종료
  document.addEventListener("mouseup", () => {
    isResizing = false; document.body.style.userSelect = "auto";
  });

  // ▶ 모바일 리사이즈 시작
  handles.forEach(handle => {
    handle.addEventListener("touchstart", () => {
      isResizing = true; currentHandle = getHandleType(handle);
      document.body.style.userSelect = "none";
    });
  });

  // ▶ 모바일 리사이즈 이동
  document.addEventListener("touchmove", (e) => {
    if (!isResizing) return;
    const t = e.touches[0];
    const rect = panel.getBoundingClientRect();

    if (currentHandle === "right") {
      const newWidth = t.clientX - rect.left;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "left") {
      const newWidth = rect.right - t.clientX;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "bottom") {
      const newHeight = t.clientY - rect.top;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    } else if (currentHandle === "top") {
      const newHeight = rect.bottom - t.clientY;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    }
  });

  // ▶ 모바일 리사이즈 종료
  document.addEventListener("touchend", () => {
    isResizing = false;
    document.body.style.userSelect = "auto";
  });
}

  const maximizeBtn = document.getElementById("maximize-btn");
  const minimizeBtn = document.getElementById("minimize-btn");
  const closeBtn = document.getElementById("close-user-panel");
  const leftEdge = document.getElementById("left-edge");
  const rightEdge = document.getElementById("right-edge");

  // ---------------------- 최소화 버튼 ----------------------
  minimizeBtn.addEventListener("click", () => {
    // 모든 상태 초기화
    panel.classList.remove("maximized", "collapsed-left", "collapsed-right", "touch-active");

    if (panel.classList.contains("snap-left")) {
      panel.classList.add("collapsed-left");
    } else {
      panel.classList.add("collapsed-right");
    }

    // 인라인 스타일 제거 → CSS 규칙만 적용
    panel.style = "";
  });

  // ---------------------- 최대화 버튼 ----------------------
  maximizeBtn.addEventListener("click", () => {
    if (panel.classList.contains("maximized")) {
      panel.classList.remove("maximized");
      if (panel.classList.contains("snap-left")) {
        panel.classList.add("collapsed-left");
      } else {
        panel.classList.add("collapsed-right");
      }
      panel.style = "";
    } else if (panel.classList.contains("collapsed-left") || panel.classList.contains("collapsed-right")) {
      panel.classList.remove("collapsed-left", "collapsed-right");
      if (window.innerWidth <= 768) {
        panel.style.width = "100%";
        panel.style.height = "40%";
        panel.style.top = "auto";
        panel.style.bottom = "0";
        panel.style.left = "0";
        panel.style.right = "0";
      } else {
        panel.style.width = "600px";
        panel.style.height = "calc(100% - 50px)";
        panel.style.top = "50px";
        panel.style.right = "0";
        panel.style.left = "auto";
        panel.style.bottom = "auto";
      }
    } else {
      panel.classList.add("maximized");
      panel.style.width = "100%";
      panel.style.height = "100%";
      panel.style.top = "0";
      panel.style.left = "0";
      panel.style.right = "0";
      panel.style.bottom = "0";
    }
  });

  // ---------------------- 닫기 버튼 ----------------------
  closeBtn.addEventListener("click", () => {
    panel.classList.remove(
      "open",
      "collapsed-left",
      "collapsed-right",
      "maximized",
      "snap-left",
      "snap-right",
      "touch-active"
    );
    panel.style = "";
  });

  // ---------------------- 끝부분 이벤트 처리 ----------------------
  if (leftEdge) {
    leftEdge.addEventListener("mouseenter", () => {
      if (panel.classList.contains("collapsed-left")) {
        panel.classList.add("touch-active");
      }
    });
    leftEdge.addEventListener("touchstart", () => {
      if (panel.classList.contains("collapsed-left")) {
        panel.classList.add("touch-active");
      }
    });
  }

  if (rightEdge) {
    rightEdge.addEventListener("mouseenter", () => {
      if (panel.classList.contains("collapsed-right")) {
        panel.classList.add("touch-active");
      }
    });
    rightEdge.addEventListener("touchstart", () => {
      if (panel.classList.contains("collapsed-right")) {
        panel.classList.add("touch-active");
      }
    });
  }

  // ---------------------- 드래그 + Snap 기능 적용 ----------------------
  makePanelDraggable("user-panel");

  // ---------------------- 네 면 리사이즈 기능 적용 ----------------------
  makeResizable("user-panel");
});

</script>
