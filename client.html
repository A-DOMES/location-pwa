<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

<!-- 1. config.js 먼저 (CONFIG 객체 정의) -->
<script src="config.js"></script>

<!-- 2. 사용자 코드 -->
<script>
// ---------------------- 전역 변수 ----------------------
let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];

// ---------------------- 거리 계산 함수 ----------------------
function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 6371; // 지구 반지름 (km)
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c; // km
}

// ---------------------- 문자열 기반 색상 함수 ----------------------
function stringToColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
  return "#" + "00000".substring(0, 6 - c.length) + c;
}

/* ---------------------- 데이터 로딩 ---------------------- */
async function loadData(token = null) {
  try {
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);

    const response = await fetch(url);
    allData = await response.json();

    // 드롭다운 갱신
    populatePathSelect();

    // 데이터 정상 수신 후 지도 표시
    showMap();
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    showMessage("⚠️ 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
  }
}

/* ---------------------- 지도 초기화 보조 ---------------------- */
function clearMap() {
  if (markerCluster) {
    markerCluster.clearMarkers();
    markerCluster = null;
  }
  markers.forEach(m => m.setMap(null));
  markers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];
}

/* ---------------------- 지도 표시 ---------------------- */
function showMap() {
  clearMap();
  if (!map) return;

  if (mode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    Object.values(latestByUser).forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
        title: `${user.phone} (${user.status}, ${user.updated})`
      });
      markers.push(marker);
    });

  } else if (mode === "all") {
    allData.forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        title: `${user.phone} (${user.status}, ${user.time})`
      });
      markers.push(marker);
    });

  } else if (mode === "paths") {
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";

    let users = allData;
    if (selectedPhone !== "all") {
      users = allData.filter(u => u.phone === selectedPhone);
    }

    users.forEach(user => {
      const pathCoords = [];
      for (let j = 0; j < user.path.length; j += 2) {
        const lat = user.path[j];
        const lng = user.path[j + 1];
        if (lat && lng) pathCoords.push({ lat, lng });
      }
      if (pathCoords.length > 0) {
        const polyline = new google.maps.Polyline({
          path: pathCoords,
          geodesic: true,
          strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
          strokeOpacity: 1.0,
          strokeWeight: 2,
          map: map
        });
        polylines.push(polyline);

        const last = pathCoords[pathCoords.length - 1];
        const marker = new google.maps.Marker({
          position: last,
          map: map,
          title: `${user.phone} / ${user.updated}`,
          icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
        });
        markers.push(marker);
      }
    });
  }

  if (document.getElementById("clusterOption")?.checked) {
    markerCluster = new markerClusterer.MarkerClusterer({ map: map, markers: markers });
  }
  updateUserPanelContent(mode);
}

// ---------------------- 사용자 패널 ----------------------
document.addEventListener("DOMContentLoaded", () => {
  /* ---------------------- 패널 동작 ---------------------- */
  const btnConnection = document.getElementById("btn-connection");
  const btnSettings = document.getElementById("btn-settings");
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");

  btnConnection.onclick = () => {
    settingsPanel.classList.remove("open");
    connectionPanel.classList.toggle("open");
  };

  btnSettings.onclick = () => {
    connectionPanel.classList.remove("open");
    settingsPanel.classList.toggle("open");
  };

// 기존 function openUserPanel(viewMode) { ... } 대신
window.openUserPanel = function(viewMode) {
  connectionPanel.classList.remove("open");
  settingsPanel.classList.remove("open");
  userPanel.classList.add("open");

  const title = document.getElementById("user-panel-title");
  if (viewMode === "current") title.textContent = "현재 접속자";
  else if (viewMode === "all") title.textContent = "전체 사용자";
  else if (viewMode === "paths") title.textContent = "경로 보기";

  updateUserPanelContent(viewMode);
};

// 닫기 버튼 이벤트도 전역으로 연결
document.getElementById("close-user-panel").onclick = () => {
  userPanel.classList.remove("open");
};

  // path 배열을 lat/lng 쌍으로 변환
  function parsePathArray(pathArray) {
    const points = [];
    for (let i = 0; i < pathArray.length; i += 2) {
      const lat = parseFloat(pathArray[i]);
      const lng = parseFloat(pathArray[i+1]);
      if (!isNaN(lat) && !isNaN(lng)) {
        points.push({ lat, lng });
      }
    }
    return points;
  }

/* ---------------------- 사용자 패널 내용 업데이트 ---------------------- */
function updateUserPanelContent(viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];

  if (viewMode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);

  } else if (viewMode === "all") {
    users = allData;

  } else if (viewMode === "paths") {
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";
    users = selectedPhone === "all" ? allData : allData.filter(u => u.phone === selectedPhone);

    // ✅ 드롭다운 채우기
    populateUserDropdown(allData);

    // 전체 선택 모드일 때 총 이동 거리 표시
    if (selectedPhone === "all") {
      const totalDistance = users.reduce((sum, u) => {
        const pathPoints = Array.isArray(u.path) ? parsePathArray(u.path) : [];
        let dist = 0;
        if (pathPoints.length > 1) {
          for (let i = 1; i < pathPoints.length; i++) {
            dist += calculateDistance(
              pathPoints[i-1].lat, pathPoints[i-1].lng,
              pathPoints[i].lat, pathPoints[i].lng
            );
          }
        }
        return sum + dist;
      }, 0);

      const row = document.createElement("tr");
      row.innerHTML = `
        <td colspan="6" style="font-weight:bold; background:#eef;">
          전체 사용자 총 이동 거리: ${totalDistance.toFixed(2)} km
        </td>
      `;
      tbody.appendChild(row);
    }

    // 사용자별 distance 계산
    users.forEach(user => {
      const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
      user.distance = 0;
      if (pathPoints.length > 1) {
        for (let i = 1; i < pathPoints.length; i++) {
          user.distance += calculateDistance(
            pathPoints[i-1].lat, pathPoints[i-1].lng,
            pathPoints[i].lat, pathPoints[i].lng
          );
        }
      }
    });
  }

  // ✅ 헤더 갱신 + 테이블 출력
  updateTableHeader(viewMode);
  renderUserTable(users, viewMode);
}

/* ---------------------- 드롭다운 사용자 목록 ---------------------- */  
function populateUserDropdown(users) {
  const select = document.getElementById("path-user-select");
  if (!select) return;

  // 기존 옵션 초기화
  select.innerHTML = "";

  // 전체 보기 옵션 추가
  const allOption = document.createElement("option");
  allOption.value = "all";
  allOption.textContent = "전체";
  select.appendChild(allOption);

  // 사용자별 옵션 추가
  users.forEach(user => {
    const option = document.createElement("option");
    option.value = user.phone;
    option.textContent = user.phone; // 닉네임/전화번호 등 원하는 표시값
    select.appendChild(option);
  });
}

/* ---------------------- 선택한 사용자 위치로 지도 이동 ---------------------- */  
document.getElementById("path-user-select").addEventListener("change", e => {
  const selectedPhone = e.target.value;
  if (selectedPhone === "all") return; // 전체 모드일 때는 이동하지 않음

  const user = allData.find(u => u.phone === selectedPhone);
  if (user && user.lat && user.lng) {
    map.setCenter({ lat: user.lat, lng: user.lng });
    map.setZoom(15);
  }
});

/* ---------------------- 패널에서 특정 사용자 클릭 시 지도 이동 ---------------------- */  
window.renderUserTable = function(users, viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  tbody.innerHTML = "";

  users.forEach(user => {
    const row = document.createElement("tr");

    if (viewMode === "paths") {
      row.innerHTML = `
        <td>${user.phone || "-"}</td>
        <td>${user.address || "-"}</td>
        <td>${user.time ? formatToKST(user.time) : "-"}</td>
        <td>${user.updated ? formatToKST(user.updated) : "-"}</td>
        <td>${user.distance ? user.distance.toFixed(2) + " km" : "-"}</td>
        <td>
          ${user.lat ? user.lat.toFixed(5) : "-"}<br>
          ${user.lng ? user.lng.toFixed(5) : "-"}
        </td>
      `;
    } else {
      row.innerHTML = `
        <td>${user.phone || "-"}</td>
        <td>${user.status || "-"}</td>
        <td>${user.time ? formatToKST(user.time) : "-"}</td>
        <td>${user.updated ? formatToKST(user.updated) : "-"}</td>
        <td>${user.address || "-"}</td>
        <td>
          ${user.lat ? user.lat.toFixed(5) : "-"}<br>
          ${user.lng ? user.lng.toFixed(5) : "-"}
        </td>
      `;
    }

    // ✅ 행 클릭 시 지도 이동
    row.addEventListener("click", () => {
      if (user.lat && user.lng) {
        map.setCenter({ lat: user.lat, lng: user.lng });
        map.setZoom(15);
        new google.maps.Marker({
          position: { lat: user.lat, lng: user.lng },
          map: map,
          title: `사용자: ${user.phone}`,
          animation: google.maps.Animation.BOUNCE
        });
      }
    });

    tbody.appendChild(row);
  });
};

/* ---------------------- 지도에서 특정 사용자 위치로 이동 ---------------------- */
window.focusOnUser = function(lat, lng) {
  map.setCenter({ lat: lat, lng: lng });

if (btnLocation) {

      <button onclick="setCustomInterval()" 
              style="font-size:18px; padding:6px 12px;">적용</button>
    </div>
  </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
    </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </div>
  </div>

<!-- 사용자 정보 패널 -->
<div id="user-panel">
  <div class="panel-header">
    <h3 id="user-panel-title">사용자 정보</h3>
    <button id="close-user-panel">✖ 닫기</button>
  </div>
  <!-- 경로 선택 드롭다운 -->
  <div id="path-select-container">
    <label for="path-user-select">경로 보기 선택:</label>
    <select id="path-user-select" onchange="updateUserPanelContent('paths')">
      <option value="all">전체</option>
    </select>
  </div>

  
    <!-- 사용자 목록 테이블 -->
    <div id="user-content">
      <table id="user-table">
        <thead>
          <tr id="user-table-header">
            <!-- JS에서 모드별로 헤더를 동적으로 채움 -->
          </tr>
        </thead>
        <tbody id="user-table-body">
          <!-- JS에서 사용자 목록을 동적으로 추가 -->
        </tbody>
      </table>
    </div>
  </div>

<!-- 지도 영역 -->
<div id="map"></div>

<div id="message-box"></div>
