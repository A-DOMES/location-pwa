<!DOCTYPE html>

  <!-- 1. config.js 먼저 (CONFIG 객체 정의) -->
  <script src="config.js"></script>

  <!-- 2. 사용자 코드 -->
  <script>
  // ---------------------- 전역 변수 ----------------------
  let map, mode = "current", markers = [], markerCluster, intervalId, allData = [];
  let polylines = []; // 경로 Polyline 저장 배열
  let geoWatchId = null;
  let originalCenter;  // 초기 중심 좌표
  let marker, currentLat, currentLng;
    
  // ---------------------- 마커 제거 함수 ----------------------
  function clearMarkers() {
    markers.forEach(m => m.setMap(null));
    markers = [];
  }

  // ---------------------- 거리 계산 함수 ----------------------
  function calculateDistance(lat1, lng1, lat2, lng2) {
    const R = 6371; // 지구 반지름 (km)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  // ---------------------- 문자열 기반 색상 함수 ----------------------
  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "#" + "00000".substring(0, 6 - c.length) + c;
  }

// ---------------------- 데이터 로딩 ----------------------
async function loadData(token = null) {
  try {
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);

    const response = await fetch(url);
    allData = await response.json();

    // 드롭다운 갱신
    populatePathSelect();

    // ✅ 데이터 정상 수신 후 지도 표시
    showMap();

    // ✅ 위치 정보 박스 갱신
    if (allData.length > 0) {
      const user = allData[0]; // 첫 번째 사용자 기준
      const locationBox = document.getElementById("locationBox");
      locationBox.innerHTML = `
        현재 위치: <br>
        위도: ${user.lat ? user.lat.toFixed(6) : "-"} <br>
        경도: ${user.lng ? user.lng.toFixed(6) : "-"} <br>
        주소: ${user.address || "-"} <br>
        <button id="shareBtn">현재 위치 공유</button>
      `;

      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) {
        shareBtn.onclick = async () => {
          const shareUrl =
            `https://www.google.com/maps/search/?api=1&query=${user.lat},${user.lng}`;
          await navigator.clipboard.writeText(shareUrl);

          // ✅ 공유 팝업 표시
          const popup = document.getElementById("popupMessage");
          popup.style.display = "block";
          popup.style.opacity = "1";
          setTimeout(() => {
            popup.style.opacity = "0";
            setTimeout(() => { popup.style.display = "none"; }, 2000);
          }, 3000);
        };
      }
    } else {
      document.getElementById("locationBox").innerHTML =
        "❌ 위치 데이터를 불러올 수 없습니다.";
    }
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    showMessage("⚠️ 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
  }
}


  // ---------------------- 갱신 주기 설정 ----------------------
  function setCustomInterval() {
    const value = parseInt(document.getElementById("intervalValue").value);
    const unit = document.getElementById("intervalUnit").value;

    if (isNaN(value) || value <= 0) {
      alert("1 이상의 값을 입력하세요.");
      return;
    }

    let newInterval = unit === "seconds" ? value * 1000 : value * 60000;

    clearInterval(intervalId);
    intervalId = setInterval(loadData, newInterval);

    const msgBox = document.getElementById("message-box");
    msgBox.textContent = `갱신 주기: ${value} ${unit === "minutes" ? "분" : "초"}`;
    msgBox.style.display = "block";
    setTimeout(() => { msgBox.style.display = "none"; }, 2000);

// ---------------------- 지도 표시 ----------------------
function showMap() {
  clearMap();
  if (!map) return;

  // ✅ 모드별 커스텀 마커 아이콘 정의
  const iconCurrent = {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: "#0000FF",   // 파랑
    fillOpacity: 1,
    strokeColor: "#FFFFFF",
    strokeWeight: 2,
    scale: 12
  };

  const iconAll = {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: "#FF0000",   // 빨강
    fillOpacity: 1,
    strokeColor: "#FFFFFF",
    strokeWeight: 2,
    scale: 12
  };

  const iconPaths = {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: "#00CC00",   // 초록
    fillOpacity: 1,
    strokeColor: "#FFFFFF",
    strokeWeight: 2,
    scale: 12
  };

  if (mode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    Object.values(latestByUser).forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        icon: iconCurrent,
        title: `${user.phone} (${user.status}, ${user.updated})`,
        animation: google.maps.Animation.BOUNCE
      });
      markers.push(marker);

      // ✅ 마커 클릭 시 위치 박스 갱신
      marker.addListener("click", () => {
        updateLocationBox(user);
        document.getElementById("locationBox").style.display = "block"; // 팝업 표시
      });
    });

  } else if (mode === "all") {
    allData.forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        icon: iconAll,
        title: `${user.phone} (${user.status}, ${user.time})`,
        animation: google.maps.Animation.BOUNCE
      });
      markers.push(marker);

      // ✅ 마커 클릭 시 위치 박스 갱신
      marker.addListener("click", () => {
        updateLocationBox(user);
        document.getElementById("locationBox").style.display = "block"; // 팝업 표시
      });
    });

  } else if (mode === "paths") {
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";

    let users = allData;
    if (selectedPhone !== "all") {
      users = allData.filter(u => u.phone === selectedPhone);
    }

    users.forEach(user => {
      const pathCoords = [];
      for (let j = 0; j < user.path.length; j += 2) {
        const lat = user.path[j];
        const lng = user.path[j + 1];
        if (lat && lng) pathCoords.push({ lat, lng });
      }
      if (pathCoords.length > 0) {
        const polyline = new google.maps.Polyline({
          path: pathCoords,
          geodesic: true,
          strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
          strokeOpacity: 1.0,
          strokeWeight: 2,
          map: map
        });
        polylines.push(polyline);

        const last = pathCoords[pathCoords.length - 1];
        const marker = new google.maps.Marker({
          position: last,
          map: map,
          icon: iconPaths,
          title: `${user.phone} / ${user.updated}`,
          animation: google.maps.Animation.BOUNCE
        });
        markers.push(marker);

        // ✅ 마커 클릭 시 위치 박스 갱신
        marker.addListener("click", () => {
          updateLocationBox(user);
          document.getElementById("locationBox").style.display = "block"; // 팝업 표시
        });
      }
    });
  }

  if (document.getElementById("clusterOption")?.checked) {
    markerCluster = new markerClusterer.MarkerClusterer({ map: map, markers: markers });
  }
  
  // ✅ 위치 정보 박스 갱신 추가 (첫 화면에도 적용)
  if (allData.length > 0) {
    const user = allData[0]; // 첫 번째 사용자 기준
    updateLocationBox(user); // 최신 버전 호출 (핀셋+닉네임 포함)
    document.getElementById("locationBox").style.display = "block"; // 팝업 표시
  } else {
    document.getElementById("locationBox").innerHTML =
      "❌ 위치 데이터를 불러올 수 없습니다.";
  }
  
  updateUserPanelContent(mode);
  }

  // ---------------------- 사용자 패널 ----------------------
  document.addEventListener("DOMContentLoaded", () => {
    const btnConnection = document.getElementById("btn-connection");
    const btnSettings = document.getElementById("btn-settings");
    const connectionPanel = document.getElementById("connection-panel");
    const settingsPanel = document.getElementById("settings-panel");
    const userPanel = document.getElementById("user-panel");
    const select = document.getElementById("path-user-select");

    // ✅ 드롭다운 선택 이벤트
    if (select) {
      select.addEventListener("change", e => {
        const selectedPhone = e.target.value;
        const title = document.getElementById("user-panel-title");

        if (selectedPhone === "all") {
          updateUserPanelContent("all");
          renderUserTable(allData, "all");
        } else {
          const user = allData.find(u => u.phone === selectedPhone);
          if (user) {
            const modeForTable = (title && title.textContent === "위치/경로 보기") ? "paths" : "current";
            updateUserPanelContent(modeForTable);
            renderUserTable([user], modeForTable);

            if (modeForTable === "paths") {
              const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
              if (pathPoints.length > 0) {
                let distanceKm = 0;
                for (let i = 1; i < pathPoints.length; i++) {
                  distanceKm += calculateDistance(
                    pathPoints[i-1].lat, pathPoints[i-1].lng,
                    pathPoints[i].lat, pathPoints[i].lng
                  );
                }
                drawPath(pathPoints, distanceKm);
              }
            } else {
              moveToUser(user.lat, user.lng, user.phone);
            }
          } else {
            renderUserTable([], "current");
          }
        }
      });
    }

    // ✅ 버튼 이벤트
    btnConnection.onclick = () => {
      settingsPanel.classList.remove("open");
      connectionPanel.classList.toggle("open");
    };

    btnSettings.onclick = () => {
      connectionPanel.classList.remove("open");
      settingsPanel.classList.toggle("open");
    };

    // ✅ 닫기 버튼 이벤트
    const closeBtn = document.getElementById("close-user-panel");
    if (closeBtn) {
      closeBtn.onclick = () => {
        userPanel.classList.remove("open");
      };
    }
  });
    

// ---------------------- 사용자 패널 열기 ----------------------

  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");

  // 다른 패널 닫기
  connectionPanel?.classList.remove("open");
  settingsPanel?.classList.remove("open");
  userPanel?.classList.add("open");

  // 모드 갱신
  mode = viewMode;

  // ✅ 기존 마커/경로 제거
  clearMarkers();
  polylines.forEach(line => line.setMap(null));  // ← polylines만 사용
  polylines = [];

  // 패널 제목 갱신
  const title = document.getElementById("user-panel-title");
  if (title) {
    if (viewMode === "current") title.textContent = "현재 접속자";
    else if (viewMode === "all") title.textContent = "전체 사용자";
    else if (viewMode === "paths") title.textContent = "위치/경로 보기";
  }

  // 패널 내용 갱신
  updateUserPanelContent(viewMode);
};

// ---------------------- path 배열 변환 ----------------------
function parsePathArray(pathArray) {
  const points = [];
  for (let i = 0; i < pathArray.length; i += 2) {
    const lat = parseFloat(pathArray[i]);
    const lng = parseFloat(pathArray[i+1]);
    if (!isNaN(lat) && !isNaN(lng)) {
      points.push({ lat, lng });
    }
  }
  return points;
}

// ---------------------- 경로 그리기 ----------------------
function drawPath(points, distanceKm) {
  if (!map || !points || points.length === 0) return;

  // ✅ 기존 경로 지우기
  polylines.forEach(line => line.setMap(null));  // ← polylines만 사용
  polylines = [];

  // 두께 계산 (최소 5, 최대 18)
  let weight = Math.min(18, Math.max(5, Math.floor(distanceKm / 10) + 5));

  // 색상 단계
  let color = "#0000FF"; // 0~20km → 파랑
  if (distanceKm > 20) color = "#FFA500"; // 20~50km → 주황
  if (distanceKm > 50) color = "#00FF00"; // 50~100km → 초록
  if (distanceKm > 100) color = "#FF0000"; // 100km 이상 → 빨강

  const pathLine = new google.maps.Polyline({
    path: points,
    geodesic: true,
    strokeColor: color,
    strokeOpacity: 1.0,
    strokeWeight: weight
  });

  pathLine.setMap(map);
  polylines.push(pathLine);  // ← polylines에만 추가
}

    
// ---------------------- 사용자 패널 내용 업데이트 ----------------------
function updateUserPanelContent(viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];

  if (viewMode === "current") {
    // ✅ 최근 5분 이내 접속자만 추출
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);

  } else if (viewMode === "all") {
    // ✅ 전체 사용자
    users = allData;

  } else if (viewMode === "paths") {
    // ✅ 전체 사용자 경로
    users = allData;
    users.forEach(user => {
      const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
      user.distance = 0;
      if (pathPoints.length > 1) {
        for (let i = 1; i < pathPoints.length; i++) {
          user.distance += calculateDistance(
            pathPoints[i-1].lat, pathPoints[i-1].lng,
            pathPoints[i].lat, pathPoints[i].lng
          );
        }
      }
      if (pathPoints.length > 0) {
        drawPath(pathPoints, user.distance);
      }
    });
  }

  updateTableHeader(viewMode);
  renderUserTable(users, viewMode); // ✅ 항상 전체 목록 출력
}


/* ---------------------- 테이블 헤더 갱신 ---------------------- */

  if (viewMode === "paths") {

      <th>위도/경도</th>
      <th>주소</th>
    `;
  } else {
    headerRow.innerHTML = `
      <th>닉네임</th>
      <th>상태</th>
      <th>로그인<br>시각</th>
      <th>최근 갱신</th>
      <th>주소</th>
      <th>위도/경도</th>
    `;
  }
}

function getMapIdByDevice() {
  const ua = navigator.userAgent.toLowerCase();
  if (/android/.test(ua)) return CONFIG.mapIds.android;
  if (/iphone|ipad|ipod/.test(ua)) return CONFIG.mapIds.ios;
  if (/windows|macintosh|linux/.test(ua)) return CONFIG.mapIds.javascript;
  return CONFIG.mapIds.fixed;
}



function initMap() {
  const mapId = getMapIdByDevice();

  // ✅ 초기 중심 좌표 지정 (큰 그림용)
  originalCenter = { lat: 36.5, lng: 127.5 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: originalCenter,
    zoom: 7,
    mapId: mapId
  });

  // ✅ 우클릭 시 원래 위치로 복귀
  google.maps.event.addListener(map, 'contextmenu', function() {
    console.log("우클릭 이벤트 발생!");
    map.setOptions({ center: originalCenter, zoom: 7 });
  });

  // ✅ 데이터 로딩 시작
  loadData();
  intervalId = setInterval(loadData, 300000); // 기본 5분
}

window.initMap = initMap;



/* ---------------------- 위치찾기 기능 ---------------------- */

// ---------------------- 관리자 모드 위치 추적 ----------------------
// 특징: 지도 중심은 고정, 마커만 움직임, 방향 레이더(부채꼴) 표시
// ✅ 기본 반경은 50m, 단위는 m (필요시 km로 변경 가능)

let myMarker = null;
let radarPolygon = null;

// ✅ 기본값: 50m, 단위는 m
let radarRadius = 50; 
let radarUnit = "m"; // 기본 단위: m → 필요시 "km"로 변경

// ✅ 단위 변환 함수 (m 또는 km → 도 단위)
function convertToDegrees(value, unit) {
  // 1도 ≈ 111,000m
  if (unit === "m") {
    return value / 111000;
  } else if (unit === "km") {
    return (value * 1000) / 111000;
  }
  return value / 111000; // 기본 m 처리
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    (pos) => {
      const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const heading = pos.coords.heading || 0; // 방향 값 (북쪽 기준, 일부 기기만 지원)

      // ✅ 내 위치 마커 (빨간 원형)
      if (!myMarker) {
        myMarker = new google.maps.Marker({
          position: myPos,
          map: map,
          title: "내 위치",
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            fillColor: "#FF0000",
            fillOpacity: 1,
            strokeColor: "#FFFFFF",
            strokeWeight: 2,
            scale: 10
          }
        });
      } else {
        myMarker.setPosition(myPos); // 마커 위치 갱신
      }

      // ✅ 방향 레이더 (부채꼴)
      const angle = 90;   // 부채꼴 각도
      const points = [];

      // ✅ 반경을 도 단위로 변환 (기본값 50m)
      const radiusInDegrees = convertToDegrees(radarRadius, radarUnit);

      for (let a = -angle/2; a <= angle/2; a += 5) {
        const rad = (heading + a) * Math.PI / 180;
        const latOffset = radiusInDegrees * Math.cos(rad);
        const lngOffset = radiusInDegrees * Math.sin(rad);
        points.push({
          lat: myPos.lat + latOffset,
          lng: myPos.lng + lngOffset
        });
      }
      points.unshift(myPos);

      if (radarPolygon) {
        radarPolygon.setPath(points); // 기존 레이더 갱신
      } else {
        radarPolygon = new google.maps.Polygon({
          paths: points,
          strokeColor: "#00BFFF",
          strokeOpacity: 0.8,
          strokeWeight: 2,
          fillColor: "#00BFFF",
          fillOpacity: 0.25,
          map: map
        });
      }
    },
    (err) => console.error("위치 추적 실패:", err),
    { enableHighAccuracy: true }
  );
}


    
/* ---------------------- 한국표준시 변환 ---------------------- */  
function formatToKST(isoString) {
  if (!isoString) return "-";
  const date = new Date(isoString);
  return date.toLocaleString("ko-KR", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

// ---------------------- 드래그 기능 (locationBox) ----------------------
function makeDraggable(element) {
  let offsetX = 0, offsetY = 0, isDown = false;

  element.addEventListener('mousedown', (e) => {
    isDown = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = ""; // 오른쪽 고정 해제
  });

  document.addEventListener('mouseup', () => {
    isDown = false;
  });

  document.addEventListener('mousemove', (e) => {
    if (isDown) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });
}

// ✅ locationBox에 드래그 기능 적용

// ---------------------- 패널 드래그 + Snap + Dock ----------------------
function makePanelDraggable(panelId, dockId) {
  const panel = document.getElementById(panelId);
  const dockIcon = document.getElementById(dockId);
  const header = panel.querySelector(".panel-header"); // ← 헤더만 드래그 핸들로 지정
  let isDragging = false, offsetX = 0, offsetY = 0;

  // 헤더에서만 드래그 시작
  header.addEventListener("mousedown", (e) => {
    if (e.target.id === dockId) return; // Dock 아이콘 클릭은 제외
    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      panel.style.left = (e.clientX - offsetX) + "px";
      panel.style.top = (e.clientY - offsetY) + "px";
    }
  });

  document.addEventListener("mouseup", () => {
    if (isDragging) {
      isDragging = false;
      const rect = panel.getBoundingClientRect();

      if (rect.left < 50) {
        // 좌측 Snap
        panel.style.left = "0px";
        panel.style.right = "auto";
        panel.classList.add("snap-left");
        panel.classList.remove("snap-right");
      } else if (window.innerWidth - rect.right < 50) {
        // 우측 Snap
        panel.style.right = "0px";
        panel.style.left = "auto";
        panel.classList.add("snap-right");
        panel.classList.remove("snap-left");
      } else {
        panel.classList.remove("snap-left", "snap-right");
      }
    }
  });
}


// ---------------------- 네 면 리사이즈 ----------------------
function makeResizable(panelId) {
  const panel = document.getElementById(panelId);
  const handles = panel.querySelectorAll(".resize-handle");
  let isResizing = false, currentHandle = null;

  // 각 핸들에 mousedown 이벤트 연결
  handles.forEach(handle => {
    handle.addEventListener("mousedown", (e) => {
      isResizing = true;
      currentHandle = handle.classList.contains("left") ? "left" :
                      handle.classList.contains("right") ? "right" :
                      handle.classList.contains("top") ? "top" : "bottom";
      document.body.style.userSelect = "none"; // 드래그 중 텍스트 선택 방지
    });
  });

  // 마우스 이동 시 리사이즈 처리
  document.addEventListener("mousemove", (e) => {
    if (!isResizing) return;
    const rect = panel.getBoundingClientRect();

    if (currentHandle === "right") {
      // ▶ 우측 핸들: 왼쪽 기준으로 너비 계산
      const newWidth = e.clientX - rect.left;
      if (newWidth > 200) {
        panel.style.width = newWidth + "px";
      }
    } else if (currentHandle === "left") {
      // ▶ 좌측 핸들: 오른쪽 끝 기준으로 너비 계산
      const newWidth = rect.right - e.clientX;
      if (newWidth > 200) {
        panel.style.width = newWidth + "px";
        // ❌ left/top은 건드리지 않음 → 이동처럼 보이지 않도록
      }
    } else if (currentHandle === "bottom") {
      // ▶ 하단 핸들: 위쪽 기준으로 높이 계산
      const newHeight = e.clientY - rect.top;
      if (newHeight > 100) {
        panel.style.height = newHeight + "px";
      }
    } else if (currentHandle === "top") {
      // ▶ 상단 핸들: 아래쪽 끝 기준으로 높이 계산
      const newHeight = rect.bottom - e.clientY;
      if (newHeight > 100) {
        panel.style.height = newHeight + "px";
        // ❌ top/bottom은 건드리지 않음 → 이동처럼 보이지 않도록
      }
    }
  });

  // 마우스 놓으면 리사이즈 종료
  document.addEventListener("mouseup", () => {
    isResizing = false;
    document.body.style.userSelect = "auto";
  });
}


// ---------------------- 사용자 패널 초기화 ----------------------
document.addEventListener("DOMContentLoaded", () => {
  const panel = document.getElementById("user-panel");
  const dockIcon = document.getElementById("dock-icon-user");
  const maximizeBtn = document.getElementById("maximize-btn");
  const closeBtn = document.getElementById("close-user-panel");

  // 숨기기/펼치기 (Dock 아이콘 클릭 시 패널 접기/펼치기)
  dockIcon.addEventListener("click", () => {
    panel.classList.toggle("collapsed");
  });

  // 최대화 ↔ 최소화 (토글)
  maximizeBtn.addEventListener("click", () => {
    if (panel.classList.contains("maximized")) {
      // ✅ 최소화 → 원래 상태로 복귀
      panel.classList.remove("maximized");

      if (window.innerWidth <= 768) {
        // 모바일: 하단 40% 차지
        panel.style.width = "100%";
        panel.style.height = "40%";
        panel.style.top = "auto";
        panel.style.bottom = "0";
        panel.style.left = "0";
        panel.style.right = "0";
      } else {
        // 데스크톱: 오른쪽 600px 폭
        panel.style.width = "600px";
        panel.style.height = "calc(100% - 50px)";
        panel.style.top = "50px";
        panel.style.right = "0";
        panel.style.left = "auto";
        panel.style.bottom = "auto";
      }
    } else {
      // ✅ 최대화
      panel.classList.add("maximized");
      panel.style.width = "100%";
      panel.style.height = "100%";
      panel.style.top = "0";
      panel.style.left = "0";
      panel.style.right = "0";
      panel.style.bottom = "0";
    }
  });

  // 닫기 버튼 → 패널 숨기기
  closeBtn.addEventListener("click", () => {
    panel.classList.remove("open");  // ← display:none 대신 클래스 제거
  });

  // 드래그 + Snap 기능 적용
  makePanelDraggable("user-panel", "dock-icon-user");

  // 네 면 리사이즈 기능 적용
  makeResizable("user-panel");
});

   ✅ 사용자 패널 (Dock/최대화/리사이즈)
   =========================== */
#user-panel { position:fixed; top:50px; right:0; width:600px; height:calc(100% - 50px); background:#fff;
              border-left:1px solid #ccc; display:none; z-index:3000; padding:20px; overflow-y:auto; font-size:15px; }
#user-panel.open { display:block; }
#user-panel.collapsed { width:40px; height:40px; overflow:hidden; }
#user-panel.maximized { width:100% !important; height:100% !important; top:0 !important; left:0 !important; right:0 !important; bottom:0 !important; }
#user-panel.snap-left { left:0; right:auto; }
#user-panel.snap-right { right:0; left:auto; }
.panel-header { height:50px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center; padding:0 10px; cursor:move; }
.panel-content { height:calc(100% - 50px); overflow-y:scroll; padding:10px; }
#close-user-panel { background-color:#555; color:#fff; border:none; border-radius:4px; padding:6px 12px; font-size:14px; cursor:pointer; }

/* 리사이즈 핸들 */
.resize-handle { position:absolute; background:transparent; z-index:10; }
.resize-handle.left   { left:0; top:0; width:6px; height:100%; cursor:ew-resize; }
.resize-handle.right  { right:0; top:0; width:6px; height:100%; cursor:ew-resize; }
.resize-handle.top    { top:0; left:0; width:100%; height:6px; cursor:ns-resize; }
.resize-handle.bottom { bottom:0; left:0; width:100%; height:6px; cursor:ns-resize; }
.resize-handle:hover  { background:rgba(0,0,0,0.1); }

/* ===========================
   ✅ 사용자 테이블
   =========================== */
#user-table { width:100%; border-collapse:collapse; margin-top:10px; }
#user-table th, #user-table td { border:1px solid #ccc; padding:8px; text-align:center; }
#user-table th { background:#f5f5f5; font-weight:bold; }

/* ===========================
   ✅ 메시지 박스
   =========================== */
#message-box { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); background:#333; color:#fff;
               padding:8px 16px; border-radius:4px; display:none; z-index:4000; font-size:16px; }

/* ===========================
   ✅ 라이트/다크 모드
   =========================== */
body.dark-mode { background-color:#121212; color:#e0e0e0; }
body.dark-mode #top-bar { background:#333; color:#fff; }
body.dark-mode .dropdown-panel { background:#222; color:#ddd; }
body.dark-mode .menu-btn { background:#444; color:#fff; }

/* ===========================
   ✅ 모바일 반응형 (세로 모드: portrait)
   =========================== */
@media (max-width:768px) and (orientation:portrait) {
  /* 사용자 패널: 하단 40% 차지 */
  #user-panel {
    width:100%;
    height:40%;
    bottom:0;
    top:auto;
    border-left:none;
    border-top:1px solid #ccc;
    border-radius:12px 12px 0 0;
  }
  .user-card { font-size:16px; padding:14px; }
  .user-name { font-size:18px; }
  .menu-btn { padding:10px 16px; font-size:18px; }
  #message-box { font-size:18px; }

  /* 위치 박스: 하단 배치 */
  #locationBox {
    top:auto;
    bottom:60px;
    right:10px;
    left:10px;
    width:auto;
    max-width:90%;
  }
  #popupMessage {
    top:auto;
    bottom:120px;
    font-size:16px;
    padding:12px 18px;
  }
}

/* ===========================
   ✅ 모바일 반응형 (가로 모드: landscape)
   =========================== */
@media (max-width:768px) and (orientation:landscape) {
  /* 사용자 패널: 오른쪽 50% 차지 */
  #user-panel {
    width:50%;
    height:calc(100% - 50px);
    top:50px;
    right:0;
    border-left:1px solid #ccc;
    border-top:none;
    border-radius:0;
  }
  .user-card { font-size:15px; padding:12px; }
  .user-name { font-size:16px; }
  .menu-btn { padding:8px 14px; font-size:16px; }
  #message-box { font-size:16px; }

  /* 위치 박스: 오른쪽 상단 배치 */
  #locationBox {
    top:70px;
    right:10px;
    left:auto;
    width:45%;
    max-width:45%;
  }
  #popupMessage {
    top:70px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    padding:10px 14px;
  }
}

  
</style>
</head>

  <!-- ✅ 라이트/다크 스타일 JSON 정의 -->
  <script>
    const lightStyle = [
      { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
      { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#616161" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#f5f5f5" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#dadada" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9e6ff" }] },
      { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#dcedc8" }] }
    ];

    const darkStyle = [
      { elementType: "geometry", stylers: [{ color: "#212121" }] },
      { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#757575" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#212121" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#383838" }] },
      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#616161" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0f1c2c" }] },
      { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#1b5e20" }] }
    ];

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7,
        mapTypeId: "roadmap",   // ✅ 기본은 일반지도
        styles: null,           // ✅ 스타일 적용하지 않음
        mapTypeControl: true,
        mapTypeControlOptions: {
          style: google.maps.MapTypeControlStyle.DEFAULT,
          position: google.maps.ControlPosition.TOP_RIGHT,
          mapTypeIds: ["roadmap", "satellite"]
        }
      });

      // 벡터지도 라이트/다크 모드 토글
      const themeToggle = document.getElementById("themeToggle");
      if (themeToggle) {
        themeToggle.addEventListener("change", () => {
          if (map.getMapTypeId() === "roadmap") {
            map.setOptions({ styles: themeToggle.checked ? darkStyle : lightStyle });
          }
        });
      }

      // 일반지도 버튼
      const defaultBtn = document.getElementById("defaultMapBtn");
      if (defaultBtn) {
        defaultBtn.addEventListener("click", () => {
          map.setMapTypeId("roadmap");
          map.setOptions({ styles: null }); // ✅ 일반지도 원래 모습
        });
      }

      loadData();
      intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
    }
    window.initMap = initMap;
  </script>

  <!-- MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <!-- 4. Google Maps API -->
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap"></script>
