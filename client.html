<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

<!-- 1. config.js 먼저 (CONFIG 객체 정의) -->
<script src="config.js"></script>

<!-- 2. 사용자 코드 -->
<script>
// ---------------------- 전역 변수 ----------------------
let map, mode = "current", markers = [], markerCluster, intervalId, allData = [];

// ✅ 경로 Polyline 저장 배열 (경로 관리 전용)
let pathLines = [];

// ---------------------- 거리 계산 함수 ----------------------
function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 6371; // 지구 반지름 (km)
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c; // km
}

// ---------------------- 문자열 기반 색상 함수 ----------------------
function stringToColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
  return "#" + "00000".substring(0, 6 - c.length) + c;
}

/* ---------------------- 데이터 로딩 ---------------------- */
async function loadData(token = null) {
  try {
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);

    const response = await fetch(url);
    allData = await response.json();

    // 드롭다운 갱신
    populatePathSelect();

    // 데이터 정상 수신 후 지도 표시
    showMap();
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    showMessage("⚠️ 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
  }
}

function populatePathSelect(viewMode = "all") {
  const select = document.getElementById("path-user-select");
  if (!select) return;
  select.innerHTML = "";

  // 전체 옵션 추가
  const allOption = document.createElement("option");
  allOption.value = "all";
  allOption.textContent = "전체";
  select.appendChild(allOption);

  let users = [];
  if (viewMode === "current") {
    const now = new Date();
    users = allData.filter(u => {
      const updated = new Date(u.updated);
      return (now - updated <= 5 * 60 * 1000); // 최근 5분 이내
    });
  } else {
    users = allData;
  }

  users.forEach(user => {
    const option = document.createElement("option");
    option.value = user.phone;
    option.textContent = user.phone;
    select.appendChild(option);
  });
}

/* ---------------------- 지도 초기화 보조 ---------------------- */
function clearMap() {
  if (markerCluster) {
    markerCluster.clearMarkers();
    markerCluster = null;
  }
  markers.forEach(m => m.setMap(null));
  markers = [];
  pathLines.forEach(p => p.setMap(null)); // ✅ 수정: polylines → pathLines
  pathLines = [];
}


// ---------------------- 사용자 패널 내용 업데이트 ----------------------
function updateUserPanelContent(viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];

  if (viewMode === "current") {
    // ✅ 현재 접속자 보기
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);

    // ✅ 모드 전환 시 기존 경로 지우기
    pathLines.forEach(line => line.setMap(null));
    pathLines = [];

  } else if (viewMode === "all") {
    // ✅ 전체 사용자 보기
    users = allData;

    // ✅ 모드 전환 시 기존 경로 지우기
    pathLines.forEach(line => line.setMap(null));
    pathLines = [];

  } else if (viewMode === "paths") {
    // ✅ 위치/경로 보기
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";
    users = selectedPhone === "all" ? allData : allData.filter(u => u.phone === selectedPhone);

    // ✅ paths 모드 진입 시 기존 경로 지우기
    pathLines.forEach(line => line.setMap(null));
    pathLines = [];

    // 사용자별 distance 계산 + drawPath 실행
    users.forEach(user => {
      const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
      user.distance = 0;
      if (pathPoints.length > 1) {
        for (let i = 1; i < pathPoints.length; i++) {
          user.distance += calculateDistance(
            pathPoints[i-1].lat, pathPoints[i-1].lng,
            pathPoints[i].lat, pathPoints[i].lng
          );
        }
      }
      if (pathPoints.length > 0) {
        drawPath(pathPoints, user.distance);
      }
    });
  }

  // ✅ 헤더 갱신 + 테이블 출력
  updateTableHeader(viewMode);
  renderUserTable(users, viewMode);
}

/* ---------------------- 테이블 헤더 갱신 ---------------------- */
function updateTableHeader(viewMode) {
  const headerRow = document.getElementById("user-table-header");
  if (!headerRow) return;
  headerRow.innerHTML = "";

  if (viewMode === "paths") {
    headerRow.innerHTML = `
      <th>닉네임</th>
      <th>이동<br>거리</th>
      <th>로그인<br>시각</th>
      <th>최근 갱신</th>      
      <th>위도/경도</th>
      <th>주소</th>
    `;
  } else {
    headerRow.innerHTML = `
      <th>닉네임</th>
      <th>상태</th>
      <th>로그인<br>시각</th>
      <th>최근 갱신</th>
      <th>주소</th>
      <th>위도/경도</th>
    `;
  }
}

/* ---------------------- 지도 초기화 ---------------------- */
function getMapIdByDevice() {
  const ua = navigator.userAgent.toLowerCase();
  if (/android/.test(ua)) return CONFIG.mapIds.android;
  if (/iphone|ipad|ipod/.test(ua)) return CONFIG.mapIds.ios;
  if (/windows|macintosh|linux/.test(ua)) return CONFIG.mapIds.javascript;
  return CONFIG.mapIds.fixed;
}

function initMap() {
  const mapId = getMapIdByDevice();
  map = new google.maps.Map(document.getElementById("map"), {
    center: CONFIG.DEFAULT_CENTER || { lat: 36.5, lng: 127.5 },
    zoom: 7,
    mapId: mapId
  });

  // ✅ 원래 위치 저장
  const originalCenter = map.getCenter();
  
  // ✅ 마우스 우측 클릭 시 원래 위치로 복귀
  google.maps.event.addListener(map, 'rightclick', function() {
    map.setCenter(originalCenter);
    map.setZoom(7);
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        new google.maps.Marker({ position: myPos, map: map, title: "내 위치" });
      },
      () => {
        new google.maps.Marker({ position: CONFIG.DEFAULT_CENTER, map: map, title: "기본 위치" });
      }
    );
  }

  // ✅ 패널 닫기 처리
  const btnConnection = document.getElementById("btn-connection");
  const btnSettings = document.getElementById("btn-settings");
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");

  document.addEventListener("click", function(e) {
    if (btnConnection && connectionPanel &&
        !btnConnection.contains(e.target) && !connectionPanel.contains(e.target)) {
      connectionPanel.classList.remove("open");
    }
    if (btnSettings && settingsPanel &&
        !btnSettings.contains(e.target) && !settingsPanel.contains(e.target)) {
      settingsPanel.classList.remove("open");
    }
  });


  loadData();
  intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
}
window.initMap = initMap;

/* ---------------------- 위치찾기 기능 ---------------------- */
window.moveToLatLng = function() {
  const lat = parseFloat(document.getElementById("latInput").value);
  const lng = parseFloat(document.getElementById("lngInput").value);
  if (isNaN(lat) || isNaN(lng)) {
    alert("올바른 위도와 경도를 입력하세요.");
    return;
  }
  if (!map) {
    alert("지도가 아직 초기화되지 않았습니다.");
    return;
  }
  map.setCenter({ lat: lat, lng: lng });
  map.setZoom(15);
};

/* ---------------------- 사용자 클릭 시 지도 이동 ---------------------- */
window.moveToUser = function(lat, lng, phone) {
  if (!map) return;
  map.setCenter({ lat: lat, lng: lng });
  map.setZoom(15);
  new google.maps.Marker({
    position: { lat: lat, lng: lng },
    map: map,
    title: `사용자: ${phone}`,
    animation: google.maps.Animation.BOUNCE
  });
};

/* ---------------------- 라이트/다크 모드 전환 ---------------------- */
const themeToggle = document.getElementById("themeToggle");
if (themeToggle) {
  themeToggle.addEventListener("change", () => {
    document.body.classList.toggle("dark-mode", themeToggle.checked);
  });
}

/* ---------------------- 갱신 주기 설정 ---------------------- */
window.setCustomInterval = function() {
  const value = parseInt(document.getElementById("intervalValue").value, 10);
  const unit = document.getElementById("intervalUnit").value;
  let intervalMs = 300000;
  if (unit === "minutes") intervalMs = value * 60000;
  else if (unit === "seconds") intervalMs = value * 1000;

  clearInterval(intervalId);
  intervalId = setInterval(loadData, intervalMs);

  const msgBox = document.getElementById("message-box");
  msgBox.textContent = `갱신 주기: ${value} ${unit === "minutes" ? "분" : "초"}`;
  msgBox.style.display = "block";
  setTimeout(() => { msgBox.style.display = "none"; }, 2000);
};

/* ---------------------- 한국표준시 변환 ---------------------- */  
function formatToKST(isoString) {
  if (!isoString) return "-";
  const date = new Date(isoString);
  return date.toLocaleString("ko-KR", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

/* ---------------------- 사용자 테이블 렌더링 ---------------------- */
window.renderUserTable = function(users, viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  tbody.innerHTML = "";

  users.forEach(user => {
    const row = document.createElement("tr");
    row.style.cursor = "pointer"; 
    
    if (viewMode === "paths") {
      // ✅ paths 모드: 이동거리 포함
      row.innerHTML = `
        <td>${user.phone || "-"}</td>
        <td>${user.distance ? user.distance.toFixed(2) + " km" : "-"}</td>
        <td>${user.time ? formatToKST(user.time) : "-"}</td>
        <td>${user.updated ? formatToKST(user.updated) : "-"}</td>        
        <td>${user.lat ? user.lat.toFixed(5) : "-"}<br>${user.lng ? user.lng.toFixed(5) : "-"}</td>
        <td>${user.address || "-"}</td>
      `;
    } else {
      // ✅ current / all 모드: 상태 포함
      row.innerHTML = `
        <td>${user.phone || "-"}</td>
        <td>${user.status || "-"}</td>
        <td>${user.time ? formatToKST(user.time) : "-"}</td>
        <td>${user.updated ? formatToKST(user.updated) : "-"}</td>
        <td>${user.address || "-"}</td>
        <td>${user.lat ? user.lat.toFixed(5) : "-"}<br>${user.lng ? user.lng.toFixed(5) : "-"}</td>
      `;
    }

    // ✅ 행 클릭 시 해당 사용자 위치로 이동
    row.addEventListener("click", () => {
      if (user.lat && user.lng) {
        moveToUser(user.lat, user.lng, user.phone);
      }
    });

    tbody.appendChild(row);
  });
};

/* ---------------------- 지도에서 특정 사용자 위치로 이동 ---------------------- */
window.focusOnUser = function(lat, lng) {
  map.setCenter({ lat: lat, lng: lng });
  map.setZoom(15);
};

/* ---------------------- 위치찾기 버튼 이벤트 연결 ---------------------- */
document.addEventListener("DOMContentLoaded", () => {
  const btnLocation = document.getElementById("location-check");
  if (btnLocation) {
    btnLocation.addEventListener("click", moveToLatLng);
  }

  /* ---------------------- 패널 버튼 이벤트 연결 ---------------------- */
  const btnConnection = document.getElementById("btn-connection");
  const btnSettings = document.getElementById("btn-settings");
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");
  const closeBtn = document.getElementById("close-user-panel");

  if (btnConnection && connectionPanel) {
    btnConnection.addEventListener("click", () => {
      settingsPanel?.classList.remove("open");
      connectionPanel.classList.toggle("open");
    });
  }

  if (btnSettings && settingsPanel) {
    btnSettings.addEventListener("click", () => {
      connectionPanel?.classList.remove("open");
      settingsPanel.classList.toggle("open");
    });
  }

  if (closeBtn && userPanel) {
    closeBtn.addEventListener("click", () => {
      userPanel.classList.remove("open");
    });
  }
});

</script>

<body>
  <!-- 상단바 -->
  <div id="top-bar">
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn"><span class="icon">📡</span> 접속현황</div>
      <div id="btn-settings" class="menu-btn"><span class="icon">⚙️</span> 환경설정</div>
    </div>
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- 접속현황 패널 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="openUserPanel('current')">현재 접속자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('all')">전체 사용자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('paths')">위치 / 경로 보기</div>
  
    <!-- 위치찾기 -->
    <div class="dropdown-item">
      <strong>위치찾기</strong><br>
      <div class="location-search">
        <input type="number" id="latInput" placeholder="위도 입력" step="0.0001">
        <input type="number" id="lngInput" placeholder="경도 입력" step="0.0001">
        <button id="location-check" class="btn-check">확인</button> 
      </div>
    </div>
  </div>

  <!-- 환경설정 패널 -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item">
      <strong>라이트/다크 모드</strong><br>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>

  <div class="dropdown-item">
    <strong>갱신 주기 설정</strong><br>
    <div style="display:flex; align-items:center; gap:8px; margin-top:6px;">
      <!-- 숫자 입력 박스 폭을 줄임 -->
      <input type="number" id="intervalValue" value="5" min="1" 
             style="width:70px; font-size:18px; padding:6px;">
      <select id="intervalUnit" style="font-size:18px; padding:6px;">
        <option value="minutes">분</option>
        <option value="seconds">초</option>
      </select>
      <button onclick="setCustomInterval()" 
              style="font-size:18px; padding:6px 12px;">적용</button>
    </div>
  </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
    </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </div>
  </div>

<!-- 사용자 정보 패널 -->
<div id="user-panel">
  <div class="panel-header">
    <h3 id="user-panel-title">사용자 정보</h3>
    <button id="close-user-panel">✖ 닫기</button>
  </div>
  <!-- 경로 선택 드롭다운 -->
  <div id="path-select-container">
    <label for="path-user-select">경로 보기 선택:</label>
    <select id="path-user-select" onchange="updateUserPanelContent('paths')">
      <option value="all">전체</option>
    </select>
  </div>

  
    <!-- 사용자 목록 테이블 -->
    <div id="user-content">
      <table id="user-table">
        <thead>
          <tr id="user-table-header">
            <!-- JS에서 모드별로 헤더를 동적으로 채움 -->
          </tr>
        </thead>
        <tbody id="user-table-body">
          <!-- JS에서 사용자 목록을 동적으로 추가 -->
        </tbody>
      </table>
    </div>
  </div>

<!-- 지도 영역 -->
<div id="map"></div>

<!-- 메시지 박스 -->
<div id="message-box"></div>

<!-- 3. MarkerClusterer 라이브러리 -->
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

<!-- 4. Google Maps API는 맨 마지막 -->
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
</script>
</body>
</html>
