<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

  <!-- 1. config.js 먼저 (CONFIG 객체 정의) -->
  <script src="config.js"></script>

  <!-- 2. 사용자 코드 -->
  <script>
  // ---------------------- 전역 변수 ----------------------
  let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];
  let originalPosition; // 원래 위치 저장용

  /* ---------------------- 데이터 로딩 ---------------------- */
  async function loadData(token = null) {
    try {
      let url = CONFIG.ADMIN_URL + "?mode=getLocations";
      if (token) url += "&token=" + encodeURIComponent(token);

      const response = await fetch(url);
      allData = await response.json();

      // 드롭다운 갱신
      populatePathSelect();

      // 데이터 정상 수신 후 지도 표시
      showMap();
    } catch (err) {
      console.error("데이터 로드 실패:", err);
      showMessage("⚠️ 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
    }
  }

  /* ---------------------- 지도 초기화 보조 ---------------------- */
  function clearMap() {
    if (markerCluster) {
      markerCluster.clearMarkers();
      markerCluster = null;
    }
    markers.forEach(m => m.setMap(null));
    markers = [];
    polylines.forEach(p => p.setMap(null));
    polylines = [];
  }

  /* ---------------------- 지도 표시 ---------------------- */
  function showMap() {
    clearMap();
    if (!map) return;

    if (mode === "current") {
      const now = new Date();
      const latestByUser = {};
      allData.forEach(user => {
        const updated = new Date(user.updated);
        if (now - updated <= 5 * 60 * 1000) {
          const key = user.phone;
          if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
            latestByUser[key] = user;
          }
        }
      });
      Object.values(latestByUser).forEach(user => {
        const marker = new google.maps.Marker({
          position: { lat: user.lat, lng: user.lng },
          map: map,
          icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
          title: `${user.phone} (${user.status}, ${user.updated})`
        });
        markers.push(marker);
      });

    } else if (mode === "all") {
      allData.forEach(user => {
        const marker = new google.maps.Marker({
          position: { lat: user.lat, lng: user.lng },
          map: map,
          title: `${user.phone} (${user.status}, ${user.time})`
        });
        markers.push(marker);
      });

    } else if (mode === "paths") {
      const select = document.getElementById("path-user-select");
      const selectedPhone = select ? select.value : "all";

      let users = allData;
      if (selectedPhone !== "all") {
        users = allData.filter(u => u.phone === selectedPhone);
      }

      users.forEach(user => {
        const pathCoords = [];
        for (let j = 0; j < user.path.length; j += 2) {
          const lat = user.path[j];
          const lng = user.path[j + 1];
          if (lat && lng) pathCoords.push({ lat, lng });
        }
        if (pathCoords.length > 0) {
          // 거리 계산 (Haversine)
          let distance = 0;
          for (let i = 0; i < pathCoords.length - 1; i++) {
            distance += haversine(pathCoords[i], pathCoords[i+1]);
          }
          let weight = 2;
          if (distance > 10) weight = 5;
          if (distance > 50) weight = 8;

          const polyline = new google.maps.Polyline({
            path: pathCoords,
            geodesic: true,
            strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
            strokeOpacity: 1.0,
            strokeWeight: weight,
            map: map
          });
          polylines.push(polyline);

          const last = pathCoords[pathCoords.length - 1];
          const marker = new google.maps.Marker({
            position: last,
            map: map,
            title: `${user.phone} / ${user.updated}`,
            icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
          });
          markers.push(marker);
        }
      });
    }

    if (document.getElementById("clusterOption")?.checked) {
      markerCluster = new markerClusterer.MarkerClusterer({ map: map, markers: markers });
    }
    updateUserPanelContent(mode);
  }

  // 거리 계산 함수
  function haversine(coord1, coord2) {
    const R = 6371; // km
    const dLat = (coord2.lat - coord1.lat) * Math.PI / 180;
    const dLng = (coord2.lng - coord1.lng) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(coord1.lat * Math.PI/180) * Math.cos(coord2.lat * Math.PI/180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  /* ---------------------- 사용자 목록 드롭다운 채우기 ---------------------- */
  function populatePathSelect() {
    const select = document.getElementById("path-user-select");
    if (!select) return;

    select.innerHTML = `<option value="all">전체</option>`;
    const phones = [...new Set(allData.map(u => u.phone))];
    phones.forEach(phone => {
      const opt = document.createElement("option");
      opt.value = phone;
      opt.textContent = phone;
      select.appendChild(opt);
    });
  }

  /* ---------------------- 갱신 주기 설정 ---------------------- */
  function setCustomInterval() {
    const value = parseInt(document.getElementById("intervalValue").value);
    const unit = document.getElementById("intervalUnit").value;

    if (isNaN(value) || value <= 0) {
      showMessage("⚠️ 1 이상의 값을 입력하세요.");
      return;
    }

    let newInterval = unit === "seconds" ? value * 1000 : value * 60000;
    clearInterval(intervalId);
    intervalId = setInterval(loadData, newInterval);
    showMessage(`✅ 갱신 주기가 ${value} ${unit}로 변경되었습니다.`);
  }

  // 메시지를 화면에 표시하는 함수  
  function showMessage(text) {
    const msgBox = document.getElementById("message-box");
    msgBox.innerText = text;
    msgBox.style.display = "block";
    setTimeout(() => msgBox.style.display = "none", 3000); // 3초 후 자동 숨김
  }
  </script>

  <!-- 2. 사용자 코드 -->
  <script>
  document.addEventListener("DOMContentLoaded", () => {
    /* ---------------------- 패널 동작 ---------------------- */
    const btnConnection = document.getElementById("btn-connection");
    const btnSettings = document.getElementById("btn-settings");
    const connectionPanel = document.getElementById("connection-panel");
    const settingsPanel = document.getElementById("settings-panel");
    const userPanel = document.getElementById("user-panel");

    btnConnection.onclick = () => {
      settingsPanel.classList.remove("open");
      connectionPanel.classList.toggle("open");
    };

    btnSettings.onclick = () => {
      connectionPanel.classList.remove("open");
      settingsPanel.classList.toggle("open");
    };

    // ✅ 접속현황 패널 열기
    window.openUserPanel = function(viewMode) {
      connectionPanel.classList.remove("open");
      userPanel.classList.add("open");
      mode = viewMode; // 선택된 모드 반영
      showMap(); // 지도 갱신
      updateUserPanelContent(viewMode); // 패널 내용 갱신
    
      // 제목 변경
      const titleEl = document.getElementById("user-panel-title");
      if (viewMode === "current") {
        titleEl.textContent = "현재 접속자 보기";
      } else if (viewMode === "all") {
        titleEl.textContent = "전체 사용자 보기";
      } else if (viewMode === "paths") {
        titleEl.textContent = "경로 보기";
      } else {
        titleEl.textContent = "사용자 정보";
      }
    };
    
    window.closeUserPanel = function() {
      userPanel.classList.remove("open");
    };

    /* ---------------------- 위치찾기 기능 ---------------------- */
    window.openLocationSearch = function() {
      userPanel.classList.add("open");
      document.getElementById("user-panel-title").textContent = "위치찾기";

      const panel = document.getElementById("user-content");
      panel.innerHTML = `
        <div style="margin-top:10px;">
          <label>위도: <input type="number" id="latInput" step="0.0001"></label><br><br>
          <label>경도: <input type="number" id="lngInput" step="0.0001"></label><br><br>
          <button onclick="moveToLatLng()">확인</button>
        </div>
      `;
    };

    window.moveToLatLng = function() {
      const lat = parseFloat(document.getElementById("latInput").value);
      const lng = parseFloat(document.getElementById("lngInput").value);
      if (!isNaN(lat) && !isNaN(lng)) {
        map.setCenter({ lat: lat, lng: lng });
        map.setZoom(15); // 가까이 접근
      } else {
        showMessage("⚠️ 올바른 위도와 경도를 입력하세요.");
      }
    };

    /* ---------------------- 기기별 지도 ID 선택 ---------------------- */
    function getMapIdByDevice() {
      const ua = navigator.userAgent.toLowerCase();
      if (/android/.test(ua)) return CONFIG.mapIds.android;
      if (/iphone|ipad|ipod/.test(ua)) return CONFIG.mapIds.ios;
      if (/windows|macintosh|linux/.test(ua)) return CONFIG.mapIds.javascript;
      return CONFIG.mapIds.fixed;
    }

    /* ---------------------- 지도 초기화 ---------------------- */
    function initMap() {
      const mapId = getMapIdByDevice();
      map = new google.maps.Map(document.getElementById("map"), {
        center: CONFIG.DEFAULT_CENTER || { lat: 36.5, lng: 127.5 },
        zoom: 7,
        mapId: mapId
      });

      // 원래 위치 저장
      originalPosition = CONFIG.DEFAULT_CENTER || { lat: 36.5, lng: 127.5 };

      // 내 위치 표시
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            new google.maps.Marker({ position: myPos, map: map, title: "내 위치" });
          },
          () => {
            new google.maps.Marker({ position: CONFIG.DEFAULT_CENTER, map: map, title: "기본 위치" });
          }
        );
      }

      // 닫기 버튼 이벤트 연결
      const closeBtn = document.getElementById("close-user-panel");
      if (closeBtn) {
        closeBtn.addEventListener("click", window.closeUserPanel);
      }

      // 외부 클릭 시 패널 닫기
      document.addEventListener("click", function(e) {
        if (!btnConnection.contains(e.target) && !connectionPanel.contains(e.target)) {
          connectionPanel.classList.remove("open");
        }
        if (!btnSettings.contains(e.target) && !settingsPanel.contains(e.target)) {
          settingsPanel.classList.remove("open");
        }
      });

      // 마우스 우클릭 시 원래 위치로 복귀
      map.addListener("rightclick", () => {
        map.setCenter(originalPosition);
        map.setZoom(7);
      });

      // 첫 데이터 로드 및 주기적 갱신 (기본 5분)
      loadData();
      intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
    }

    // Google Maps API에서 callback으로 initMap을 호출할 수 있도록 window에 등록
    window.initMap = initMap;

    /* ---------------------- 라이트/다크 모드 전환 ---------------------- */
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("change", () => {
        if (themeToggle.checked) {
          document.body.classList.add("dark-mode");
        } else {
          document.body.classList.remove("dark-mode");
        }
      });
    }

    /* ---------------------- 갱신 주기 설정 ---------------------- */
    window.setCustomInterval = function() {
      const value = parseInt(document.getElementById("intervalValue").value, 10);
      const unit = document.getElementById("intervalUnit").value;

      let intervalMs = 300000; // 기본 5분
      if (unit === "minutes") {
        intervalMs = value * 60000;
      } else if (unit === "seconds") {
        intervalMs = value * 1000;
      }

      clearInterval(intervalId);
      intervalId = setInterval(loadData, intervalMs);

      const msgBox = document.getElementById("message-box");
      msgBox.textContent = `갱신 주기: ${value} ${unit === "minutes" ? "분" : "초"}`;
      msgBox.style.display = "block";
      setTimeout(() => { msgBox.style.display = "none"; }, 2000);
    };

    /* ---------------------- 사용자 테이블 렌더링 ---------------------- */
    window.renderUserTable = function(users) {
      const tbody = document.getElementById("user-table-body");
      tbody.innerHTML = "";

      users.forEach(user => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${user.name || "-"}</td>
          <td>${user.phone}</td>
          <td>${user.carNo || "-"}</td>
          <td>${user.status}</td>
          <td>${user.role || "-"}</td>
          <td><button onclick="focusOnUser(${user.lat}, ${user.lng})">위치 보기</button></td>
        `;
        tbody.appendChild(row);
      });
    };

    /* ---------------------- 지도에서 특정 사용자 위치로 이동 ---------------------- */
    window.focusOnUser = function(lat, lng) {
      map.setCenter({ lat: lat, lng: lng });
      map.setZoom(15);
    };
  });
  </script>

  <!-- 3. MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <!-- 4. Google Maps API는 맨 마지막 -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
  </script>

<!-- 스타일 -->
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:Arial,sans-serif; }
  #top-bar { position:fixed; top:0; left:0; width:100%; height:50px; background:#1a237e; color:white;
             display:flex; justify-content:space-between; align-items:center; z-index:1000; padding:0 20px; }
  #menu-buttons { display:flex; gap:20px; margin-top:4px; }
  .menu-btn { cursor:pointer; padding:6px 12px; background:#3949ab; border-radius:4px; user-select:none;
              display:flex; align-items:center; gap:6px; }
  .icon { font-size:16px; }
  #title { font-size:20px; font-weight:bold; text-align:right; margin-right:50px; }
  #map { position:absolute; top:50px; left:0; width:100%; height:calc(100% - 50px); background:#ddd; z-index:1; }

  .dropdown-panel { position:absolute; top:50px; background:white; border:1px solid #ccc; width:260px;
                    display:none; z-index:2000; box-shadow:0 2px 6px rgba(0,0,0,0.25); padding:10px 0; }
  .dropdown-panel.open { display:block; opacity:1; transform:translateY(0); transition:opacity 0.3s ease; }
  .dropdown-item { padding:12px 18px; cursor:pointer; border-bottom:1px solid #eee; font-size:16px; font-weight:500; }
  .dropdown-item:hover { background:#f0f0f0; }

  #user-panel { position:absolute; top:50px; right:0; width:340px; height:calc(100% - 50px); background:white;
                border-left:1px solid #ccc; display:none; z-index:3000; padding:15px; overflow-y:auto; }
  #user-panel.open { display:block; }
  .panel-header { display:flex; justify-content:space-between; align-items:center; }
  #close-user-panel { background:#e53935; color:white; border:none; padding:4px 8px; cursor:pointer;
                      border-radius:4px; font-size:14px; }
  #close-user-panel:hover { background:#c62828; }
  #user-panel h3 { margin:0; }

  /* 사용자 카드 */
  .user-card { 
    border:1px solid #ddd; border-radius:6px; padding:10px; margin-bottom:12px; 
    background:#fafafa; font-size:14px; line-height:1.4; 
  }
  .user-name { font-weight:bold; margin-bottom:6px; }

  /* 경로 선택 드롭다운 */
  #path-select-container { margin:10px 0; }
  #path-user-select { width:100%; padding:6px; font-size:14px; border:1px solid #ccc; border-radius:4px; }

  /* 메시지 박스 */
  #message-box { 
    position:fixed; 
    bottom:10px; 
    left:50%; 
    transform:translateX(-50%);
    background:#333; 
    color:#fff; 
    padding:8px 16px; 
    border-radius:4px; 
    display:none; 
    z-index:4000; 
    font-size:16px;
  }

  /* 📱 모바일 반응형 */
  @media (max-width: 768px) {
    #user-panel {
      width: 100%;          /* 전체 너비 */
      height: 40%;          /* 화면 하단 40%만 차지 */
      bottom: 0;            /* 하단 고정 */
      top: auto;            /* 상단에서 떨어지지 않도록 */
      border-left: none;
      border-top: 1px solid #ccc;
      border-radius: 12px 12px 0 0; /* 위쪽 모서리 둥글게 */
    }
    .user-card { font-size:16px; padding:14px; }
    .user-name { font-size:18px; }
    .menu-btn { padding:10px 16px; font-size:18px; }
    #path-user-select { font-size:16px; padding:10px; }
    #intervalValue, #intervalUnit { font-size:18px; padding:8px; }
    #message-box { font-size:18px; }
  }

  /* 라이트/다크 모드 */
  body.dark-mode {
    background-color: #121212;
    color: #e0e0e0;
  }
  body.dark-mode #top-bar {
    background: #333;
    color: #fff;
  }
  body.dark-mode .dropdown-panel {
    background: #222;
    color: #ddd;
  }
  body.dark-mode .menu-btn {
    background: #444;
    color: #fff;
  }

  /* 라이트/다크 모드 토글 스위치 */
  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 26px;
  }
  .switch input { display:none; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 26px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 20px; width: 20px;
    left: 3px; bottom: 3px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: #3949ab;
  }
  input:checked + .slider:before {
    transform: translateX(24px);
  }
  /* 사용자 테이블 */
  #user-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }
  #user-table th, #user-table td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
  }
  #user-table th {
    background: #f5f5f5;
  }
</style>
</head>

<body>
  <!-- 상단바 -->
  <div id="top-bar">
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn"><span class="icon">📡</span> 접속현황</div>
      <div id="btn-settings" class="menu-btn"><span class="icon">⚙️</span> 환경설정</div>
    </div>
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- 접속현황 패널 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="openUserPanel('current')">현재 접속자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('all')">전체 사용자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('paths')">경로 보기</div>
    <div class="dropdown-item" onclick="openLocationSearch()">위치찾기</div> <!-- ✅ 추가 -->
  </div>

  <!-- 환경설정 패널 -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item">
      <strong>라이트/다크 모드</strong><br>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <div style="display:flex; align-items:center; gap:8px; margin-top:6px;">
        <!-- 숫자 입력 박스 폭을 줄임 -->
        <input type="number" id="intervalValue" value="5" min="1" 
               style="width:70px; font-size:18px; padding:6px;">
        <select id="intervalUnit" style="font-size:18px; padding:6px;">
          <option value="minutes">분</option>
          <option value="seconds">초</option>
        </select>
        <button onclick="setCustomInterval()" 
                style="font-size:18px; padding:6px 12px;">적용</button>
      </div>
    </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
    </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </div>
  </div>

  <!-- 사용자 정보 패널 -->
  <div id="user-panel">
    <div class="panel-header">
      <h3 id="user-panel-title">사용자 정보</h3>
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <!-- 경로 선택 드롭다운 -->
    <div id="path-select-container">
      <label for="path-user-select">경로 보기 선택:</label>
      <select id="path-user-select" onchange="updateUserPanelContent('paths')">
        <option value="all">전체</option>
      </select>
    </div>
    <!-- 사용자 목록 테이블 -->
    <div id="user-content">
      <table id="user-table">
        <thead>
          <tr>
            <th>이름</th>
            <th>전화번호</th>
            <th>차량번호</th>
            <th>상태</th>
            <th>권한</th>
            <th>위치</th>
          </tr>
        </thead>
        <tbody id="user-table-body">
          <!-- JS에서 사용자 목록을 동적으로 추가 -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- 지도 영역 -->
