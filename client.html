<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자용 위치정보 시스템</title>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
  <script src="https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/markerclusterer.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }

    /* ---------------------- 상단 UI ---------------------- */
    .top-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .top-inner {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      max-width: 900px;
      gap: 20px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin: 0 auto;
      white-space: nowrap;
    }

    .menu {
      display: flex;
      gap: 20px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      color: #555;
      font-size: 16px;
    }

    .menu-item svg {
      width: 18px;
      height: 18px;
      stroke: #555;
    }

    /* ---------------------- 기존 스타일 ---------------------- */
    .button-group { display: flex; justify-content: center; gap: 12px; margin: 20px auto; max-width: 420px; flex-wrap: wrap; }
    .button-group button { flex: 1; min-width: 100px; font-size: 16px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background-color: #2196F3; color: white; }
    .button-group button:hover { background-color: #1976D2; }

    .container { display: flex; gap: 20px; }
    #map { flex: 3; height: 700px; border: 2px solid #ccc; border-radius: 8px; }
    #infoPanel { flex: 1; height: 700px; border: 1px solid #ccc; overflow: auto; padding: 10px; }
  </style>
</head>

<body>

  <!-- ---------------------- 상단 UI ---------------------- -->
  <div class="top-wrapper">
    <div class="top-inner">

      <!-- 타이틀 -->
      <div class="title">A-DOMES | 위치정보시스템</div>

      <!-- 메뉴 -->
      <div class="menu">

        <!-- 접속현황 -->
        <div class="menu-item">
          <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          </svg>
          접속현황
        </div>

        <!-- 환경설정 -->
        <div class="menu-item">
          <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c0 .69.4 1.31 1.02 1.58.62.27 1.31.12 1.78-.35l.06-.06"></path>
          </svg>
          환경설정
        </div>

      </div>
    </div>
  </div>

  <!-- ---------------------- 기존 내용 ---------------------- -->

  <div class="button-group">
    <button type="button" onclick="mode='current'; showMap()">현재 위치 보기</button>
    <button type="button" onclick="mode='paths'; showMap()">경로 보기</button>
  </div>

  <div id="controls">
    <section>
      <strong>갱신 주기 설정:</strong><br>
      <input type="number" id="intervalValue" value="30" min="1" style="width:60px;">
      <select id="intervalUnit"><option value="seconds" selected>초</option><option value="minutes">분</option></select>
      <button onclick="setCustomInterval()">적용</button>
    </section>

    <section>
      <strong>성능 최적화 옵션:</strong><br>
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </section>
  </div>

  <div class="container">
    <div id="map"></div>
    <div id="infoPanel">
      <h3>📋 사용자 정보 패널</h3>
      <p id="lastUpdate">마지막 갱신: -</p>
      <div id="userInfo"></div>
    </div>
  </div>

  <script>
    let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];

    async function loadData() {
      const response = await fetch("https://script.google.com/macros/s/AKfycbztvsGB7DD9V4CfHprAjtOKxvOmiIMnlInHCk5hDTjOeSTzaF2vgGXcw9fMsNtKcLlvAg/exec");
      allData = await response.json();
      document.getElementById("lastUpdate").textContent = "마지막 갱신: " + new Date().toLocaleTimeString();
      showMap();
    }

    function clearMap() {
      markers.forEach(m => m.setMap(null)); markers = [];
      polylines.forEach(p => p.setMap(null)); polylines = [];
      if (markerCluster) markerCluster.clearMarkers();
    }

    function showMap() {
      clearMap();
      map = new google.maps.Map(document.getElementById("map"), { center: { lat: 36.5, lng: 127.5 }, zoom: 7 });

      if (mode === "current") {
        const latestByUser = {};
        allData.forEach(item => {
          if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
            latestByUser[item.name] = item;
          }
        });

        Object.values(latestByUser).forEach(user => {
          const marker = new google.maps.Marker({
            position: { lat: parseFloat(user.lat), lng: parseFloat(user.lng) },
            map: map,
            icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
            title: `${user.name} (${user.status}, ${user.time})`
          });
          markers.push(marker);
        });

      } else if (mode === "paths") {
        const grouped = {};
        allData.forEach(item => {
          if (!grouped[item.name]) grouped[item.name] = [];
          grouped[item.name].push(item);
        });

        Object.values(grouped).forEach(records => {
          records.sort((a, b) => new Date(a.time) - new Date(b.time));
          let data = records;
          if (document.getElementById("limitOption").checked) data = data.slice(-50);

          const pathCoords = data.map(item => ({ lat: parseFloat(item.lat), lng: parseFloat(item.lng) }));
          const polyline = new google.maps.Polyline({
            path: pathCoords,
            geodesic: true,
            strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
            strokeOpacity: 1.0,
            strokeWeight: 2,
            map: map
          });
          polylines.push(polyline);

          data.forEach((d, idx) => {
            const marker = new google.maps.Marker({
              position: { lat: parseFloat(d.lat), lng: parseFloat(d.lng) },
              map: map,
              title: `${d.name} / ${d.time}`,
              icon: idx === data.length - 1
                ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                : "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
            });
            markers.push(marker);
          });
        });
      }

      if (document.getElementById("clusterOption").checked) {
        markerCluster = new MarkerClusterer(map, markers, {
          imagePath: 'https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/m'
        });
      }

      updateInfoPanel();
    }

    function updateInfoPanel() {
      const panel = document.getElementById("userInfo");
      panel.innerHTML = "";
      const latestByUser = {};

      allData.forEach(item => {
        if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
          latestByUser[item.name] = item;
        }
      });

      Object.values(latestByUser).forEach(latest => {
        const div = document.createElement("div");
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <strong>${latest.name}</strong><br>
          📍 위치: ${latest.location}<br>
          🕒 최초 입력: ${latest.connectTime}<br>
          🕒 마지막 갱신: ${latest.time}<br>
          상태: ${latest.status}<br>
          좌표: (${latest.lat}, ${latest.lng})
        `;
        panel.appendChild(div);
      });
    }

    function setCustomInterval() {
      const value = parseInt(document.getElementById("intervalValue").value);
      const unit = document.getElementById("intervalUnit").value;
      if (isNaN(value) || value <= 0) { alert("1 이상의 값을 입력하세요."); return; }

      let newInterval = unit === "seconds" ? value * 1000 : value * 60000;
      clearInterval(intervalId);
      intervalId = setInterval(loadData, newInterval);

      alert("갱신 주기가 " + value + (unit === "seconds" ? "초" : "분") + "으로 변경되었습니다.");
    }

    window.onload = () => {
      map = new google.maps.Map(document.getElementById("map"), { center: { lat: 36.5, lng: 127.5 }, zoom: 7 });
      loadData();
      intervalId = setInterval(loadData, 30000);
    };
  </script>

</body>
</html>
