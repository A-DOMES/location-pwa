<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

  <!-- 1. config.js 먼저 -->
  <script src="config.js"></script>

  <!-- 스타일 -->
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:Arial,sans-serif; }
    #top-bar { position:fixed; top:0; left:0; width:100%; height:50px; background:#1a237e; color:white;
               display:flex; justify-content:space-between; align-items:center; z-index:1000; padding:0 20px; }
    #menu-buttons { display:flex; gap:20px; margin-top:4px; }
    .menu-btn { cursor:pointer; padding:6px 12px; background:#3949ab; border-radius:4px; user-select:none;
                display:flex; align-items:center; gap:6px; }
    .icon { font-size:16px; }
    #title { font-size:20px; font-weight:bold; text-align:right; margin-right:50px; }
    #map { position:absolute; top:50px; left:0; width:100%; height:calc(100% - 50px); background:#ddd; z-index:1; }

    .dropdown-panel { position:absolute; top:50px; background:white; border:1px solid #ccc; width:260px;
                      display:none; z-index:2000; box-shadow:0 2px 6px rgba(0,0,0,0.25); padding:10px 0; }
    .dropdown-panel.open { display:block; }
    .dropdown-item { padding:12px 18px; cursor:pointer; border-bottom:1px solid #eee; font-size:16px; font-weight:500; }
    .dropdown-item:hover { background:#f0f0f0; }

    #user-panel { position:absolute; top:50px; right:0; width:340px; height:calc(100% - 50px); background:white;
                  border-left:1px solid #ccc; display:none; z-index:3000; padding:15px; overflow-y:auto; }
    #user-panel.open { display:block; }
    .panel-header { display:flex; justify-content:space-between; align-items:center; }
    #close-user-panel { background:#e53935; color:white; border:none; padding:4px 8px; cursor:pointer;
                        border-radius:4px; font-size:14px; }
    #close-user-panel:hover { background:#c62828; }
    #user-panel h3 { margin:0; }

    .user-card { border:1px solid #ddd; border-radius:6px; padding:10px; margin-bottom:12px;
                 background:#fafafa; font-size:14px; line-height:1.4; }
    .user-name { font-weight:bold; margin-bottom:6px; }

    #path-select-container { margin:10px 0; }
    #path-user-select { width:100%; padding:6px; font-size:14px; border:1px solid #ccc; border-radius:4px; }

    #message-box { position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
                   background:#333; color:#fff; padding:8px 16px; border-radius:4px; display:none;
                   z-index:4000; font-size:16px; }

    @media (max-width: 768px) {
      #user-panel { width:100%; height:40%; bottom:0; top:auto; border-left:none; border-top:1px solid #ccc;
                    border-radius:12px 12px 0 0; }
      .user-card { font-size:16px; padding:14px; }
      .user-name { font-size:18px; }
      .menu-btn { padding:10px 16px; font-size:18px; }
      #path-user-select { font-size:16px; padding:10px; }
      #intervalValue, #intervalUnit { font-size:18px; padding:8px; }
      #message-box { font-size:18px; }
    }

    body.dark-mode { background-color:#121212; color:#e0e0e0; }
    body.dark-mode #top-bar { background:#333; color:#fff; }
    body.dark-mode .dropdown-panel { background:#222; color:#ddd; }
    body.dark-mode .menu-btn { background:#444; color:#fff; }

    .switch { position:relative; display:inline-block; width:50px; height:26px; }
    .switch input { display:none; }
    .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
              background-color:#ccc; transition:.4s; border-radius:26px; }
    .slider:before { position:absolute; content:""; height:20px; width:20px; left:3px; bottom:3px;
                     background-color:white; transition:.4s; border-radius:50%; }
    input:checked + .slider { background-color:#3949ab; }
    input:checked + .slider:before { transform:translateX(24px); }

    #user-table { width:100%; border-collapse:collapse; margin-top:10px; }
    #user-table th, #user-table td { border:1px solid #ccc; padding:8px; text-align:center; }
    #user-table th { background:#f5f5f5; }
  </style>
</head>

<body>
  <!-- 상단바 -->
  <div id="top-bar">
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn"><span class="icon">📡</span> 접속현황</div>
      <div id="btn-settings" class="menu-btn"><span class="icon">⚙️</span> 환경설정</div>
    </div>
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- 접속현황 패널 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="openUserPanel('current')">현재 접속자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('all')">전체 사용자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('paths')">경로 보기</div>
  </div>

  <!-- 환경설정 패널 -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item">
      <strong>라이트/다크 모드</strong><br>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <div style="display:flex; align-items:center; gap:8px; margin-top:6px;">
        <input type="number" id="intervalValue" value="5" min="1" style="width:70px; font-size:18px; padding:6px;">
        <select id="intervalUnit" style="font-size:18px; padding:6px;">
          <option value="minutes">분</option>
          <option value="seconds">초</option>
        </select>
        <button onclick="setCustomInterval()" style="font-size:18px; padding:6px 12px;">적용</button>
      </div>
    </div>
    <div class="dropdown-item"><label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label></div>
    <div class="dropdown-item"><label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label></div>
  </div>

  <!-- 사용자 정보 패널 -->
  <div id="user-panel">
    <div class="panel-header">
      <h3 id="user-panel-title">사용자 정보</h3>
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <div id="path-select-container">
      <label for="path-user-select">경로 보기 선택:</label>
      <select id="path-user-select" onchange="updateUserPanelContent('paths')">
        <option value="all">전체</option>
      </select>
    </div>
    <div id="user-content">
      <table id="user-table">
        <thead>
          <tr>
            <th>이름</th><th>전화번호</th><th>차량번호</th><th>상태</th><th>권한</th><th>위치</th>
          </tr>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>
    </div>
    <!-- 위치찾기 기능 -->
    <div id="location-search" style="margin-top:12px;">
      <label>위도: <input type="number" id="latInput" step="0.0001"></label>
      <label>경도: <input type="number" id="lngInput" step="0.0001"></label>
      <button onclick="moveToLatLng()">이동</button>
    </div>
  </div>
</div>

<!-- 지도 영역 -->
<div id="map"></div>

<!-- 메시지 박스 -->
<div id="message-box"></div>

<!-- 사용자 코드 -->
<script>
let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];
let initialCenter;

/* ---------------------- 데이터 로딩 ---------------------- */
async function loadData(token = null) {
  try {
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);
    const response = await fetch(url);
    allData = await response.json();
    populatePathSelect();
    showMap();
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    showMessage("⚠️ 데이터를 불러오지 못했습니다.");
  }
}

/* ---------------------- 지도 초기화 ---------------------- */
function initMap() {
  initialCenter = CONFIG.DEFAULT_CENTER || { lat: 36.5, lng: 127.5 };
  map = new google.maps.Map(document.getElementById("map"), {
    center: initialCenter,
    zoom: 7,
    mapId: getMapIdByDevice()
  });

  // 내 위치 표시
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        new google.maps.Marker({ position: myPos, map: map, title: "내 위치" });
      },
      () => {
        new google.maps.Marker({ position: CONFIG.DEFAULT_CENTER, map: map, title: "기본 위치" });
      }
    );
  }

  // ✅ 우클릭 시 원래 위치로 복귀
  map.addListener("rightclick", () => {
    map.setCenter(initialCenter);
    map.setZoom(7);
    showMessage("✅ 원래 위치로 복귀했습니다.");
  });

  loadData();
  intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
}
window.initMap = initMap;

/* ---------------------- 위치찾기 기능 ---------------------- */
function moveToLatLng() {
  const lat = parseFloat(document.getElementById("latInput").value);
  const lng = parseFloat(document.getElementById("lngInput").value);
  if (!isNaN(lat) && !isNaN(lng)) {
    map.setCenter({ lat, lng });
    map.setZoom(15);
  } else {
    showMessage("⚠️ 올바른 위도/경도를 입력하세요.");
  }
}

/* ---------------------- 경로 거리 계산 ---------------------- */
function calculateDistance(pathCoords) {
  let total = 0;
  for (let i = 1; i < pathCoords.length; i++) {
    const p1 = pathCoords[i - 1];
    const p2 = pathCoords[i];
    total += google.maps.geometry.spherical.computeDistanceBetween(
      new google.maps.LatLng(p1.lat, p1.lng),
      new google.maps.LatLng(p2.lat, p2.lng)
    );
  }
  return total;
}

/* ---------------------- 지도 표시 ---------------------- */
function showMap() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];

  if (mode === "paths") {
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";
    let users = allData;
    if (selectedPhone !== "all") users = allData.filter(u => u.phone === selectedPhone);

    users.forEach(user => {
      const pathCoords = [];
      for (let j = 0; j < user.path.length; j += 2) {
        const lat = user.path[j];
        const lng = user.path[j + 1];
        if (lat && lng) pathCoords.push({ lat, lng });
      }
      if (pathCoords.length > 0) {
        const distance = calculateDistance(pathCoords);
        const strokeWeight = distance > 5000 ? 6 : distance > 1000 ? 4 : 2;

        const polyline = new google.maps.Polyline({
          path: pathCoords,
          geodesic: true,
          strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
          strokeOpacity: 1.0,
          strokeWeight: strokeWeight,
          map: map
        });
        polylines.push(polyline);
      }
    });
  }
}

/* ---------------------- 기타 함수 ---------------------- */
function showMessage(text) {
  const msgBox = document.getElementById("message-box");
  msgBox.innerText = text;
  msgBox.style.display = "block";
  setTimeout(() => msgBox.style.display = "none", 2000);
}
</script>

<!-- MarkerClusterer -->
<script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

<!-- Google Maps API -->
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&libraries=geometry&callback=initMap">
</script>
</body>
</html>
