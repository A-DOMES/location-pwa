<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

  <!-- 1. config.js 먼저 (CONFIG 객체 정의) -->
  <script src="config.js"></script>

  <!-- 2. 사용자 코드 -->
  <script>
  // ---------------------- 전역 변수 ----------------------
  let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];

  /* ---------------------- 데이터 로딩 ---------------------- */
  async function loadData(token = null) {
    try {
      // 🚗 관리자 서버 호출 URL 구성
      let url = CONFIG.ADMIN_URL + "/data?mode=getLocations";
      if (token) {
        url += "&token=" + encodeURIComponent(token);
      }
      const response = await fetch(url);
      allData = await response.json();
      showMap();
    } catch (err) {
      console.error("데이터 로드 실패:", err);
      showMessage("⚠️ 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
    }
  }

  /* ---------------------- 지도 초기화 보조 ---------------------- */
  // 기존 마커, 폴리라인, 클러스터 제거
  function clearMap() {
    if (markerCluster) {
      markerCluster.clearMarkers();
      markerCluster = null;
    }
    markers.forEach(m => m.setMap(null));
    markers = [];
    polylines.forEach(p => p.setMap(null));
    polylines = [];
  }

  /* ---------------------- 지도 표시 ---------------------- */
  function showMap() {
    clearMap();
    if (!map) return;

    if (mode === "current") {
      // ✅ phone 기준으로 최신 위치만 표시
      const latestByUser = {};
      allData.forEach(row => {
        const key = row[1]; // phone
        if (!latestByUser[key] || new Date(row[0]) > new Date(latestByUser[key][0])) {
          latestByUser[key] = row;
        }
      });
      Object.values(latestByUser).forEach(user => {
        const marker = new google.maps.Marker({
          position: { lat: parseFloat(user[3]), lng: parseFloat(user[4]) },
          map: map,
          icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
          title: `${user[1]} (${user[2]}, ${user[0]})`
        });
        markers.push(marker);
      });
    } else if (mode === "paths") {
      // ✅ paths 모드일 때만 열 방향 좌표쌍을 Polyline으로 표시
      allData.forEach(row => {
        const pathCoords = [];
        for (let j = 8; j < row.length; j += 2) {
          const lat = row[j];
          const lng = row[j + 1];
          if (lat && lng) {
            pathCoords.push({ lat: parseFloat(lat), lng: parseFloat(lng) });
          }
        }
        if (pathCoords.length > 0) {
          const polyline = new google.maps.Polyline({
            path: pathCoords,
            geodesic: true,
            strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
            strokeOpacity: 1.0,
            strokeWeight: 2,
            map: map
          });
          polylines.push(polyline);
          // 마지막 좌표에 마커 표시
          const last = pathCoords[pathCoords.length - 1];
          const marker = new google.maps.Marker({
            position: last,
            map: map,
            title: `${row[1]} / ${row[0]}`,
            icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
          });
          markers.push(marker);
        }
      });
    }

    if (document.getElementById("clusterOption").checked) {
      markerCluster = new markerClusterer.MarkerClusterer({ map: map, markers: markers });
    }
    updateUserPanelContent(mode);
  }

  /* ---------------------- 사용자 패널 내용 업데이트 ---------------------- */
  function updateUserPanelContent(viewMode = "current") {
    const panel = document.getElementById("user-content");
    panel.innerHTML = "";

    if (viewMode === "current") {
      const latestByUser = {};
      allData.forEach(row => {
        const key = row[1];
        if (!latestByUser[key] || new Date(row[0]) > new Date(latestByUser[key][0])) {
          latestByUser[key] = row;
        }
      });
      if (Object.keys(latestByUser).length === 0) {
        panel.innerHTML = `<div class="no-user">현재 접속자가 없습니다</div>`;
        return;
      }
      Object.values(latestByUser).forEach(user => {
        panel.innerHTML += `
          <div class="user-card">
            <div class="user-name">👤 ${user[1]}</div>
            📍 위치: ${user[6]}<br>
            🕒 최초 입력: ${user[0]}<br>
            🕒 마지막 갱신: ${user[5]}<br>
            상태: ${user[2]}<br>
            좌표: (${user[3]}, ${user[4]})
          </div>
        `;
      });
    } else if (viewMode === "all") {
      allData.forEach(row => {
        panel.innerHTML += `
          <div class="user-card">
            <div class="user-name">👤 ${row[1]}</div>
            📍 위치: ${row[6]}<br>
            🕒 입력: ${row[0]}<br>
            상태: ${row[2]}<br>
            좌표: (${row[3]}, ${row[4]})
          </div>
        `;
      });
    } else if (viewMode === "paths") {
      allData.forEach(row => {
        let pathHtml = "";
        for (let j = 8; j < row.length; j += 2) {
          const lat = row[j];
          const lng = row[j + 1];
          if (lat && lng) {
            pathHtml += `(${lat}, ${lng})<br>`;
          }
        }
        panel.innerHTML += `
          <div class="user-card">
            <div class="user-name">👤 ${row[1]}</div>
            📍 위치: ${row[6]}<br>
            🕒 입력: ${row[0]}<br>
            상태: ${row[2]}<br>
            좌표: (${row[3]}, ${row[4]})<br>
            <strong>경로 누적:</strong><br>
            ${pathHtml || "경로 없음"}
          </div>
        `;
      });
    }
  }

  /* ---------------------- 갱신 주기 설정 ---------------------- */
  function setCustomInterval() {
    const value = parseInt(document.getElementById("intervalValue").value);
    const unit = document.getElementById("intervalUnit").value;

    if (isNaN(value) || value <= 0) {
      showMessage("⚠️ 1 이상의 값을 입력하세요.");
      return;
    }

    let newInterval = unit === "seconds" ? value * 1000 : value * 60000;
    clearInterval(intervalId);
    intervalId = setInterval(loadData, newInterval);
    showMessage(`✅ 갱신 주기가 ${value} ${unit}로 변경되었습니다.`);
  }

  // 메시지를 화면에 표시하는 함수
  function showMessage(text) {
    const msgBox = document.getElementById("message-box");
    msgBox.innerText = text;
    msgBox.style.display = "block";
    setTimeout(() => msgBox.style.display = "none", 3000); // 3초 후 자동 숨김
  }

  /* ---------------------- 패널 동작 ---------------------- */
  const btnConnection = document.getElementById("btn-connection");
  const btnSettings = document.getElementById("btn-settings");
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");

  btnConnection.onclick = () => {
    settingsPanel.classList.remove("open");
    connectionPanel.classList.toggle("open");
  };

  btnSettings.onclick = () => {
    connectionPanel.classList.remove("open");
    settingsPanel.classList.toggle("open");
  };

  function openUserPanel(viewMode) {
    connectionPanel.classList.remove("open");
    userPanel.classList.add("open");
    updateUserPanelContent(viewMode);
  }

  function closeUserPanel() {
    userPanel.classList.remove("open");
  }

  /* ---------------------- 초기 실행 ---------------------- */
  function getMapIdByDevice() {
    const ua = navigator.userAgent.toLowerCase();
    if (/android/.test(ua)) return CONFIG.mapIds.android;
    if (/iphone|ipad|ipod/.test(ua)) return CONFIG.mapIds.ios;
    if (/windows|macintosh|linux/.test(ua)) return CONFIG.mapIds.javascript;
    return CONFIG.mapIds.fixed; // 기본값
  }

  function initMap() {
    const mapId = getMapIdByDevice();
    map = new google.maps.Map(document.getElementById("map"), {
      center: CONFIG.DEFAULT_CENTER || { lat: 36.5, lng: 127.5 },
      zoom: 7,
      mapId: mapId
    });

    // 내 위치 표시
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          new google.maps.Marker({ position: myPos, map: map, title: "내 위치" });
        },
        () => {
          new google.maps.Marker({ position: CONFIG.DEFAULT_CENTER, map: map, title: "기본 위치" });
        }
      );
    }

    // 닫기 버튼 이벤트 연결
    const closeBtn = document.getElementById("close-user-panel");
    if (closeBtn) {
      closeBtn.addEventListener("click", closeUserPanel);
    }

    // 외부 클릭 시 패널 닫기
    document.addEventListener("click", function(e) {
      if (!btnConnection.contains(e.target) && !connectionPanel.contains(e.target)) {
        connectionPanel.classList.remove("open");
      }
      if (!btnSettings.contains(e.target) && !settingsPanel.contains(e.target)) {
        settingsPanel.classList.remove("open");
      }
    });

    // 첫 데이터 로드 및 주기적 갱신 (기본 5분)
    loadData();
    intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
  }
  </script>

  <!-- 3. MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <!-- 4. Google Maps API는 맨 마지막 -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
  </script>

  <!-- 스타일 -->
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:Arial,sans-serif; }
    #top-bar { position:fixed; top:0; left:0; width:100%; height:50px; background:#1a237e; color:white;
               display:flex; justify-content:space-between; align-items:center; z-index:1000; padding:0 20px; }
    #menu-buttons { display:flex; gap:20px; margin-top:4px; }
    .menu-btn { cursor:pointer; padding:6px 12px; background:#3949ab; border-radius:4px; user-select:none;
                display:flex; align-items:center; gap:6px; }
    .icon { font-size:16px; }
    #title { font-size:20px; font-weight:bold; text-align:right; margin-right:50px; }
    #map { position:absolute; top:50px; left:0; width:100%; height:calc(100% - 50px); background:#ddd; z-index:1; }

    .dropdown-panel { position:absolute; top:50px; background:white; border:1px solid #ccc; width:260px;
                      display:none; z-index:2000; box-shadow:0 2px 6px rgba(0,0,0,0.25); padding:10px 0; }
    .dropdown-panel.open { display:block; opacity:1; transform:translateY(0); transition:opacity 0.3s ease; }
    .dropdown-item { padding:12px 18px; cursor:pointer; border-bottom:1px solid #eee; font-size:16px; font-weight:500; }
    .dropdown-item:hover { background:#f0f0f0; }

    #user-panel { position:absolute; top:50px; right:0; width:320px; height:calc(100% - 50px); background:white;
                  border-left:1px solid #ccc; display:none; z-index:3000; padding:15px; overflow-y:auto; }
    #user-panel.open { display:block; }
    .panel-header { display:flex; justify-content:space-between; align-items:center; }
    #close-user-panel { background:#e53935; color:white; border:none; padding:4px 8px; cursor:pointer;
                        border-radius:4px; font-size:14px; }
    #close-user-panel:hover { background:#c62828; }
    #user-panel h3 { margin:0; }

    /* 메시지 박스 */
    #message-box { position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
                   background:#333; color:#fff; padding:8px 16px; border-radius:4px; display:none; z-index:4000; }
  </style>
</head>

<body>
  <!-- 상단바 -->
  <div id="top-bar">
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn"><span class="icon">📡</span> 접속현황</div>
      <div id="btn-settings" class="menu-btn"><span class="icon">⚙️</span> 환경설정</div>
    </div>
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- 접속현황 패널 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="openUserPanel('current')">현재 접속자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('all')">전체 사용자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('paths')">경로 보기</div>
  </div>

  <!-- 환경설정 패널 -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="mode='current'; showMap(); openUserPanel('current')">
      현재 위치 보기
    </div>
    <div class="dropdown-item" onclick="mode='paths'; showMap(); openUserPanel('paths')">
      경로 보기
    </div>
    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <input type="number" id="intervalValue" value="5" min="1" style="width:80px; font-size:16px;">
      <select id="intervalUnit" style="font-size:16px;">
        <option value="minutes">분</option>
        <option value="seconds">초</option>
      </select>
      <button onclick="setCustomInterval()" style="font-size:20px;">적용</button>
    </div>
    <div class="dropdown-item">
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
    </div>
    <div class="dropdown-item">
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </div>
  </div>

  <!-- 사용자 정보 패널 -->
  <div id="user-panel">
    <div class="panel-header">
      <h3>사용자 정보</h3>
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <div id="user-content"></div>
  </div>

  <!-- 지도 영역 -->
  <div id="map"></div>

  <!-- 메시지 박스 (갱신 주기 변경 알림 등) -->
  <div id="message-box"></div>
</body>
</html>
