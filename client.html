  // ---------------------- 거리 계산 함수 ----------------------
  function calculateDistance(lat1, lng1, lat2, lng2) {
    const R = 6371; // 지구 반지름 (km)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  // ---------------------- 문자열 기반 색상 함수 ----------------------
  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "#" + "00000".substring(0, 6 - c.length) + c;
  }

// ---------------------- path 배열 변환 ----------------------
function parsePathArray(pathArray) {
  const points = [];
  for (let i = 0; i < pathArray.length; i += 2) {
    const lat = parseFloat(pathArray[i]);
    const lng = parseFloat(pathArray[i+1]);
    if (!isNaN(lat) && !isNaN(lng)) {
      points.push({ lat, lng });
    }
  }
  return points;
}

// ---------------------- 경로 그리기 ----------------------
function drawPath(points, distanceKm) {
  if (!map || !points || points.length === 0) return;

  // ✅ 기존 경로 지우기
  polylines.forEach(line => line.setMap(null));  // ← polylines만 사용
  polylines = [];

  // 두께 계산 (최소 5, 최대 18)
  let weight = Math.min(18, Math.max(5, Math.floor(distanceKm / 10) + 5));

  // 색상 단계
  let color = "#0000FF"; // 0~20km → 파랑
  if (distanceKm > 20) color = "#FFA500"; // 20~50km → 주황
  if (distanceKm > 50) color = "#00FF00"; // 50~100km → 초록
  if (distanceKm > 100) color = "#FF0000"; // 100km 이상 → 빨강

  const pathLine = new google.maps.Polyline({
    path: points,
    geodesic: true,
    strokeColor: color,
    strokeOpacity: 1.0,
    strokeWeight: weight
  });

  pathLine.setMap(map);
  polylines.push(pathLine);  // ← polylines에만 추가
}

function updateUserPanelContent(viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];

  if (viewMode === "current") {
    // ✅ 최근 5분 이내 접속자만 추출
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);

  } else if (viewMode === "all") {
    // ✅ 전체 사용자
    users = allData;

  } else if (viewMode === "paths") {
    // ✅ 전체 사용자 경로
    users = allData;
    users.forEach(user => {
      const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
      user.distance = 0;
      if (pathPoints.length > 1) {
        for (let i = 1; i < pathPoints.length; i++) {
          user.distance += calculateDistance(
            pathPoints[i-1].lat, pathPoints[i-1].lng,
            pathPoints[i].lat, pathPoints[i].lng
          );
        }
      }
      if (pathPoints.length > 0) {
        drawPath(pathPoints, user.distance);
      }
    });
  }

  updateTableHeader(viewMode);
  renderUserTable(users, viewMode); // ✅ 항상 전체 목록 출력
}

        });
      } else {
        myMarker.setPosition(myPos); // 마커 위치 갱신
      }

      // ✅ 방향 레이더 (부채꼴)
      const angle = 90;   // 부채꼴 각도
      const points = [];

      // ✅ 반경을 도 단위로 변환 (기본값 50m)
      const radiusInDegrees = convertToDegrees(radarRadius, radarUnit);

      for (let a = -angle/2; a <= angle/2; a += 5) {
        const rad = (heading + a) * Math.PI / 180;
        const latOffset = radiusInDegrees * Math.cos(rad);
        const lngOffset = radiusInDegrees * Math.sin(rad);
        points.push({
          lat: myPos.lat + latOffset,
          lng: myPos.lng + lngOffset
        });
      }
      points.unshift(myPos);

      if (radarPolygon) {
        radarPolygon.setPath(points); // 기존 레이더 갱신
      } else {
        radarPolygon = new google.maps.Polygon({
          paths: points,
          strokeColor: "#00BFFF",
          strokeOpacity: 0.8,
          strokeWeight: 2,
          fillColor: "#00BFFF",
          fillOpacity: 0.25,
          map: map
        });
      }
    },
    (err) => console.error("위치 추적 실패:", err),
    { enableHighAccuracy: true }
  );
}


    
/* ---------------------- 한국표준시 변환 ---------------------- */  
function formatToKST(isoString) {
  if (!isoString) return "-";
  const date = new Date(isoString);
  return date.toLocaleString("ko-KR", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

window.renderUserTable = function(users, viewMode = "current") {

  users.forEach(user => {
    const row = document.createElement("tr");
    row.style.cursor = "pointer"; // 손가락 모양 커서

      row.innerHTML = `
        <td>${user.phone || "-"}</td>
        <td>${user.distance ? user.distance.toFixed(2) + " km" : "-"}</td>
        <td>${user.time ? formatToKST(user.time) : "-"}</td>
        <td>${user.updated ? formatToKST(user.updated) : "-"}</td>        
        <td>${user.lat ? user.lat.toFixed(5) : "-"}<br>${user.lng ? user.lng.toFixed(5) : "-"}</td>
        <td>${user.address || "-"}</td>
      `;
    } else {
      // ✅ current / all 모드: 상태 포함
      row.innerHTML = `
        <td>${user.phone || "-"}</td>
        <td>${user.status || "-"}</td>
        <td>${user.time ? formatToKST(user.time) : "-"}</td>
        <td>${user.updated ? formatToKST(user.updated) : "-"}</td>

        <td>${user.lat ? user.lat.toFixed(5) : "-"}<br>${user.lng ? user.lng.toFixed(5) : "-"}</td>
      `;
    }

    // ✅ 행 클릭 시 해당 사용자 위치로 이동 + 마커 하나만 표시
    row.addEventListener("click", () => {
      if (user.lat && user.lng) {
        clearMarkers(); // 이전 마커 제거
        const marker = new google.maps.Marker({
          position: { lat: user.lat, lng: user.lng },
          map,
          title: `사용자: ${user.phone}`,
          animation: google.maps.Animation.BOUNCE
        });
        markers.push(marker);
        map.setCenter({ lat: user.lat, lng: user.lng });
        map.setZoom(15);
      }
    });

    tbody.appendChild(row);
  });
};

// 위치찾기용 마커 저장 변수
let locationMarker = null;

window.moveToLatLng = function() {
  const lat = parseFloat(document.getElementById("latInput").value);
  const lng = parseFloat(document.getElementById("lngInput").value);

  if (isNaN(lat) || isNaN(lng)) {
    alert("올바른 위도와 경도를 입력하세요.");
    return;
  }
  if (!map) {
    alert("지도가 아직 초기화되지 않았습니다.");
    return;
  }

  // 지도 중심 이동 + 확대
  map.setCenter({ lat: lat, lng: lng });
  map.setZoom(15);

  // 기존 마커 제거
  if (locationMarker) {
    locationMarker.setMap(null);
  }

  // 새 마커 표시
  locationMarker = new google.maps.Marker({
    position: { lat: lat, lng: lng },
    map: map,
    title: "입력한 위치",
    animation: google.maps.Animation.DROP
  });

  // ✅ 메시지 박스 표시
  const msgBox = document.getElementById("message-box");
  msgBox.textContent = `위치가 (${lat.toFixed(5)}, ${lng.toFixed(5)}) 로 이동했습니다.`;
  msgBox.style.display = "block";

  // 3초 후 자동 숨김
  setTimeout(() => {
    msgBox.style.display = "none";
  }, 3000);
};

document.addEventListener("DOMContentLoaded", () => {

});

      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#616161" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0f1c2c" }] },
      { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#1b5e20" }] }
    ];

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7,
        mapTypeId: "roadmap",   // ✅ 기본은 일반지도
        styles: null,           // ✅ 스타일 적용하지 않음
        mapTypeControl: true,
        mapTypeControlOptions: {
          style: google.maps.MapTypeControlStyle.DEFAULT,
          position: google.maps.ControlPosition.TOP_RIGHT,
          mapTypeIds: ["roadmap", "satellite"]
        }
      });

      // 벡터지도 라이트/다크 모드 토글
      const themeToggle = document.getElementById("themeToggle");
      if (themeToggle) {
        themeToggle.addEventListener("change", () => {
          if (map.getMapTypeId() === "roadmap") {
            map.setOptions({ styles: themeToggle.checked ? darkStyle : lightStyle });
          }
        });
      }

      // 일반지도 버튼
      const defaultBtn = document.getElementById("defaultMapBtn");
      if (defaultBtn) {
        defaultBtn.addEventListener("click", () => {
          map.setMapTypeId("roadmap");
          map.setOptions({ styles: null }); // ✅ 일반지도 원래 모습
        });
      }

      loadData();
      intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
    }
    window.initMap = initMap;
  </script>

  <!-- MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <!-- 4. Google Maps API -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
  </script>

</body>
</html>
