<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>


  
  <!-- 2. 사용자 코드 -->

<script>
// ---------------------- 전역 변수 ----------------------
let map, mode = "current", markers = [], markerCluster, intervalId, allData = [];
let polylines = [];
let geoWatchId = null;
let originalCenter;
let marker, currentLat, currentLng;

// 레이더 관련 전역 변수
let radarPolygon = null;
let myMarker = null;
let radarEnabled = true;
let radarRadiusMeters = 50;
let radarUnit = "m";

// ---------------------- 거리 계산 ----------------------
function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// ---------------------- 데이터 로딩 ----------------------
async function loadData(token = null) {
  try {
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);

    const response = await fetch(url);
    allData = await response.json();

    populatePathSelect();
    showMap();

    if (allData.length > 0) {
      updateLocationBox(allData[0]);
    } else {
      document.getElementById("locationBox").innerHTML = "❌ 위치 데이터를 불러올 수 없습니다.";
    }
  } catch (err) {
    console.error("데이터 로드 실패:", err);
  }
}

// ---------------------- 지도 표시 ----------------------
function showMap() {
  clearMap();
  if (!map) return;

  if (mode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    Object.values(latestByUser).forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        animation: google.maps.Animation.BOUNCE
      });
      markers.push(marker);
      marker.addListener("click", () => updateLocationBox(user));
    });
  } else if (mode === "all") {
    allData.forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        animation: google.maps.Animation.BOUNCE
      });
      markers.push(marker);
      marker.addListener("click", () => updateLocationBox(user));
    });
  } else if (mode === "paths") {
    allData.forEach(user => {
      const pathPoints = parsePathArray(user.path);
      if (pathPoints.length > 0) {
        drawPath(pathPoints, user.distance || 0);
      }
    });
  }

  updateUserPanelContent(mode);
}

// ---------------------- 사용자 패널 갱신 ----------------------
function updateUserPanelContent(viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];
  if (viewMode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);
  } else {
    users = allData;
  }

  renderUserTable(users, viewMode);
}

// ---------------------- 사용자 테이블 렌더링 ----------------------
function renderUserTable(users, viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  tbody.innerHTML = "";

  users.forEach(user => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${user.phone || "-"}</td>
      <td>${user.status || "-"}</td>
      <td>${user.time || "-"}</td>
      <td>${user.updated || "-"}</td>
      <td>${user.address || "-"}</td>
      <td>${user.lat}, ${user.lng}</td>
    `;
    row.addEventListener("click", () => {
      if (user.lat && user.lng) {
        map.setCenter({ lat: user.lat, lng: user.lng });
        map.setZoom(15);
      }
    });
    tbody.appendChild(row);
  });
}

// ---------------------- 위치 박스 갱신 ----------------------
function updateLocationBox(user) {
  const locationBox = document.getElementById("locationBox");
  locationBox.innerHTML = `
    <div>${user.phone} 위치 정보</div>
    위도: ${user.lat} <br>
    경도: ${user.lng} <br>
    주소: ${user.address || "-"}
  `;
}

// ---------------------- 레이더 갱신 ----------------------
function convertToDegrees(meters) {
  return meters / 111000;
}

function updateRadarPolygon(myPos, heading) {
  if (!radarEnabled) {
    if (radarPolygon) radarPolygon.setMap(null);
    return;
  }
  const angle = 90;
  const points = [];
  const radiusInDegrees = convertToDegrees(radarRadiusMeters);

  for (let a = -angle/2; a <= angle/2; a += 5) {
    const rad = (heading + a) * Math.PI / 180;
    const latOffset = radiusInDegrees * Math.cos(rad);
    const lngOffset = radiusInDegrees * Math.sin(rad);
    points.push({ lat: myPos.lat + latOffset, lng: myPos.lng + lngOffset });
  }
  points.unshift(myPos);

  if (radarPolygon) {
    radarPolygon.setPath(points);
    radarPolygon.setMap(map);
  } else {
    radarPolygon = new google.maps.Polygon({
      paths: points,
      strokeColor: "#00BFFF",
      strokeOpacity: 0.8,
      strokeWeight: 2,
      fillColor: "#00BFFF",
      fillOpacity: 0.25,
      map: map
    });
  }
}

// ---------------------- 내 위치 추적 ----------------------
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    (pos) => {
      const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const heading = pos.coords.heading || 0;
      if (!myMarker) {
        myMarker = new google.maps.Marker({ position: myPos, map: map });
      } else {
        myMarker.setPosition(myPos);
      }
      updateRadarPolygon(myPos, heading);
    },
    (err) => console.error("위치 추적 실패:", err),
    { enableHighAccuracy: true }
  );
}

// ---------------------- 이벤트 통합 ----------------------
document.addEventListener("DOMContentLoaded", () => {
  const slider = document.getElementById("radiusSlider");
  const radiusValue = document.getElementById("radiusValue");
  const unitSelect = document.getElementById("radiusUnit");
  const toggle = document.getElementById("radarToggle");
  const btnIncrease = document.getElementById("btnIncrease");
  const btnDecrease = document.getElementById("btnDecrease");

  function updateDisplay() {
    radiusValue.textContent = radarUnit === "m"
      ? radarRadiusMeters + " m"
      : (radarRadiusMeters / 1000).toFixed(1) + " km";
  }

  slider.addEventListener("input", e => {
    radarRadiusMeters = parseInt(e.target.value, 10);
    updateDisplay();
    if (myMarker) updateRadarPolygon(myMarker.getPosition().toJSON(), 0);
  });

  unitSelect.addEventListener("change", e => {
    radarUnit = e.target.value;
    updateDisplay();
  });

  toggle.addEventListener("change", e => {
    radarEnabled = e.target.checked;
    if (!radarEnabled && radarPolygon) radarPolygon.setMap(null);
  });

  btnIncrease.addEventListener("click", () => {
    radarRadiusMeters = Math.min(radarRadiusMeters + 50, 300000);
    slider.value = radarRadiusMeters;
    updateDisplay();
    if (myMarker) updateRadarPolygon(myMarker.getPosition().toJSON(), 0);
  });

  btnDecrease.addEventListener("click", () => {
    radarRadiusMeters = Math.max(radarRadiusMeters - 50, 1);
    slider.value = radarRadiusMeters;
    updateDisplay();
    if (myMarker) {
      updateRadarPolygon(myMarker.getPosition().toJSON(), 0);
    }
  });

  // ✅ 초기 표시
  updateDisplay();
});

// ---------------------- 지도 초기화 ----------------------
function initMap() {
  originalCenter = { lat: 36.5, lng: 127.5 };
  map = new google.maps.Map(document.getElementById("map"), {
    center: originalCenter,
    zoom: 7,
    mapTypeId: "roadmap"
  });

  // ✅ 데이터 로딩 시작
  loadData();
  intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
}

window.initMap = initMap;

// ---------------------- 드롭다운 갱신 ----------------------
function populatePathSelect(viewMode = "all") {
  const select = document.getElementById("path-user-select");
  if (!select) return;
  select.innerHTML = "";

  const allOption = document.createElement("option");
  allOption.value = "all";
  allOption.textContent = "전체";
  select.appendChild(allOption);

  let users = [];
  if (viewMode === "current") {
    const now = new Date();
    users = allData.filter(u => {
      const updated = new Date(u.updated);
      return (now - updated <= 5 * 60 * 1000);
    });
  } else {
    users = allData;
  }

  users.forEach(user => {
    const option = document.createElement("option");
    option.value = user.phone;
    option.textContent = user.phone;
    select.appendChild(option);
  });
}

// ---------------------- 지도 초기화 보조 ----------------------
function clearMap() {
  if (markerCluster) {
    markerCluster.clearMarkers();
    markerCluster = null;
  }
  markers.forEach(m => m.setMap(null));
  markers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];
}

// ---------------------- path 배열 변환 ----------------------
function parsePathArray(pathArray) {
  const points = [];
  for (let i = 0; i < pathArray.length; i += 2) {
    const lat = parseFloat(pathArray[i]);
    const lng = parseFloat(pathArray[i+1]);
    if (!isNaN(lat) && !isNaN(lng)) {
      points.push({ lat, lng });
    }
  }
  return points;
}

// ---------------------- 경로 그리기 ----------------------
function drawPath(points, distanceKm) {
  if (!map || !points || points.length === 0) return;

  polylines.forEach(line => line.setMap(null));
  polylines = [];

  let weight = Math.min(18, Math.max(5, Math.floor(distanceKm / 10) + 5));
  let color = "#0000FF";
  if (distanceKm > 20) color = "#FFA500";
  if (distanceKm > 50) color = "#00FF00";
  if (distanceKm > 100) color = "#FF0000";

  const pathLine = new google.maps.Polyline({
    path: points,
    geodesic: true,
    strokeColor: color,
    strokeOpacity: 1.0,
    strokeWeight: weight
  });

  pathLine.setMap(map);
  polylines.push(pathLine);
}

// ---------------------- 사용자 패널 열기 ----------------------
window.openUserPanel = function(viewMode) {
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");

  connectionPanel?.classList.remove("open");
  settingsPanel?.classList.remove("open");
  userPanel?.classList.add("open");

  mode = viewMode;
  clearMap();

  const title = document.getElementById("user-panel-title");
  if (title) {
    if (viewMode === "current") title.textContent = "현재 접속자";
    else if (viewMode === "all") title.textContent = "전체 사용자";
    else if (viewMode === "paths") title.textContent = "위치/경로 보기";
  }

  updateUserPanelContent(viewMode);
};

// ---------------------- 사용자 패널 드래그 + Snap ----------------------
function makePanelDraggable(panelId) {
  const panel = document.getElementById(panelId);
  const header = panel.querySelector(".panel-header");
  let isDragging = false, offsetX = 0, offsetY = 0;

  header.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      panel.style.left = (e.clientX - offsetX) + "px";
      panel.style.top = (e.clientY - offsetY) + "px";
    }
  });

  document.addEventListener("mouseup", () => {
    if (isDragging) {
      isDragging = false;
      const rect = panel.getBoundingClientRect();
      if (rect.left < 50) {
        panel.style.left = "0px"; panel.style.right = "auto";
        panel.classList.add("snap-left"); panel.classList.remove("snap-right");
      } else if (window.innerWidth - rect.right < 50) {
        panel.style.right = "0px"; panel.style.left = "auto";
        panel.classList.add("collapsed", "snap-right");
        panel.classList.remove("snap-left");
      } else {
        panel.classList.remove("snap-left", "snap-right");
      }
    }
  });
}

// ---------------------- 네 면 리사이즈 ----------------------
function makeResizable(panelId) {
  const panel = document.getElementById(panelId);
  const handles = panel.querySelectorAll(".resize-handle");
  let isResizing = false, currentHandle = null;

  function getHandleType(handle) {
    if (handle.classList.contains("left")) return "left";
    if (handle.classList.contains("right")) return "right";
    if (handle.classList.contains("top")) return "top";
    return "bottom";
  }

  handles.forEach(handle => {
    handle.addEventListener("mousedown", () => {
      isResizing = true; currentHandle = getHandleType(handle);
      document.body.style.userSelect = "none";
    });
  });

  document.addEventListener("mousemove", (e) => {
    if (!isResizing) return;
    const rect = panel.getBoundingClientRect();
    if (currentHandle === "right") {
      const newWidth = e.clientX - rect.left;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "left") {
      const newWidth = rect.right - e.clientX;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "bottom") {
      const newHeight = e.clientY - rect.top;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    } else if (currentHandle === "top") {
      const newHeight = rect.bottom - e.clientY;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    }
  });

  document.addEventListener("mouseup", () => {
    isResizing = false; document.body.style.userSelect = "auto";
  });
}

// ---------------------- 패널 버튼 이벤트 ----------------------
document.addEventListener("DOMContentLoaded", () => {
  const panel = document.getElementById("user-panel");
  const maximizeBtn = document.getElementById("maximize-btn");
  const minimizeBtn = document.getElementById("minimize-btn");
  const closeBtn = document.getElementById("close-user-panel");

  minimizeBtn.addEventListener("click", () => {
    panel.classList.remove("maximized", "snap-left", "snap-right");
    panel.classList.add("collapsed-right");
    panel.style = "";
  });

  maximizeBtn.addEventListener("click", () => {
    if (panel.classList.contains("maximized")) {
      panel.classList.remove("maximized");
      panel.style = "";
    } else {
      panel.classList.add("maximized");
      panel.style.width = "100%";
      panel.style.height = "100%";
      panel.style.top = "0";
      panel.style.left = "0";
      panel.style.right = "0";
      panel.style.bottom = "0";
    }
  });

  // ---------------------- 닫기 버튼 ----------------------
  closeBtn.addEventListener("click", () => {
    panel.classList.remove(
      "open",
      "collapsed-left",
      "collapsed-right",
      "maximized",
      "snap-left",
      "snap-right",
      "touch-active"
    );
    panel.style = "";
  });

  // ---------------------- 끝부분 이벤트 처리 ----------------------
  if (leftEdge) {
    leftEdge.addEventListener("mouseenter", () => {
      if (panel.classList.contains("collapsed-left")) {
        panel.classList.add("touch-active");
      }
    });
    leftEdge.addEventListener("touchstart", () => {
      if (panel.classList.contains("collapsed-left")) {
        panel.classList.add("touch-active");
      }
    });
  }

  if (rightEdge) {
    rightEdge.addEventListener("mouseenter", () => {
      if (panel.classList.contains("collapsed-right")) {
        panel.classList.add("touch-active");
      }
    });
    rightEdge.addEventListener("touchstart", () => {
      if (panel.classList.contains("collapsed-right")) {
        panel.classList.add("touch-active");
      }
    });
  }

  // ---------------------- 드래그 + Snap 기능 적용 ----------------------
  makePanelDraggable("user-panel");

  // ---------------------- 네 면 리사이즈 기능 적용 ----------------------
  makeResizable("user-panel");
});
</script>

/* =========================== ✅ 사용자 패널 =========================== */

}

}

#user-panel.collapsed-right.touch-active {
  width: 600px;
}

/* ▶ 좌측 접힘 상태 */
#user-panel.collapsed-left {
  width: 5px;
  height: 100%;
  left: 0;
  top: 50px;
  overflow: hidden;
  transition: width 0.3s ease;
}
/* ▶ PC: 마우스가 좌측 끝에 닿으면 자동 펼침 */
#user-panel.collapsed-left:hover {
  width: 600px;
}
/* ▶ 모바일/JS: 터치 또는 이벤트 시 복귀 */
#user-panel.collapsed-left.touch-active {
  width: 600px;
}

/* =========================== ✅ 끝부분 이벤트 감지용 요소 =========================== */
#left-edge, #right-edge {
  position: fixed;
  top: 50px;
  height: calc(100% - 50px);
  width: 5px;
  z-index: 9999; /* 다른 요소보다 확실히 위 */
  background: transparent; /* 이벤트 감지용 투명 영역 */
  pointer-events: auto;     /* 이벤트가 반드시 잡히도록 */
}
#left-edge { left: 0; }
#right-edge { right: 0; }

/* =========================== ✅ 끝부분 hover 시 패널 펼침 연결 =========================== */
/* 좌측 끝 hover → 패널 펼침 */
#left-edge:hover ~ #user-panel.collapsed-left {
  width: 600px;
}

/* 우측 끝 hover → 패널 펼침 */
#right-edge:hover ~ #user-panel.collapsed-right {
  width: 600px;
}

  
/* ✅ 최대화 상태 */
#user-panel.maximized {
  width:100% !important;
  height:100% !important;
  top:0 !important;
  left:0 !important;
  right:0 !important;
  bottom:0 !important;
}

/* ✅ Snap 상태 */
#user-panel.snap-left { left:0; right:auto; }
#user-panel.snap-right { right:0; left:auto; }

/* ✅ 헤더와 컨텐츠 */
.panel-header {
  height:50px;
  border-bottom:1px solid #ddd;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  cursor:move;
}
.panel-content {
  height:calc(100% - 50px);
  overflow-y:scroll;
  padding:10px;
}
#close-user-panel {
  background-color:#555;
  color:#fff;
  border:none;
  border-radius:4px;
  padding:6px 12px;
  font-size:14px;
  cursor:pointer;
}

/* =========================== ✅ 리사이즈 핸들 (두께 확대) */
.resize-handle { position:absolute; background:transparent; z-index:10; }
.resize-handle.left   { left:0; top:0; width:12px; height:100%; cursor:ew-resize; }
.resize-handle.right  { right:0; top:0; width:12px; height:100%; cursor:ew-resize; }
.resize-handle.top    { top:0; left:0; width:100%; height:12px; cursor:ns-resize; }
.resize-handle.bottom { bottom:0; left:0; width:100%; height:12px; cursor:ns-resize; }
.resize-handle:hover  { background:rgba(0,0,0,0.1); }

/* =========================== ✅ 사용자 테이블 =========================== */
#user-table { width:100%; border-collapse:collapse; margin-top:10px; }
#user-table th, #user-table td { border:1px solid #ccc; padding:8px; text-align:center; }
#user-table th { background:#f5f5f5; font-weight:bold; }
#user-table-header { background:#f5f5f5; font-weight:bold; }
#user-table-body tr:nth-child(even) { background:#fafafa; }
#user-table-body tr:hover { background:#e3f2fd; }

/* =========================== ✅ 메시지 박스 =========================== */
#message-box { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:8px 16px; border-radius:4px; display:none; z-index:4000; font-size:16px; }

/* =========================== ✅ 라이트/다크 모드 =========================== */
body.dark-mode { background-color:#121212; color:#e0e0e0; }
body.dark-mode #top-bar { background:#333; color:#fff; }
body.dark-mode .dropdown-panel { background:#222; color:#ddd; }
body.dark-mode .menu-btn { background:#444; color:#fff; }

/* =========================== ✅ 모바일 반응형 (세로 모드: portrait) =========================== */
@media (max-width:768px) and (orientation:portrait) {
  #top-bar { flex-wrap:wrap; font-size:18px; }
  .menu-btn { padding:10px 16px; font-size:18px; }
  #map { height:calc(100% - 100px); }
  .dropdown-panel { width:100%; left:0; }
  #user-panel { width:100%; height:40%; bottom:0; top:auto; border-left:none; border-top:1px solid #ccc; border-radius:12px 12px 0 0; }
  .user-card { font-size:16px; padding:14px; }
  .user-name { font-size:18px; }
  #message-box { font-size:18px; }

}

/* =========================== ✅ 모바일 반응형 (가로 모드: landscape) =========================== */
@media (max-width:768px) and (orientation:landscape) {

  #latInput, #lngInput { flex:1; min-width:100px; font-size:16px; }

}
