  <!DOCTYPE html>
  <html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>A-DOMES 위치정보시스템</title>
  
    <!-- Google Maps API 불러오기 -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
    <script src="https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/markerclusterer.js"></script>
  
    <style>
      /* ===========================
         전체 초기화
      =========================== */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
  
      /* ===========================
         상단바 디자인
      =========================== */
      #top-bar {
        position: fixed;      /* 화면 상단에 고정 */
        top: 0;
        left: 0;
        width: 100%;
        height: 50px;
        background: #1a237e;  /* 진한 파란색 배경 */
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        z-index: 1000;        /* 다른 요소보다 위에 표시 */
      }
  
      #title {
        font-size: 20px;
        font-weight: bold;
      }
  
      #menu-buttons {
        display: flex;
        gap: 20px;            /* 버튼 간격 */
      }
  
      .menu-btn {
        cursor: pointer;
        padding: 6px 12px;
        background: #3949ab;  /* 버튼 배경색 */
        border-radius: 4px;
        user-select: none;
      }
  
      /* ===========================
         지도 전체 화면
      =========================== */
      #map {
        position: absolute;
        top: 50px;            /* 상단바 아래에 위치 */
        left: 0;
        width: 100%;
        height: calc(100% - 50px); /* 상단바 높이를 뺀 나머지 */
        background: #ddd;
        z-index: 1;
      }
  
      /* ===========================
         공용 팝업창 스타일
         (접속현황 / 환경설정 동일 위치)
      =========================== */
      #popup {
        position: absolute;
        width: 500px;         /* 가로폭 */
        height: 75vh;         /* 세로 높이 */
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        display: none;        /* 기본은 숨김 */
        flex-direction: column;
        top: 70px;            /* 버튼 아래 20px */
        right: 30px;          /* 화면 우측에서 약간 떨어짐 */
        z-index: 2000;
      }
  
      .popup-header {
        background: #1a237e;  /* 팝업 상단바 색상 */
        color: #fff;
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
  
      .popup-close {
        background: none;
        border: none;
        color: #fff;
        font-size: 18px;
        cursor: pointer;      /* 닫기 버튼 커서 */
      }
  
      .popup-content {
        padding: 15px;
        overflow-y: auto;     /* 내용이 많으면 스크롤 */
        height: calc(75vh - 50px); /* 헤더 높이를 뺀 나머지 */
      }
    </style>
  </head>
  
  <body>
  
    <!-- ===========================
         상단바
    =========================== -->
    <div id="top-bar">
      <div id="title">A-DOMES | 위치정보시스템</div>
      <div id="menu-buttons">
        <!-- 접속현황 버튼 -->
        <div id="btn-connection" class="menu-btn">접속현황</div>
        <!-- 환경설정 버튼 -->
        <div id="btn-settings" class="menu-btn">환경설정</div>
      </div>
    </div>
  
    <!-- ===========================
         공용 팝업창
         (접속현황 / 환경설정 내용이 동적으로 들어감)
    =========================== -->
    <div id="popup">
      <div class="popup-header">
        <!-- 팝업 제목 -->
        <span id="popup-title"></span>
        <!-- 닫기 버튼 (X) -->
        <button id="popup-close" class="popup-close">✕</button>
      </div>
      <!-- 팝업 내용 영역 -->
      <div id="popup-content">
        <!-- JS에서 접속현황/환경설정 내용이 동적으로 삽입됨 -->
      </div>
    </div>
  
    <!-- ===========================
         지도 영역
    =========================== -->
    <div id="map"></div>
  
    <!-- ===========================
         JavaScript 파일 연결
         (팝업 열기/닫기, 내용 표시 로직)
    =========================== -->
    <script src="script.js"></script>
  </body>
  </html>
  
  
    
  <script>
    /* ---------------------- 전역 변수 ---------------------- */
    let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];
  
    /* ---------------------- 데이터 로딩 ---------------------- */
    async function loadData() {
      // Google Apps Script에서 데이터 가져오기
      const response = await fetch("https://script.google.com/macros/s/AKfycbztvsGB7DD9V4CfHprAjtOKxvOmiIMnlInHCk5hDTjOeSTzaF2vgGXcw9fMsNtKcLlvAg/exec");
      allData = await response.json();
      showMap(); // 데이터 로딩 후 지도 표시
    }
  
    /* ---------------------- 지도 초기화 ---------------------- */
    function clearMap() {
      // 기존 마커/폴리라인 제거
      markers.forEach(m => m.setMap(null)); markers = [];
      polylines.forEach(p => p.setMap(null)); polylines = [];
      if (markerCluster) markerCluster.clearMarkers();
    }
  
    function showMap() {
      clearMap();
  
      // 지도 생성
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7
      });
  
      // 현재 위치 모드
      if (mode === "current") {
        const latestByUser = {};
  
        // 사용자별 최신 데이터만 추출
        allData.forEach(item => {
          if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
            latestByUser[item.name] = item;
          }
        });
  
        // 최신 위치 마커 표시
        Object.values(latestByUser).forEach(user => {
          const marker = new google.maps.Marker({
            position: { lat: parseFloat(user.lat), lng: parseFloat(user.lng) },
            map: map,
            icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
            title: `${user.name} (${user.status}, ${user.time})`
          });
          markers.push(marker);
        });
  
      // 경로 모드
      } else if (mode === "paths") {
        const grouped = {};
  
        // 사용자별 데이터 그룹화
        allData.forEach(item => {
          if (!grouped[item.name]) grouped[item.name] = [];
          grouped[item.name].push(item);
        });
  
        Object.values(grouped).forEach(records => {
          records.sort((a, b) => new Date(a.time) - new Date(b.time));
  
          let data = records;
          // 최근 50개만 표시 옵션 적용
          if (document.getElementById("limitOption").checked) {
            data = data.slice(-50);
          }
  
          // 경로 좌표 생성
          const pathCoords = data.map(item => ({
            lat: parseFloat(item.lat),
            lng: parseFloat(item.lng)
          }));
  
          // 폴리라인 표시
          const polyline = new google.maps.Polyline({
            path: pathCoords,
            geodesic: true,
            strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
            strokeOpacity: 1.0,
            strokeWeight: 2,
            map: map
          });
          polylines.push(polyline);
  
          // 마커 표시
          data.forEach((d, idx) => {
            const marker = new google.maps.Marker({
              position: { lat: parseFloat(d.lat), lng: parseFloat(d.lng) },
              map: map,
              title: `${d.name} / ${d.time}`,
              icon: idx === data.length - 1
                ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                : "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
            });
            markers.push(marker);
          });
        });
      }
  
      // 클러스터링 옵션 적용
      if (document.getElementById("clusterOption").checked) {
        markerCluster = new MarkerClusterer(map, markers, {
          imagePath: 'https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/m'
        });
      }
  
      // 사용자 정보 팝업 내용 업데이트
      updatePopupContent();
    }
  
    /* ---------------------- 팝업 내용 업데이트 ---------------------- */
    function updatePopupContent() {
      const panel = document.getElementById("popup-content");
      panel.innerHTML = "";
  
      const latestByUser = {};
  
      // 사용자별 최신 데이터 추출
      allData.forEach(item => {
        if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
          latestByUser[item.name] = item;
        }
      });
  
      // 사용자 정보 표시
      Object.values(latestByUser).forEach(latest => {
        const div = document.createElement("div");
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <strong>${latest.name}</strong><br>
          📍 위치: ${latest.location}<br>
          🕒 최초 입력: ${latest.connectTime}<br>
          🕒 마지막 갱신: ${latest.time}<br>
          상태: ${latest.status}<br>
          좌표: (${latest.lat}, ${latest.lng})
        `;
        panel.appendChild(div);
      });
    }
  
    /* ---------------------- 갱신 주기 설정 ---------------------- */
    function setCustomInterval() {
      const value = parseInt(document.getElementById("intervalValue").value);
      const unit = document.getElementById("intervalUnit").value;
  
      if (isNaN(value) || value <= 0) {
        alert("1 이상의 값을 입력하세요.");
        return;
      }
  
      let newInterval = unit === "seconds" ? value * 1000 : value * 60000;
  
      clearInterval(intervalId);
      intervalId = setInterval(loadData, newInterval);
  
      alert("갱신 주기가 변경되었습니다.");
    }
  
    /* ---------------------- 팝업 동작 ---------------------- */
    const btnConnection = document.getElementById("btn-connection");
    const btnSettings = document.getElementById("btn-settings");
    const popup = document.getElementById("popup");
    const popupTitle = document.getElementById("popup-title");
    const popupClose = document.getElementById("popup-close");
  
    // 접속현황 버튼 클릭 → 팝업 열기
    btnConnection.onclick = () => {
      popupTitle.textContent = "접속현황";
      popup.style.display = "flex";
      mode = "current"; // 접속현황은 최신 위치 기준
      showMap();
    };
  
    // 환경설정 버튼 클릭 → 팝업 열기
    btnSettings.onclick = () => {
      popupTitle.textContent = "환경설정";
      popup.style.display = "flex";
  
      // 환경설정 내용은 직접 HTML 삽입
      document.getElementById("popup-content").innerHTML = `
        <div>
          <div><button onclick="mode='current'; showMap()">현재 위치 보기</button></div>
          <div><button onclick="mode='paths'; showMap()">경로 보기</button></div>
          <div>
            <strong>갱신 주기 설정</strong><br>
            <input type="number" id="intervalValue" value="30" min="1" style="width:60px;">
            <select id="intervalUnit">
              <option value="seconds">초</option>
              <option value="minutes">분</option>
            </select>
            <button onclick="setCustomInterval()">적용</button>
          </div>
          <div><label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label></div>
          <div><label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label></div>
        </div>
      `;
    };
  
    // 팝업 닫기 버튼
    popupClose.onclick = () => {
      popup.style.display = "none";
    };
  
    // 화면 클릭 시 팝업 닫기 (외부 클릭)
    document.addEventListener("click", function(e) {
      if (!popup.contains(e.target) && !btnConnection.contains(e.target) && !btnSettings.contains(e.target)) {
        popup.style.display = "none";
      }
    });
  
    /* ---------------------- 초기 실행 ---------------------- */
    window.onload = () => {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7
      });
  
      loadData();
      intervalId = setInterval(loadData, 30000); // 기본 30초 갱신
    };
  </script>
  </body>  
  </html>
