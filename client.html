<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

  <!-- CSS -->
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="client.css">

  <!-- Google Maps API (callback=initMap 추가) -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
  </script>
  <!-- MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  <!-- config.js 반드시 먼저 로드 -->
  <script src="config.js"></script>
</head>

<body>
  <!-- ---------------------- 상단바 ---------------------- -->
  <div id="top-bar">
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn">
        <span class="icon">📡</span> 접속현황
      </div>
      <div id="btn-settings" class="menu-btn">
        <span class="icon">⚙️</span> 환경설정
      </div>
    </div>
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- ---------------------- 접속현황 패널 ---------------------- -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" id="view-current">현재 접속자 보기</div>
    <div class="dropdown-item" id="view-all">전체 사용자 보기</div>
    <div class="dropdown-item" id="view-detail">사용자별 상세 보기</div>
  </div>

  <!-- ---------------------- 환경설정 패널 ---------------------- -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item" id="view-current-location">현재 위치 보기</div>
    <div class="dropdown-item" id="view-paths">경로 보기</div>
    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <input type="number" id="intervalValue" value="5" min="1" style="width:80px;">
      <select id="intervalUnit">
        <option value="minutes">분</option>
        <option value="seconds">초</option>
      </select>
      <button id="apply-interval">적용</button>
    </div>
    <div class="dropdown-item"><label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label></div>
    <div class="dropdown-item"><label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label></div>
  </div>

  <!-- ---------------------- 사용자 정보 패널 ---------------------- -->
  <div id="user-panel">
    <div class="panel-header">
      <h3>사용자 정보</h3>
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <div id="user-content"></div>
  </div>

  <!-- ---------------------- 지도 ---------------------- -->
  <div id="map"></div>

  <script>
  let map;

  // ✅ 기기 환경에 따라 mapId 선택
  function getMapIdByDevice() {
    const ua = navigator.userAgent.toLowerCase();
    if (/android/.test(ua)) return CONFIG.mapIds.android;
    if (/iphone|ipad|ipod/.test(ua)) return CONFIG.mapIds.ios;
    if (/windows|macintosh|linux/.test(ua)) return CONFIG.mapIds.javascript;
    return CONFIG.mapIds.fixed; // 기본값
  }

  // ✅ 구글맵 초기화
  function initMap() {
    const mapId = getMapIdByDevice();
  
    // 기본 지도 생성 (대한민국 중앙 좌표)
    map = new google.maps.Map(document.getElementById("map"), {
      center: CONFIG.DEFAULT_CENTER,
      zoom: 7,                       // ✅ 위성에서 보는 듯한 높이
      mapTypeId: "roadmap",          // ✅ 위성 지도 모드
      mapId: mapId
    });
  
    // ✅ 내 위치 가져오기
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const myPos = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };
  
          // 지도 중심을 내 위치로 이동
         // map.setCenter(myPos);
         // map.setZoom(15);
  
          // 내 위치 마커 표시
          new google.maps.Marker({
            position: myPos,
            map: map,
            title: "내 위치"
          });
        },
        (error) => {
          console.warn("위치 정보를 가져오지 못했습니다:", error.message);
          // 실패 시 기본 좌표에 마커 표시
          new google.maps.Marker({
            position: CONFIG.DEFAULT_CENTER,
            map: map,
            title: "기본 위치"
          });
        }
      );
    } else {
      console.warn("이 브라우저는 Geolocation을 지원하지 않습니다.");
      new google.maps.Marker({
        position: CONFIG.DEFAULT_CENTER,
        map: map,
        title: "기본 위치"
      });
    }
  }

  </script>

  <!-- client.js는 마지막에 -->
  <script type="module" src="client.js"></script>
</body>
</html>
