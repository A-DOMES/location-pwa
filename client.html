// ---------------------- 유틸 함수 ----------------------
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = (v) => (v * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// ---------------------- 방향 라벨 변환 함수 ----------------------
function getDirectionLabel(heading) {
  // ✅ heading 값이 없으면 "방향 없음" 반환
  if (heading == null) return "방향 없음";

  // ✅ heading 각도(0~360도)에 따라 방향 문자열 반환
  if (heading < 45) return "북";          // 0~44도
  if (heading < 90) return "동북방향";    // 45~89도
  if (heading < 135) return "동";         // 90~134도
  if (heading < 180) return "동남방향";   // 135~179도
  if (heading < 225) return "남";         // 180~224도
  if (heading < 270) return "남서방향";   // 225~269도
  if (heading < 315) return "서";         // 270~314도
  if (heading <= 360) return "서북방향";  // 315~360도

  // ✅ 범위를 벗어나면 "방향 없음"
  return "방향 없음";
}

// ---------------------- 위치 표시 갱신 함수 ----------------------
function updateLocationDisplay(lat, lng, heading) {

  document.getElementById("locationDisplay").innerText =
    `현재 위치: (${lat.toFixed(5)}, ${lng.toFixed(5)}) / 방향: ${directionLabel}`;
}


function makeDraggableAndResizable(element) {
  let isDragging = false, offsetX, offsetY;

  // 마우스 드래그 시작
  element.addEventListener('mousedown', e => {
    isDragging = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = "";
  });

  // 마우스 드래그 이동
  document.addEventListener('mousemove', e => {
    if (isDragging) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });

  // 마우스 드래그 종료
  document.addEventListener('mouseup', () => isDragging = false);

  // 터치 드래그 시작
  element.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      offsetX = e.touches[0].clientX - element.offsetLeft;
      offsetY = e.touches[0].clientY - element.offsetTop;
      element.style.right = "";
    }
  });

  // 터치 드래그 이동
  document.addEventListener('touchmove', e => {
    if (isDragging && e.touches.length === 1) {
      element.style.left = (e.touches[0].clientX - offsetX) + 'px';
      element.style.top = (e.touches[0].clientY - offsetY) + 'px';
    }
  });

  // 터치 드래그 종료
  document.addEventListener('touchend', () => isDragging = false);
}

        map.setCenter(userPos);

        // ✅ 내 위치 마커 생성
        myMarker = new google.maps.Marker({
          position: userPos,
          map,
          title: "내 위치"
        });

        // ✅ 내 위치 마커 클릭 시 이동 + 확대
        myMarker.addListener("click", () => {
          map.setCenter(userPos);
          map.setZoom(18);
        });

        drawMultipleCircles(userPos);
        updateRadarPolygon(userPos, 0);
        startTracking();

        const loadingMsg = document.getElementById("loadingMessage");
        if (loadingMsg) {
          loadingMsg.style.display = "none";
          loadingMsg.classList.add("hidden");
        }
      },
      () => {
        startTracking();
      },
      { enableHighAccuracy: true }
    );

}


function updateMapStyle(map) {
  const body = document.body;
  body.classList.remove("map-roadmap", "map-satellite");
  const type = map.getMapTypeId();
  body.classList.add(type === "roadmap" ? "map-roadmap" : "map-satellite");
}


// ---------------------- 위치 추적 ----------------------
function startTracking() {
  const geocoder = new google.maps.Geocoder();

  // ✅ 위치 추적 시작 (watchPosition: 위치가 바뀔 때마다 콜백 실행)
  navigator.geolocation.watchPosition(pos => {
    const now = Date.now();
    const lat = pos.coords.latitude;   // 현재 위도
    const lng = pos.coords.longitude;  // 현재 경도

    // ❌ 기존: 브라우저 제공 speed 사용 (대부분 null/0이라 무의미)
    // const speed = pos.coords.speed || 0;
    // const speedKmh = speed * 3.6;

    // ✅ 수정: 좌표 기반 속도 계산 강제 실행 (걷기에서도 자연스럽게 반영)
    computeSpeedFromGPS(lat, lng, now);

    // ✅ 이동 거리 계산 (경로 그리기용)
    let distanceMoved = 0;
    if (lastLat !== null && lastLng !== null) {
      distanceMoved = google.maps.geometry.spherical.computeDistanceBetween(
        new google.maps.LatLng(lastLat, lastLng),
        new google.maps.LatLng(lat, lng)
      );
    }

    // ✅ 속도에 따른 최소 주기 설정
    let minInterval = 5000; // 기본 5초
    if (currentSpeed > 60) minInterval = 3000;   // 차량 고속 → 3초
    else if (currentSpeed < 10) minInterval = 10000; // 걷기 → 10초

    // ✅ 조건: 최소 주기 경과 OR 일정 거리 이상 이동 시 갱신
    if ((now - lastUpdateTime > minInterval) || distanceMoved > 5) {
      lastUpdateTime = now;
      lastLat = lat;
      lastLng = lng;

      // ✅ 좌표값 갱신
      currentLat = lat;
      currentLng = lng;

      // ✅ 방향 계산
      let heading = pos.coords.heading || 0; 
      if (!heading || heading === 0) {
        if (pathCoords.length > 1) {
          const last = pathCoords[pathCoords.length - 1];
          const prev = pathCoords[pathCoords.length - 2];
          heading = getBearing(prev.lat(), prev.lng(), last.lat(), last.lng());
        } else {
          heading = lastHeading ?? 0;
        }
      }
      lastHeading = heading;
      const directionLabel = getDirectionLabel(heading);

      // ✅ 현재 위치 정보 표시 (UI 갱신)
      const timeString = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
      document.getElementById("latBox").innerText = `위도: ${currentLat.toFixed(6)}`;
      document.getElementById("lngBox").innerText = `경도: ${currentLng.toFixed(6)}`;
      document.getElementById("directionBox").innerText = `현재 방향: ${directionLabel}`;
      document.getElementById("timeBox").innerText = `갱신 시간: ${timeString}`;

      // ✅ 주소 갱신 (지오코딩은 일정 주기마다만 실행)
      if (Date.now() - lastGeocodeTime > geocodeInterval) {
        document.getElementById("addressBox").innerHTML = `<small>주소 불러오는 중...</small>`;
        geocoder.geocode({ location: { lat, lng } }, (results, status) => {
          if (status === "OK" && results[0]) {
            let address = results[0].formatted_address
              .replace(/^대한민국\s*,?\s*/, "")
              .replace(/\s*,?\s*대한민국$/, "");
            document.getElementById("addressBox").innerHTML = `<small>주소: ${address}</small>`;
          }
        });
        lastGeocodeTime = Date.now();
      }

      // ✅ 지도 및 마커 갱신
      updateLocationDisplay(currentLat, currentLng, heading);
      if (!myMarker) {
        myMarker = new google.maps.Marker({ position: { lat, lng }, map, title: "내 위치" });
      } else {
        myMarker.setPosition({ lat, lng });
      }

      // ✅ 지도 중심 이동 여부
      if (followUser) map.setCenter({ lat, lng });

      // ✅ 원형 표시 및 레이더 보정
      drawMultipleCircles({ lat, lng });
      updateRadarPolygon({ lat, lng }, heading);

      // ✅ 경로 polyline 갱신 (5m 이상 이동 기준 유지 → 경로 깔끔)
      updatePathPolyline(currentLat, currentLng);
      if (pathCoords.length > 1) {
        document.getElementById("resetPathBtn").style.display = "inline-block";
      }

// ---------------------- 경로 보정 (파란색) ----------------------

      pathCoords.push({ lat: midLat, lng: midLng, address: null, timestamp: Date.now() });

// ---------------------- 거리 계산 함수 ----------------------
function getDistanceFromLatLonInKm(lat1, lon1, lat2, lon2) {
  const R = 6371; // 지구 반지름 (km)
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c; // km
}

// ---------------------- 방향(bearing) 계산 함수 ----------------------
function getBearing(lat1, lng1, lat2, lng2) {
  const dLon = (lng2 - lng1) * Math.PI / 180;
  const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
  const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
            Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
  const brng = Math.atan2(y, x) * 180 / Math.PI;
  return (brng + 360) % 360; // 0~360도
}

// ---------------------- GPS 기반 속도 계산 ----------------------
function computeSpeedFromGPS(lat, lng, timestamp) {
  // ✅ 첫 위치에서는 기준점만 저장 (속도 계산하지 않음)
  if (lastTimestamp === null) {
    lastLat = lat;
    lastLng = lng;
    lastTimestamp = timestamp;
    console.log("첫 위치 저장:", lat, lng, "timestamp:", timestamp);
    return;
  }

  // ✅ 거리 계산 (m 단위)
  const distance = google.maps.geometry.spherical.computeDistanceBetween(
    new google.maps.LatLng(lastLat, lastLng),
    new google.maps.LatLng(lat, lng)
  );

  // ✅ 시간 차이 (초 단위)
  const timeElapsed = (timestamp - lastTimestamp) / 1000;

  if (timeElapsed > 0) {
    let rawSpeed = (distance / timeElapsed) * 3.6; // km/h 변환

    // ✅ 상황별 드리프트 제거 기준 (완화된 조건)
    let minDistanceThreshold = 2; // 기본값을 낮춤
    if (currentSpeed < 10) {
      // 걷기/자전거 → 작은 이동도 반영 (2m 기준)
      minDistanceThreshold = 2;
    } else if (currentSpeed >= 10 && currentSpeed < 60) {
      // 저속 차량 → 중간값 (5m 기준)
      minDistanceThreshold = 5;
    } else {
      // 고속 차량 → 안정성 확보 (10m 기준)
      minDistanceThreshold = 10;
    }

    if (distance < minDistanceThreshold) {
      console.log("드리프트 제거됨, distance:", distance, "threshold:", minDistanceThreshold);
      rawSpeed = 0;
    }

    // ✅ 비정상 값 필터링 (200km/h 이상은 무시)
    if (rawSpeed > 200) {
      console.log("비정상 속도 감지, rawSpeed:", rawSpeed, "→ currentSpeed 유지");
      rawSpeed = currentSpeed;
    }

    // ✅ 속도 기록 배열에 추가 (최근 10개만 유지)
    speedHistory.push(rawSpeed);
    if (speedHistory.length > 10) speedHistory.shift();

    // ✅ 현재속도: 자동 스무딩 적용
    currentSpeed = getSmoothedSpeed(speedHistory);

    // ✅ 최고속도 갱신
    if (currentSpeed > maxSpeed) maxSpeed = currentSpeed;

    // ✅ 누적 거리 갱신
    totalDistance += distance;

    // ✅ 정지 상태 감지 (최근 값이 모두 0이면 정지로 판단)
    const recent = speedHistory.slice(-5);
    if (recent.every(v => v === 0)) {
      console.log("정지 상태 감지됨 → currentSpeed = 0");
      currentSpeed = 0;
    }

    // 📝 디버깅 로그
    console.log(
      "lastLat:", lastLat, "lastLng:", lastLng,
      "lat:", lat, "lng:", lng,
      "거리:", distance, "시간:", timeElapsed,
      "계산속도:", rawSpeed, "현재속도:", currentSpeed,
      "누적거리:", totalDistance
    );
  }

  // ✅ 좌표와 시간 갱신
  lastLat = lat;
  lastLng = lng;
  lastTimestamp = timestamp;

  // 🚗 이동정보 모달창 갱신
  updateTravelStats();
}


// ---------------------- 개선된 스무딩 함수 (상황별 자동 적용) ----------------------
function getSmoothedSpeed(history, baseWindowSize = 7, maxDelta = 10) {
  if (history.length === 0) return 0;

  // ✅ 최근 baseWindowSize 개 값 평균
  const recent = history.slice(-baseWindowSize);
  const sum = recent.reduce((a, b) => a + b, 0);
  let avg = sum / recent.length;

  // ✅ 상황별 windowSize 자동 조정 (완화된 조건)
  let windowSize = baseWindowSize;
  if (currentSpeed < 10) {
    // 걷기 → 반응성 중요 (최근 3~5개)
    windowSize = 5;
  } else if (currentSpeed >= 10 && currentSpeed < 60) {
    // 자전거/저속 차량 → 중간값 (최근 7개)
    windowSize = 7;
  } else {
    // 고속 차량 → 안정성 중요 (최근 10개)
    windowSize = 10;
  }

  // ✅ 다시 계산 (상황별 windowSize 적용)
  const adjustedRecent = history.slice(-windowSize);
  const adjustedSum = adjustedRecent.reduce((a, b) => a + b, 0);
  avg = adjustedSum / adjustedRecent.length;

  // ✅ 변화율 제한 적용 (갑작스러운 튀는 값 완화)
  if (typeof smoothedSpeed !== "undefined") {
    const delta = avg - smoothedSpeed;
    if (Math.abs(delta) > maxDelta) {
      avg = smoothedSpeed + (delta > 0 ? maxDelta : -maxDelta);
    }
  }

  // ✅ 최종 스무딩 값 반환
  smoothedSpeed = avg;
  return avg;
}

// ---------------------- 좌표 추가 (m 단위 누적) ----------------------
function addPathCoord(newCoord, address = null) {
  if (pathCoords.length > 0) {
    const lastCoord = pathCoords[pathCoords.length - 1];

    // ✅ 이전 좌표와 새 좌표 사이 거리 계산 (m 단위)
    const segmentDistance = google.maps.geometry.spherical.computeDistanceBetween(
      new google.maps.LatLng(lastCoord.lat, lastCoord.lng),
      new google.maps.LatLng(newCoord.lat, newCoord.lng)
    );

    // ✅ 누적 거리 갱신
    totalDistance += segmentDistance;
  }

  // ✅ 좌표 기록 (주소 + 타임스탬프 포함)
  pathCoords.push({
    ...newCoord,
    address,
    timestamp: Date.now()
  });

  // 🚗 이동정보 모달창 갱신
  updateTravelStats();
}



// ----------------------외부에서 사용 할 속도 추가 함수 ----------------------
function addSpeed(newSpeed) {
  speedHistory.push(newSpeed);

  // 평균 속도 누적 갱신
  avgSpeed = Math.round((avgSpeed * (speedHistory.length - 1) + newSpeed) / speedHistory.length);

  // 최고 속도 갱신
  if (newSpeed > maxSpeed) maxSpeed = newSpeed;
}

// ---------------------- 남은 거리 계산 ----------------------
function computeRemainingDistance(pathCoords, currentLat, currentLng) {
  if (!pathCoords || pathCoords.length < 2) return 0;

  const currPoint = new google.maps.LatLng(currentLat, currentLng);
  const destPoint = new google.maps.LatLng(
    pathCoords[pathCoords.length - 1].lat,
    pathCoords[pathCoords.length - 1].lng
  );

  return google.maps.geometry.spherical.computeDistanceBetween(currPoint, destPoint) / 1000; // km
}

// ---------------------- ETA 계산 ----------------------
function computeETA(pathCoords, avgSpeedValue) {
  if (!pathCoords || pathCoords.length < 2 || avgSpeedValue <= 0) return "미정";

  const remainingDistKm = computeRemainingDistance(pathCoords, currentLat, currentLng);

  const etaMinutes = Math.round(remainingDistKm / avgSpeedValue * 60);
  const etaTime = new Date(Date.now() + etaMinutes * 60000).toLocaleTimeString("ko-KR", {
    hour: "2-digit",
    minute: "2-digit"
  });

  return `약 ${etaMinutes}분 후 (${etaTime})`;
} 

// ---------------------- 직선 Polyline 갱신 ----------------------
function updateStraightLine() {
  if (!destinationLat || !destinationLng || !currentLat || !currentLng) return;

  const currPoint = new google.maps.LatLng(currentLat, currentLng);
  const destPoint = new google.maps.LatLng(destinationLat, destinationLng);

  if (!straightLine) {
    // 최초 생성
    straightLine = new google.maps.Polyline({
      path: [currPoint, destPoint],
      map: map,
      strokeColor: "#FF0000",
      strokeOpacity: 0.8,
      strokeWeight: 2
    });
  } else {
    // 위치 갱신 시 선 업데이트
    straightLine.setPath([currPoint, destPoint]);
  }
}
  
// ---------------------- 이동정보 업데이트 ----------------------
function updateTravelStats() {
  // ✅ 시작 시점이나 경로 좌표가 없으면 초기값 표시
  if (!startTime || pathCoords.length === 0) {
    document.getElementById("currentSpeed").innerText = "0 km/h";
    document.getElementById("avgSpeed").innerText = "0 km/h";
    document.getElementById("maxSpeed").innerText = "0 km/h";
    document.getElementById("driveTime").innerText = "00:00:00";
    document.getElementById("travelDistance").innerText = "0 km";
    document.getElementById("straightDistance").innerText = "0 km";
    document.getElementById("eta").innerText = "미정";
    return;
  }

  // ✅ 경과 시간 계산
  const now = Date.now();
  const elapsedSeconds = Math.floor((now - startTime) / 1000);
  const hours = Math.floor(elapsedSeconds / 3600);
  const minutes = Math.floor((elapsedSeconds % 3600) / 60);
  const seconds = elapsedSeconds % 60;
  const elapsedTimeStr = `${String(hours).padStart(2,"0")}:${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;

  // ✅ 현재속도: 최근 5개 평균
  let currentSpeedValue = 0;
  if (speedHistory.length > 0) {
    const recent = speedHistory.slice(-5);
    currentSpeedValue = Math.round(recent.reduce((a, b) => a + b, 0) / recent.length);
  }

  // ✅ 평균속도: 전체 기록 평균
  const avgSpeedValue = speedHistory.length > 1
    ? Math.round(speedHistory.reduce((a,b)=>a+b,0) / speedHistory.length)
    : currentSpeedValue;

  // ✅ 최고속도
  const maxSpeedValue = Math.round(maxSpeed);

  // ✅ 이동거리 (m → km 변환)
  const totalDistanceKm = (totalDistance / 1000).toFixed(1);
  
  // ✅ 직선거리 & ETA 계산
  let straightDistKm = 0, etaMsg = "미정";
  if (destinationLat && destinationLng && currentLat && currentLng) {
    const currPoint = new google.maps.LatLng(currentLat, currentLng);
    const destPoint = new google.maps.LatLng(destinationLat, destinationLng);
  
    // ✅ 현재 위치 → 목적지 직선거리 계산
    straightDistKm = (google.maps.geometry.spherical.computeDistanceBetween(currPoint, destPoint) / 1000).toFixed(1);
  
    // ✅ ETA 계산 (평균속도 기반 → 남은 시간 표시)
    if (avgSpeedValue > 0) {
      const etaMinutes = Math.round(straightDistKm / avgSpeedValue * 60);
      const etaSeconds = etaMinutes * 60;
  
      const hours = Math.floor(etaSeconds / 3600);
      const minutes = Math.floor((etaSeconds % 3600) / 60);
      const seconds = etaSeconds % 60;
  
      etaMsg =
        `${hours.toString().padStart(2,"0")}:` +
        `${minutes.toString().padStart(2,"0")}:` +
        `${seconds.toString().padStart(2,"0")}`;
    }
  }
   
  // ✅ 각 요소에 값 반영
  document.getElementById("currentSpeed").innerText = `${currentSpeedValue} km/h`;
  document.getElementById("avgSpeed").innerText = `${avgSpeedValue} km/h`;
  document.getElementById("maxSpeed").innerText = `${maxSpeedValue} km/h`;
  document.getElementById("driveTime").innerText = elapsedTimeStr;
  document.getElementById("travelDistance").innerText = `${totalDistanceKm} km`;
  document.getElementById("straightDistance").innerText = `${straightDistKm} km`;
  document.getElementById("eta").innerText = etaMsg;

  // ✅ 직선 Polyline 갱신 (지도 위 선도 실시간으로 업데이트)
  updateStraightLine();

  // ✅ 목적지 도착 반경을 속도에 따라 자동 조정
  let detectionRadiusKm = 0.05; // 기본 50m
  if (currentSpeedValue > 60) {
    detectionRadiusKm = 0.1; // 100m
  } else if (currentSpeedValue > 40) {
    detectionRadiusKm = 0.07; // 70m
  }

  // ✅ 목적지 도착 시 선 제거 + 안내 (한 번만 실행)
  if (destinationSet && !destinationArrived && straightDistKm <= detectionRadiusKm) {
    if (straightLine) {
      straightLine.setMap(null);
      straightLine = null;
    }
    if (destinationRenderer) {
      destinationRenderer.setMap(null);
      destinationRenderer = null;
    }

    // ✅ 다기능 모달창 표시
    document.getElementById("modalTitle").innerText = "목적지 도착";
    document.getElementById("modalMessage").innerText = "목적지에 도착했습니다.";
    document.getElementById("popupModal").style.display = "block";

    // ✅ 음성 안내
    speakMessage("목적지에 도착했습니다.");

    drivingStarted = false;
    destinationArrived = true; // ✅ 이후에는 다시 실행되지 않음
  }
}
  
// ---------------------- 총 이동거리 계산 ----------------------
function computeTotalDistance(coords) {
  if (!coords || coords.length < 2) return 0;

  let total = 0;
  for (let i = 1; i < coords.length; i++) {
    const prev = new google.maps.LatLng(coords[i - 1].lat, coords[i - 1].lng);
    const curr = new google.maps.LatLng(coords[i].lat, coords[i].lng);
    total += google.maps.geometry.spherical.computeDistanceBetween(prev, curr);
  }
  return total / 1000; // km 단위 (정수 변환은 호출부에서 처리)
}

// ---------------------- 원형 표시 ----------------------
function drawMultipleCircles(myPos) {
  const circleStyles = [
    { radius: 100, strokeColor: "#FF0000" },  // 원형 색상 수정
    { radius: 200, strokeColor: "#FF0000" }   // 원형 색상 수정
  ];

  // 모바일 대비 색상 옵션 (이미 strokeColor를 빨강으로 지정했지만, 추가 옵션을 주고 싶다면 여기서 수정 가능)
  circleStyles.forEach(style => {
    style.strokeColor = "#FF0000"; // 강한 빨강
  });

  if (circles.length === 0) {
    circleStyles.forEach(style => {
      const circle = new google.maps.Circle({
        center: myPos,
        radius: style.radius,
        strokeColor: style.strokeColor,
        strokeOpacity: 0.8,
        strokeWeight: 4,
        fillOpacity: 0,
        map
      });

      // ✅ 내 위치 원형에서도 우클릭 시 레벨 7 복귀
      circle.addListener("rightclick", () => {
        map.setZoom(7);
      });
      
      circles.push(circle);
    });
  } else {
    circles.forEach(circle => circle.setCenter(myPos));
  }
}

// ---------------------- 레이더 표시 ----------------------
function updateRadarPolygon(myPos, heading) {
  if (!heading || heading === 0) {
    if (pathCoords.length > 1) {
      const last = pathCoords[pathCoords.length - 1];
      const prev = pathCoords[pathCoords.length - 2];
      heading = google.maps.geometry.spherical.computeHeading(prev, last);
    } else {
      heading = lastHeading ?? 0;
    }
  }
  lastHeading = heading;

  if (!radarEnabled) {
    if (radarPolygon) radarPolygon.setMap(null);
    return;
  }

  const angle = 90;
  const points = [];
  const radiusInDegrees = radarRadiusMeters / 111000;

  for (let a = -angle/2; a <= angle/2; a += 5) {
    const rad = (heading + a) * Math.PI / 180;
    const latOffset = radiusInDegrees * Math.cos(rad);
    const lngOffset = radiusInDegrees * Math.sin(rad);
    points.push({ lat: myPos.lat + latOffset, lng: myPos.lng + lngOffset });
  }
  points.unshift(myPos);

  if (radarPolygon) {
    radarPolygon.setPath(points);
  } else {
    radarPolygon = new google.maps.Polygon({
      paths: points,
      strokeColor: "#00BFFF",
      strokeOpacity: 0.8,
      strokeWeight: 2,
      fillColor: "#00BFFF",
      fillOpacity: 0.25,
      map
    });
  }

  // ✅ 레이더 안에 들어왔을 때 보호구역/속도 제한 체크 실행
  checkSchoolZones(myPos.lat, myPos.lng);
  checkDynamicSpeedZones(myPos.lat, myPos.lng, currentSpeed);
  checkSpeedLimit(myPos.lat, myPos.lng, currentSpeed);
}

// ---------------------- 보호구역/속도 제한 알림 ----------------------
function showZoneAlert(zoneName, distance, limit, currentKmh, lastAlertVarName) {
  const now = Date.now();

  // ✅ 중복 알림 방지 (10초 간격으로만 알림)
  if (!window[lastAlertVarName] || now - window[lastAlertVarName] > 10000) {
    window[lastAlertVarName] = now;

    // ✅ 기본 메시지 구조
    let message = `<div class="alert-message"><p>${zoneName} 진입 직전</p>`;

    if (limit) {
      // ✅ 어린이 보호구역일 때만 붉은색 깜박임 CSS 적용
      if (zoneName === "어린이 보호구역") {
        message += `<p class="speed-warning">제한속도: ${limit} km/h</p>`;
        if (currentKmh && currentKmh > limit) {
          // over-limit 클래스 → CSS에서 붉은색 깜박임 (1초 간격)
          message += `<p class="speed-warning over-limit">현재 속도: ${currentKmh.toFixed(1)} km/h</p>`;
        }
      } else {
        // ✅ 일반 속도제한 구역은 기본 표시
        message += `<p class="speed-warning">제한속도: ${limit} km/h</p>`;
        if (currentKmh && currentKmh > limit) {
          message += `<p class="speed-warning">현재 속도: ${currentKmh.toFixed(1)} km/h</p>`;
        }
      }
    }

    message += `</div>`;

    // ✅ 알림 모달 + 사운드 + 음성 안내
    showQueuedModal(`${zoneName} 안내`, message);
    playAlertSound();
    speakMessage(`${zoneName}입니다. ${limit ? `제한 속도는 ${limit} 킬로미터입니다.` : "주의하세요."}`);
  }
}

// ---------------------- 어린이 보호구역 ----------------------
function checkSchoolZones(currentLat, currentLng) {
  if (!Array.isArray(schoolZones) || schoolZones.length === 0) return;

  schoolZones.forEach(school => {
    const distance = getDistance(parseFloat(school.lat), parseFloat(school.lng), currentLat, currentLng);

    // ✅ 기본 감지 반경: 50m
    let detectionRadius = 50;

    // ✅ 속도에 따라 감지 반경 자동 조정
    // - 40km/h 이상이면 70m
    // - 60km/h 이상이면 100m
    if (currentSpeed > 60) {
      detectionRadius = 100;
    } else if (currentSpeed > 40) {
      detectionRadius = 70;
    }

    // ✅ 반경 조건 충족 시 알림 발생
    if (distance <= detectionRadius) {
      showZoneAlert("어린이 보호구역", distance, 30, currentSpeed, "lastSchoolZoneAlertTime");
    }
  });
}

// ---------------------- 동적 속도 제한 ----------------------
function checkDynamicSpeedZones(currentLat, currentLng, currentSpeed) {
  if (!Array.isArray(dynamicSpeedZones) || dynamicSpeedZones.length === 0) return;

  dynamicSpeedZones.forEach(zone => {
    const distance = getDistance(parseFloat(zone.lat), parseFloat(zone.lng), currentLat, currentLng);

    // ✅ 기본 감지 반경: 50m
    let detectionRadius = 50;

    // ✅ 속도에 따라 반경 자동 조정
    if (currentSpeed > 60) {
      detectionRadius = 100;
    } else if (currentSpeed > 40) {
      detectionRadius = 70;
    }

    if (distance <= detectionRadius) {
      showZoneAlert("속도 제한 구역", distance, zone.lmtSpd, currentSpeed, "lastDynamicZoneAlertTime");
    }
  });
}

// ---------------------- 일반 속도 제한 ----------------------
function checkSpeedLimit(currentLat, currentLng, currentSpeed) {
  const limit = currentSpeedLimit ?? null;
  if (!limit) return;

  // ✅ 기본 감지 반경: 50m
  let detectionRadius = 50;

  // ✅ 속도에 따라 반경 자동 조정
  if (currentSpeed > 60) {
    detectionRadius = 100;
  } else if (currentSpeed > 40) {
    detectionRadius = 70;
  }

  if (getDistance(currentLat, currentLng, currentLat, currentLng) <= detectionRadius) {
    showZoneAlert("속도 제한 구역", detectionRadius, limit, currentSpeed, "lastSpeedLimitAlertTime");
  }
}

/* ---------------------- 모달창 드래그 가능하게 만들기 ---------------------- */
function makeDraggableModal(element) {
  let isDragging = false, offsetX, offsetY;

  // PC용 (마우스 이벤트)
  element.addEventListener('mousedown', e => {
    isDragging = true;
    element.style.transform = "none"; // 중앙정렬 transform 제거
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
  });

  document.addEventListener('mousemove', e => {
    if (isDragging) {
      let newLeft = e.clientX - offsetX;
      let newTop = e.clientY - offsetY;

      // ✅ 화면 밖으로 절반 정도는 나갈 수 있게 허용
      newLeft = Math.max(-element.offsetWidth / 2, Math.min(newLeft, window.innerWidth - element.offsetWidth / 2));
      newTop = Math.max(-element.offsetHeight / 2, Math.min(newTop, window.innerHeight - element.offsetHeight / 2));

      element.style.left = newLeft + 'px';
      element.style.top = newTop + 'px';
    }
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
  });

  // 📱 모바일용 (터치 이벤트)
  element.addEventListener('touchstart', e => {
    isDragging = true;
    element.style.transform = "none"; // 중앙정렬 transform 제거
    const touch = e.touches[0];
    offsetX = touch.clientX - element.offsetLeft;
    offsetY = touch.clientY - element.offsetTop;
  });

  document.addEventListener('touchmove', e => {
    if (isDragging) {
      const touch = e.touches[0];
      let newLeft = touch.clientX - offsetX;
      let newTop = touch.clientY - offsetY;

      // ✅ 화면 밖으로 절반 정도는 나갈 수 있게 허용
      newLeft = Math.max(-element.offsetWidth / 2, Math.min(newLeft, window.innerWidth - element.offsetWidth / 2));
      newTop = Math.max(-element.offsetHeight / 2, Math.min(newTop, window.innerHeight - element.offsetHeight / 2));

      element.style.left = newLeft + 'px';
      element.style.top = newTop + 'px';
    }
  });

  document.addEventListener('touchend', () => {
    isDragging = false;
  });
}

/* ---------------------- 목적지 검색 기능 ---------------------- */
async function findDestination(inputName, showPanel = true) {
  const name = inputName.trim().toLowerCase().normalize("NFC");
  let match = null;

  // 1️⃣ 서버 배열 검색 (내 서버 우선)
  if (Array.isArray(adminLocations)) {
    match = adminLocations.find(item =>
      item.phone.trim().toLowerCase().normalize("NFC") === name
    );
  }

  if (match) {
    showDestinationOnMap(match.phone, parseFloat(match.lat), parseFloat(match.lng), match.address);
    destinationLat = parseFloat(match.lat);
    destinationLng = parseFloat(match.lng);
    document.getElementById("startRouteBtn").style.display = "inline-block";
    return Promise.resolve(true);
  }

  // 2️⃣ 외부 API 검색 (전역 변수 활용)
  const service = new google.maps.places.PlacesService(map);
  return new Promise((resolve) => {
    service.textSearch(
      { query: inputName, location: { lat: currentLat, lng: currentLng }, radius: 5000 },
      (results, status) => {
        const panel = document.getElementById("searchResultPanel");
        const body = panel.querySelector(".search-body");

        if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
          let html = results.map((r, idx) => `
            <div class="search-item" data-index="${idx}">
              <div class="search-title">📍 ${r.name}</div>
              <div class="search-address">🏠 ${r.formatted_address}</div>
            </div>
          `).join("");

          body.innerHTML = html;
          if (showPanel) panel.style.display = "block";

          // ✅ 첫 번째 결과를 자동으로 지도에 표시 (레벨 7 복구)
          const first = results[0];
          const p = first.geometry.location;
          map.setCenter(p);
          map.setZoom(7); // ← 복구된 부분
          showDestinationOnMap(first.name, p.lat(), p.lng(), first.formatted_address);

          destinationLat = p.lat();
          destinationLng = p.lng();
          document.getElementById("destinationInput").value = first.name;
          document.getElementById("startRouteBtn").style.display = "inline-block";

          // ✅ 검색결과 창 닫기
          panel.style.display = "none";

          // ✅ 클릭 시 다른 결과 선택 가능 (상세 보기 확대)
          body.querySelectorAll(".search-item").forEach((item) => {
            item.addEventListener("click", () => {
              const idx = item.dataset.index;
              const r = results[idx];
              const p = r.geometry.location;

              map.setCenter(p);
              map.setZoom(16); // 상세 보기 확대
              showDestinationOnMap(r.name, p.lat(), p.lng(), r.formatted_address);

              destinationLat = p.lat();
              destinationLng = p.lng();

              document.getElementById("destinationInput").value = r.name;
              panel.style.display = "none";

              service.getDetails({
                placeId: r.place_id,
                fields: ["formatted_phone_number","website","opening_hours","rating","types"]
              }, (place, detailStatus) => {
                if (detailStatus === google.maps.places.PlacesServiceStatus.OK) {
                  const infoPanel = document.getElementById("destinationResult");
                  infoPanel.innerHTML = `
                    ${place.rating ? `<div class="search-rating">⭐ ${place.rating}</div>` : ""}
                    ${place.formatted_phone_number ? `<div class="search-phone">📞 ${place.formatted_phone_number}</div>` : ""}
                    ${place.website ? `<div class="search-website">🌐 <a href="${place.website}" target="_blank">${place.website}</a></div>` : ""}
                    ${place.opening_hours ? `<div class="search-hours">🕒 ${place.opening_hours.weekday_text.join("<br>")}</div>` : ""}
                    ${place.types ? `<div class="search-type">🏷 ${place.types.join(", ")}</div>` : ""}
                  `;
                }
              });

              document.getElementById("startRouteBtn").style.display = "inline-block";
            });
          });

          resolve(true);
        } else {
          if (showPanel) {
            body.innerHTML = "<div>검색 결과가 없습니다.</div>";
            panel.style.display = "block";
          }
          resolve(false);
        }
      }
    );
  });
}

function showDestinationOnMap(title, lat, lng, address="") {
  // ✅ 좌표 저장
  destinationLat = lat;
  destinationLng = lng;

  const pos = new google.maps.LatLng(lat, lng);

  map.setCenter(pos);
  map.setZoom(7);

  // ✅ 목적지를 찍으면 지도중심모드로 전환
  followUser = false;  
  
  // ---------------------- 목적지 원형 ----------------------
  destinationCircle = new google.maps.Circle({
    strokeColor: "#1976d2",
    strokeOpacity: 0.9,
    strokeWeight: 2,
    fillColor: "#1976d2",
    fillOpacity: 0.25,
    map,
    center: pos,
    radius: 40
  });

  // ---------------------- 목적지 마커 ----------------------
  const marker = new google.maps.Marker({
    position: pos,
    map: map,
    icon: {
      path: "M12 2C8 2 5 5 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3-7-7-7z",
      fillColor: "#FF3B3B",
      fillOpacity: 0.95,
      strokeColor: "#fff",
      strokeWeight: 2,
      scale: 2,
      anchor: new google.maps.Point(12, 24)
    },
    animation: google.maps.Animation.BOUNCE,
    title: title
  });

  destinationMarkers.push(marker);

  const infoWindow = new google.maps.InfoWindow({
    content: `
      <div style="text-align:left">
        📍 목적지: ${title}<br>
        🌐 좌표: (${lat.toFixed(5)}, ${lng.toFixed(5)})<br>
        🏠 주소: ${address}
      </div>`
  });

  marker.addListener("mouseover", () => infoWindow.open(map, marker));
  marker.addListener("mouseout", () => infoWindow.close());

  // ✅ 마커 클릭 시에는 안내하지 않고, 정보만 표시
  marker.addListener("click", () => {
    map.setCenter(pos);
    map.setZoom(18);

    document.getElementById("destinationResult").innerHTML = `
      <div style="text-align:left">
        📍 목적지: ${title}<br>
        🌐 좌표: (${lat.toFixed(5)}, ${lng.toFixed(5)})<br>
        🏠 주소: ${address}
      </div>`;

    openModal(document.getElementById("destinationModal"));
  });
}

/* ---------------------- 1분마다 서버 위치 갱신 ---------------------- */
setInterval(async () => {
  await loadAdminLocations(); // 서버에서 최신 위치 가져오기

  if (Array.isArray(adminLocations)) {
    destinationMarkers.forEach(marker => {
      // marker.title 에는 검색 시 넣어둔 phone 값이 들어있다고 가정
      const match = adminLocations.find(item => item.phone === marker.getTitle());
      if (match) {
        const newLat = parseFloat(match.lat);
        const newLng = parseFloat(match.lng);
        const pos = new google.maps.LatLng(newLat, newLng);

        // 위치가 바뀌었으면 기존 마커를 옮겨줌
        if (marker.getPosition().lat() !== newLat ||
            marker.getPosition().lng() !== newLng) {
          marker.setPosition(pos);
          console.log(`📍 ${match.phone} 위치 갱신:`, newLat, newLng);
        }
      }
    });
  }
}, 5 * 60 * 1000); // 5분마다 실행

  
/* ---------------------- 버튼 이벤트 연결 ---------------------- */

// 목적지 검색 버튼
document.getElementById("searchDestinationBtn").addEventListener("click", () => {
  const inputName = document.getElementById("destinationInput").value;
  if (!inputName) {
    document.getElementById("destinationResult").innerText = "목적지를 입력하세요.";
    openModal(document.getElementById("destinationModal"));
    return;
  }

  // ✅ 모달을 다시 띄우지 않고 검색만 실행
  findDestination(inputName).then(success => {
    if (success) {
      console.log("검색 성공: 결과 선택 시 지도 반영됨");
    } else {
      document.getElementById("destinationResult").innerText = "검색 결과가 없습니다.";
    }
  });
});

// ---------------------- 경로 안내 버튼 ----------------------
document.getElementById("startRouteBtn").addEventListener("click", () => {
  if (!destinationLat || !destinationLng) {
    alert("먼저 목적지를 검색하세요!");
    return;
  }

  // ✅ 경로 안내 모드로 전환
  drivingMode = "navigation";
  startTime = Date.now(); // 주행 시작 시점 초기화

  // ✅ 경로 안내 실행
  showRouteToDestination({ lat: destinationLat, lng: destinationLng });

  // ✅ 목적지 설정 플래그 ON
  destinationSet = true;
  destinationArrived = false; // 아직 도착하지 않음
  drivingStarted = true;

  // ✅ 이동정보 모달 자동 표시
  const travelStatsModal = document.getElementById("travelStatsModal");
  if (travelStatsModal) travelStatsModal.style.display = "block";
  updateTravelStats();
});

// ---------------------- 목적지 모달 열기 버튼 ----------------------
document.getElementById("openDestinationModal").addEventListener("click", () => {
  openModal(document.getElementById("destinationModal"));
});

// ---------------------- 이동정보 모달 열기 버튼 ----------------------
document.getElementById("openTravelStatsModal").addEventListener("click", () => {
  drivingMode = "normal"; // ✅ 일반 주행 모드로 설정
  if (!startTime) startTime = Date.now(); // ✅ 주행 시작 시점만 초기화
  updateTravelStats();
  openModal(document.getElementById("travelStatsModal"));
});

// ---------------------- 경로 초기화 버튼 ----------------------
document.getElementById("resetPathBtn").addEventListener("click", () => {
  pathCoords = [];
  if (pathPolyline) {
    pathPolyline.setMap(null);
    pathPolyline = null;
  }
  document.getElementById("resetPathBtn").style.display = "none";

  if (destinationCircle) {
    destinationCircle.setMap(null);
    destinationCircle = null;
  }

  // ✅ 모든 목적지 마커 제거
  destinationMarkers.forEach(m => m.setMap(null));
  destinationMarkers = [];

  destinationLat = null;
  destinationLng = null;
  document.getElementById("destinationResult").innerHTML = "";
  document.getElementById("startRouteBtn").style.display = "none";

  // ✅ 속도/거리 값도 리셋
  startTime = null;
  speedHistory = [];
  maxSpeed = 0;
  avgSpeed = 0;
  smoothedSpeed = 0;
  totalDistance = 0;
  updateTravelStats();

  openPopupModal(document.getElementById("popupModal"));
});

// ---------------------- 이동정보 모달 닫기 버튼 ----------------------
const closeQueuedModal = document.getElementById("closeQueuedModal");
if (closeQueuedModal) {
  closeQueuedModal.addEventListener("click", () => {
    document.getElementById("travelStatsModal").style.display = "none";
    autoShowTravelStats = false; // 닫으면 자동 표시 중단
  });
}

  

/* ---------------------- 목적지 자동완성 ---------------------- */
function initAutocomplete() {
  const input = document.getElementById("destinationInput");
  const autocomplete = new google.maps.places.Autocomplete(input, {
    fields: ["geometry", "name", "formatted_address"],
    types: ["establishment"],
    componentRestrictions: { country: "kr" }
  });

  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (!place.geometry) {
      document.getElementById("destinationResult").innerText = "목적지를 찾을 수 없습니다.";
      return;
    }

    const lat = place.geometry.location.lat();
    const lng = place.geometry.location.lng();
    const address = place.formatted_address || "";

    console.log("✅ 자동완성 선택됨:", place.name, lat, lng);

    showDestinationOnMap(place.name, lat, lng, address);

    // ✅ 목적지도 배열에 기록
    pathCoords.push({
      lat,
      lng,
      address,
      timestamp: Date.now()
    });

    document.getElementById("startRouteBtn").style.display = "inline-block";
  });
}

// ---------------------- 음성 안내 함수 ----------------------
function speakMessage(message) {
  const utterance = new SpeechSynthesisUtterance(message);
  utterance.lang = "ko-KR"; // 한국어 음성
  speechSynthesis.speak(utterance);
}


// ---------------------- 운행 안내 함수 ----------------------
async function showRouteToDestination(destination) {
  // 기존 렌더러 제거
  if (destinationRenderer) {
    destinationRenderer.setMap(null);
    destinationRenderer = null;
  }

  // 새 렌더러 준비 (빨간색 안내선)
  destinationRenderer = new google.maps.Polyline({
    strokeColor: "#FF0000",
    strokeWeight: 6,
    strokeOpacity: 0.8,
    map: map
  });

  // 목적지 좌표 저장
  destinationLat = destination.lat;
  destinationLng = destination.lng;

  // 지나온 경로 + 목적지 연결
  if (pathCoords.length > 0) {
    destinationRenderer.setPath(
      pathCoords.map(c => new google.maps.LatLng(c.lat, c.lng))
        .concat(new google.maps.LatLng(destinationLat, destinationLng))
    );
  } else {
    destinationRenderer.setPath([
      new google.maps.LatLng(currentLat, currentLng),
      new google.maps.LatLng(destinationLat, destinationLng)
    ]);
  }

  // 시작 메시지
  if (!drivingStarted) {
    speakMessage("경로 안내를 시작합니다.");
    drivingStarted = true;
  }
}

  // 모달 갱신 (한 번만 실행)  
  setInterval(() => {
    updateTravelStats();
  }, 5000);



/* ---------------------- 레이더 반경 내 탐지 ---------------------- */
function checkRadarPOIs(myPos) {
  const service = new google.maps.places.PlacesService(map);

  service.nearbySearch({
    location: myPos,
    radius: radarRadiusMeters,
    type: ["cafe", "restaurant", "pharmacy", "gas_station"]
  }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK) {
      results.forEach(place => {
        const poiPos = place.geometry.location;
        const distance = google.maps.geometry.spherical.computeDistanceBetween(
          new google.maps.LatLng(currentLat, currentLng),
          poiPos
        );

        if (distance <= radarRadiusMeters) {
          const message = `<div class="alert-message">
            <p>📍 레이더 반경 내 탐지: ${place.name}</p>
            <p>거리: ${distance.toFixed(1)} m</p>
          </div>`;

          // 모달창 표시
          showQueuedModal("레이더 탐지", message);

          // 음성 안내 추가
          speakMessage(`레이더 반경 내 ${place.name} 발견, 거리 ${distance.toFixed(0)} 미터`);
        }
      });
    }
  });
}


 
/* ---------------------- 모달 열기/닫기 공통 함수 ---------------------- */
function showQueuedModal(title, content) {
  const modal = document.getElementById("queuedModal");
  document.getElementById("queuedModalTitle").innerText = title;
  document.getElementById("queuedModalBody").innerHTML = content;
  openModal(modal);
}

function openModal(modal) {
  // ✅ 모든 모달 닫기 → 중첩 방지
  document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');

  // ✅ 선택 모달 열기
  modal.style.display = 'block';

  // ✅ 중앙 정렬 보정
  modal.querySelector('.modal-content').style.transform = "translate(-50%, -50%)";
}

function closeModal(modal) {
  modal.style.display = 'none';
}

function openPopupModal(modal) {
  openModal(modal);
  // ✅ 자동 닫힘 시간 3초로 조정
  setTimeout(() => closeModal(modal), 3000);
}

  
/* ---------------------- 모달 닫기 버튼 처리 ---------------------- */
document.querySelectorAll('.close').forEach(btn => {
  btn.addEventListener('click', () => {
    const modal = btn.closest('.modal');
    if (modal) closeModal(modal);

    // 경로 안내 모달 닫을 때 원래 주행 경로 모드로 복원
    if (modal.id === "routeModal") {
      if (destinationRenderer) {
        destinationRenderer.setMap(null);
        destinationRenderer = null;
      }
      // ✅ 수정 포인트: pathCoords가 비어있을 때 오류 방지
      if (pathCoords.length > 0) {   // ← 조건 추가
        // ✅ 좌표+주소 구조 → LatLng 변환
        pathPolyline = new google.maps.Polyline({
          path: pathCoords.map(c => new google.maps.LatLng(c.lat, c.lng)),
          geodesic: true,
          strokeColor: "#0000FF", // 파란색
          strokeOpacity: 1.0,
          strokeWeight: 3,
          map: map
        });
      }
    }
  });
});

  
// ✅ ESC 키로 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === "Escape") {
    document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
  }
});


</script>
