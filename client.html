<!DOCTYPE html>
    <html lang="ko">
    <head>
      <meta charset="UTF-8">
      <title>A-DOMES 위치정보시스템</title>
    
        <!-- Google Maps API 불러오기 -->
        <script async defer
          src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
        </script>
        
        <!-- 마커 클러스터링 라이브러리 -->
        <script src="https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/markerclusterer.js"></script>

      <style>
        /* 전체 초기화: 기본 margin/padding 제거, 화면 전체 사용 */
        html, body {
          margin: 0;
          padding: 0;
          height: 100%;
          overflow: hidden;
          font-family: Arial, sans-serif;
        }
    
        /* 상단바 스타일 */
        #top-bar {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 50px;
          background: #1a237e; /* 남색 배경 */
          color: white;
          display: flex;
          justify-content: space-between; /* 좌측 버튼, 우측 타이틀 배치 */
          align-items: center;
          z-index: 1000;
          padding: 0 20px;
        }
    
        /* 상단바 좌측 버튼 그룹 */
        #menu-buttons {
          display: flex;
          gap: 20px;
          margin-left: 0px;
          margin-top: 4px;
        }
    
        /* 메뉴 버튼 스타일 */
        .menu-btn {
          cursor: pointer;
          padding: 6px 12px;
          background: #3949ab;
          border-radius: 4px;
          user-select: none;
          display: flex;
          align-items: center;
          gap: 6px; /* 아이콘과 텍스트 간격 */
        }
    
        /* 아이콘 크기 */
        .icon {
          font-size: 16px;
        }
    
        /* 우측 타이틀 */
        #title {
          font-size: 20px;
          font-weight: bold;
          text-align: right;
          margin-right: 50px;
        }
    
        /* 지도 전체 화면 */
        #map {
          position: absolute;
          top: 50px; /* 상단바 높이만큼 아래 */
          left: 0;
          width: 100%;
          height: calc(100% - 50px);
          background: #ddd;
          z-index: 1;
        }
    
        /* 접속현황/환경설정 패널 공통 스타일 */
        .dropdown-panel {
          position: absolute;
          top: 50px;
          background: white;
          border: 1px solid #ccc;
          width: 260px;
          display: none; /* 기본은 숨김 */
          z-index: 2000;
          box-shadow: 0 2px 6px rgba(0,0,0,0.25);
          padding: 10px 0;
        }
        
        /* 패널 항목 스타일 */
        .dropdown-item {
          padding: 12px 18px;
          cursor: pointer;
          border-bottom: 1px solid #eee;
          font-size: 16px;
          font-weight: 500;
        }
        
        .dropdown-item:hover {
          background: #f0f0f0;
        }
        
        /* 패널 내 입력 요소 스타일 */
        .dropdown-item input,
        .dropdown-item select,
        .dropdown-item button {
          margin-top: 5px;
          font-size: 15px;
        }
    
        /* 우측 사용자 정보 패널 */
        #user-panel {
          position: absolute;
          top: 50px;
          right: 0;
          width: 320px;
          height: calc(100% - 50px);
          background: white;
          border-left: 1px solid #ccc;
          display: none; /* 기본은 숨김 */
          z-index: 3000;
          padding: 15px;
          overflow-y: auto; /* 내용이 많으면 스크롤 */
        }
    
        /* 사용자 패널 헤더 (제목 + 닫기 버튼) */
        .panel-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
        }
    
        /* 닫기 버튼 스타일 */
        #close-user-panel {
          background: #e53935;
          color: white;
          border: none;
          padding: 4px 8px;
          cursor: pointer;
          border-radius: 4px;
          font-size: 14px;
        }
        #close-user-panel:hover {
          background: #c62828;
        }
    
        /* 사용자 패널 제목 */
        #user-panel h3 {
          margin: 0;
        }
      </style>
    </head>
    
    <body>
    
      <!-- 상단바 -->
      <div id="top-bar">
        <!-- 좌측 버튼 -->
        <div id="menu-buttons">
          <!-- 접속현황 버튼 -->
          <div id="btn-connection" class="menu-btn">
            <span class="icon">📡</span> 접속현황
          </div>
          <!-- 환경설정 버튼 -->
          <div id="btn-settings" class="menu-btn">
            <span class="icon">⚙️</span> 환경설정
          </div>
        </div>
    
        <!-- 우측 타이틀 -->
        <div id="title">A-DOMES | 위치정보시스템</div>
      </div>
    
      <!-- 접속현황 패널 -->
      <div id="connection-panel" class="dropdown-panel">
        <div class="dropdown-item" onclick="openUserPanel('current')">현재 접속자 보기</div>
        <div class="dropdown-item" onclick="openUserPanel('all')">전체 사용자 보기</div>
        <div class="dropdown-item" onclick="openUserPanel('detail')">사용자별 상세 보기</div>
      </div>
    
      <!-- 환경설정 패널 -->
      <div id="settings-panel" class="dropdown-panel">
        <!-- 현재 위치 보기: 지도 갱신 + 패널 열림 -->
        <div class="dropdown-item" onclick="mode='current'; showMap(); openUserPanel('current')">
          현재 위치 보기
        </div>
        <!-- 경로 보기: 지도 갱신 + 패널 열림 -->
        <div class="dropdown-item" onclick="mode='paths'; showMap(); openUserPanel('detail')">
          경로 보기
        </div>
    
        <!-- 갱신 주기 설정 -->
        <div class="dropdown-item">
          <strong>갱신 주기 설정</strong><br>
          <input type="number" id="intervalValue" value="5" min="1" style="width:80px; font-size:16px;">
          <select id="intervalUnit" style="font-size:16px;">
            <option value="minutes">분</option>
            <option value="seconds">초</option>
          </select>
          <button onclick="setCustomInterval()" style="font-size:20px;">적용</button>
        </div>
    
        <!-- 마커 클러스터링 옵션 -->
        <div class="dropdown-item">
          <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
        </div>
    
        <!-- 최근 50개 데이터만 표시 옵션 -->
        <div class="dropdown-item">
          <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
        </div>
      </div>
    
      <!-- 우측 사용자 정보 패널 -->
      <div id="user-panel">
        <div class="panel-header">
          <h3>사용자 정보</h3>
          <!-- 닫기 버튼 -->
          <button id="close-user-panel">✖ 닫기</button>
        </div>
        <!-- 사용자 정보 출력 영역 -->
        <div id="user-content"></div>
      </div>
    
      <!-- 지도 영역 -->
      <div id="map"></div>


   
<script>
  // ---------------------- 전역 변수 ----------------------
  let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];

  /* ---------------------- 데이터 로딩 ---------------------- */
  async function loadData() {
    try {
      const response = await fetch(CONFIG.USER_URL + "/data"); // config.js의 USER_URL 사용
      allData = await response.json();
      showMap();
    } catch (err) {
      console.error("데이터 로드 실패:", err);
      alert("데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
    }
  }

  /* ---------------------- 지도 초기화 ---------------------- */
  function clearMap() {
    markers.forEach(m => m.setMap(null)); markers = [];
    polylines.forEach(p => p.setMap(null)); polylines = [];
    if (markerCluster) markerCluster.clearMarkers();
  }

  function showMap() {
    clearMap();
    if (!map) return;

    if (mode === "current") {
      const latestByUser = {};
      allData.forEach(item => {
        if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
          latestByUser[item.name] = item;
        }
      });

      Object.values(latestByUser).forEach(user => {
        const marker = new google.maps.Marker({
          position: { lat: parseFloat(user.lat), lng: parseFloat(user.lng) },
          map: map,
          icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
          title: `${user.name} (${user.status}, ${user.time})`
        });
        markers.push(marker);
      });

    } else if (mode === "paths") {
      const grouped = {};
      allData.forEach(item => {
        if (!grouped[item.name]) grouped[item.name] = [];
        grouped[item.name].push(item);
      });

      Object.values(grouped).forEach(records => {
        records.sort((a, b) => new Date(a.time) - new Date(b.time));
        let data = records;
        if (document.getElementById("limitOption").checked) {
          data = data.slice(-50);
        }

        const pathCoords = data.map(item => ({ lat: parseFloat(item.lat), lng: parseFloat(item.lng) }));
        const polyline = new google.maps.Polyline({
          path: pathCoords,
          geodesic: true,
          strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
          strokeOpacity: 1.0,
          strokeWeight: 2,
          map: map
        });
        polylines.push(polyline);

        data.forEach((d, idx) => {
          const marker = new google.maps.Marker({
            position: { lat: parseFloat(d.lat), lng: parseFloat(d.lng) },
            map: map,
            title: `${d.name} / ${d.time}`,
            icon: idx === data.length - 1
              ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
              : "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
          });
          markers.push(marker);
        });
      });
    }

    if (document.getElementById("clusterOption").checked) {
      markerCluster = new MarkerClusterer(map, markers, {
        imagePath: 'https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/m'
      });
    }

    updateUserPanelContent(mode);
  }

  /* ---------------------- 사용자 패널 내용 업데이트 ---------------------- */
  function updateUserPanelContent(viewMode = "current") {
    const panel = document.getElementById("user-content");
    panel.innerHTML = "";

    if (viewMode === "current") {
      const latestByUser = {};
      allData.forEach(item => {
        if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
          latestByUser[item.name] = item;
        }
      });

      if (Object.keys(latestByUser).length === 0) {
        panel.innerHTML = `<div class="no-user">현재 접속자가 없습니다</div>`;
        return;
      }

      Object.values(latestByUser).forEach(latest => {
        panel.innerHTML += `
          <div class="user-card">
            <div class="user-name">👤 ${latest.name}</div>
            📍 위치: ${latest.location}<br>
            🕒 최초 입력: ${latest.connectTime}<br>
            🕒 마지막 갱신: ${latest.time}<br>
            상태: ${latest.status}<br>
            좌표: (${latest.lat}, ${latest.lng})
          </div>
        `;
      });

    } else if (viewMode === "all") {
      allData.forEach(item => {
        panel.innerHTML += `
          <div class="user-card">
            <div class="user-name">👤 ${item.name}</div>
            📍 위치: ${item.location}<br>
            🕒 입력: ${item.time}<br>
            상태: ${item.status}<br>
            좌표: (${item.lat}, ${item.lng})
          </div>
        `;
      });

    } else if (viewMode === "detail") {
      const grouped = {};
      allData.forEach(item => {
        if (!grouped[item.name]) grouped[item.name] = [];
        grouped[item.name].push(item);
      });

      Object.entries(grouped).forEach(([name, records]) => {
        panel.innerHTML += `<div class="user-card"><strong>${name}</strong><br>`;
        records.forEach(r => {
          panel.innerHTML += `🕒 ${r.time} | ${r.status} | (${r.lat}, ${r.lng})<br>`;
        });
        panel.innerHTML += `</div>`;
      });
    }
  }

  /* ---------------------- 갱신 주기 설정 ---------------------- */
  function setCustomInterval() {
    const value = parseInt(document.getElementById("intervalValue").value);
    const unit = document.getElementById("intervalUnit").value;

    if (isNaN(value) || value <= 0) {
      alert("1 이상의 값을 입력하세요.");
      return;
    }

    let newInterval = unit === "seconds" ? value * 1000 : value * 60000;
    clearInterval(intervalId);
    intervalId = setInterval(loadData, newInterval);
    alert("갱신 주기가 변경되었습니다.");
  }

  /* ---------------------- 패널 동작 ---------------------- */
  const btnConnection = document.getElementById("btn-connection");
  const btnSettings = document.getElementById("btn-settings");
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");

  btnConnection.onclick = () => {
    settingsPanel.style.display = "none";
    connectionPanel.style.left = btnConnection.getBoundingClientRect().left + "px";
    connectionPanel.style.display =
      connectionPanel.style.display === "block" ? "none" : "block";
  };

  btnSettings.onclick = () => {
    connectionPanel.style.display = "none";
    settingsPanel.style.left = btnSettings.getBoundingClientRect().left + "px";
    settingsPanel.style.display =
      settingsPanel.style.display === "block" ? "none" : "block";
  };

  function openUserPanel(viewMode) {
    connectionPanel.style.display = "none";
    userPanel.style.display = "block";
    updateUserPanelContent(viewMode);
  }

  function closeUserPanel() {
    userPanel.style.display = "none";
  }

  /* ---------------------- 초기 실행 ---------------------- */
  function initMap() {
    // 기기 판별
    let deviceType = "javascript";
    const ua = navigator.userAgent.toLowerCase();
    if (ua.includes("android")) deviceType = "android";
    else if (ua.includes("iphone") || ua.includes("ipad")) deviceType = "ios";

    // config.js에서 해당 기기 mapId 선택
    const selectedMapId = CONFIG.mapIds[deviceType] || CONFIG.mapIds.fixed;

    // 지도 초기화
    map = new google.maps.Map(document.getElementById("map"), {
      center: CONFIG.DEFAULT_CENTER || { lat: 36.5, lng: 127.5 },
      zoom: 7,
      mapId: selectedMapId
    });

    // 내 위치 표시
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          new google.maps.Marker({ position: myPos, map: map, title: "내 위치" });
        },
        () => {
          // 위치 정보를 가져오지 못했을 때 기본 좌표에 마커 표시
          new google.maps.Marker({ position: CONFIG.DEFAULT_CENTER, map: map, title: "기본 위치" });
        }
      );
    }

    // 닫기 버튼 이벤트 연결
    const closeBtn = document.getElementById("close-user-panel");
    if (closeBtn) {
      closeBtn.addEventListener("click", closeUserPanel);
    }

    // 외부 클릭 시 패널 닫기
    document.addEventListener("click", function(e) {
      if (!btnConnection.contains(e.target) && !connectionPanel.contains(e.target)) {
        connectionPanel.style.display = "none";
      }
      if (!btnSettings.contains(e.target) && !settingsPanel.contains(e.target)) {
        settingsPanel.style.display = "none";
      }
    });

    // 첫 데이터 로드 및 주기적 갱신 (기본 5분)
    loadData();
    intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
  }
</script>
</body>
</html>
