<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
  <script src="https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/markerclusterer.js"></script>

  <style>
    /* 전체 초기화 */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* 상단바 */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: #1a237e;
      color: white;
      display: flex;
      justify-content: space-between; /* 좌측 버튼, 우측 타이틀 */
      align-items: center;
      z-index: 1000;
      padding: 0 20px; /* 좌우 여백 */
    }

    /* 버튼 그룹 */
    #menu-buttons {
      display: flex;
      gap: 20px;
      margin-left: 0px;   /* 좌측 끝에 딱 붙게 */
      margin-top: 4px;    /* 상단에서 약간 내려오게 */
    }

    .menu-btn {
      cursor: pointer;
      padding: 6px 12px;
      background: #3949ab;
      border-radius: 4px;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px; /* 아이콘과 텍스트 간격 */
    }

    /* 아이콘 */
    .icon {
      font-size: 16px;
    }

    /* 타이틀 */
    #title {
      font-size: 20px;
      font-weight: bold;
      text-align: right;
      margin-right: 50px; /* 우측 끝에서 조금 떨어지게 */
    }

    /* 지도 전체 화면 */
    #map {
      position: absolute;
      top: 50px;
      left: 0;
      width: 100%;
      height: calc(100% - 50px);
      background: #ddd;
      z-index: 1;
    }

    /* 접속현황/환경설정 패널 */
    .dropdown-panel {
      position: absolute;
      top: 50px;
      background: white;
      border: 1px solid #ccc;
      width: 260px;
      display: none;
      z-index: 2000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      padding: 10px 0;
    }
    
    /* 각 항목 스타일 */
    .dropdown-item {
      padding: 12px 18px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-size: 16px;
      font-weight: 500;
    }
    
    .dropdown-item:hover {
      background: #f0f0f0;
    }
    
    .dropdown-item input,
    .dropdown-item select,
    .dropdown-item button {
      margin-top: 5px;
      font-size: 15px;
    }

    /* 우측 사용자 정보 패널 */
    #user-panel {
      position: absolute;
      top: 50px;
      right: 0;
      width: 320px;
      height: calc(100% - 50px);
      background: white;
      border-left: 1px solid #ccc;
      display: none;
      z-index: 3000;
      padding: 15px;
      overflow-y: auto;
    }

    /* 패널 헤더 (제목 + 닫기 버튼) */
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #close-user-panel {
      background: #e53935;
      color: white;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }
    #close-user-panel:hover {
      background: #c62828;
    }

    #user-panel h3 {
      margin: 0;
    }
  </style>
</head>

<body>

  <!-- 상단바 -->
  <div id="top-bar">
    <!-- 좌측 버튼 -->
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn">
        <span class="icon">📡</span> 접속현황
      </div>
      <div id="btn-settings" class="menu-btn">
        <span class="icon">⚙️</span> 환경설정
      </div>
    </div>

    <!-- 우측 타이틀 -->
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- 접속현황 패널 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="openUserPanel('현재 접속자')">현재 접속자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('전체 사용자')">전체 사용자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('사용자별 상세')">사용자별 상세 보기</div>
  </div>

  <!-- 환경설정 패널 -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="mode='current'; showMap()">현재 위치 보기</div>
    <div class="dropdown-item" onclick="mode='paths'; showMap()">경로 보기</div>

    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <input type="number" id="intervalValue" value="5" min="1" style="width:80px; font-size:16px;">
      <select id="intervalUnit" style="font-size:16px;">
        <option value="minutes">분</option>
        <option value="seconds">초</option>
      </select>
      <button onclick="setCustomInterval()" style="font-size:20px;">적용</button>
    </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
    </div>

    <div class="dropdown-item">
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </div>
  </div>

  <!-- 우측 사용자 정보 패널 -->
  <div id="user-panel">
    <div class="panel-header">
      <h3>사용자 정보</h3>
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <div id="user-content"></div>
  </div>

  <!-- 지도 -->
  <div id="map"></div>

  <!-- 스크립트 -->
  <script>
    function openUserPanel(mode) {
      document.getElementById("user-panel").style.display = "block";
      document.getElementById("user-content").innerText = mode + " 정보 표시";
    }

    function closeUserPanel() {
      document.getElementById("user-panel").style.display = "none";
    }

    // 닫기 버튼 이벤트 연결
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("close-user-panel").addEventListener("click", closeUserPanel);
    });
  </script>

</body>
</html>



  <script>
    let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];
  
    /* ---------------------- 데이터 로딩 ---------------------- */
    async function loadData() {
      const response = await fetch("https://script.google.com/macros/s/AKfycbztvsGB7DD9V4CfHprAjtOKxvOmiIMnlInHCk5hDTjOeSTzaF2vgGXcw9fMsNtKcLlvAg/exec");
      allData = await response.json();
      showMap();
    }
  
    /* ---------------------- 지도 초기화 ---------------------- */
    function clearMap() {
      markers.forEach(m => m.setMap(null)); markers = [];
      polylines.forEach(p => p.setMap(null)); polylines = [];
      if (markerCluster) markerCluster.clearMarkers();
    }
  
    function showMap() {
      clearMap();
  
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7
      });
  
      if (mode === "current") {
        const latestByUser = {};
  
        allData.forEach(item => {
          if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
            latestByUser[item.name] = item;
          }
        });
  
        Object.values(latestByUser).forEach(user => {
          const marker = new google.maps.Marker({
            position: { lat: parseFloat(user.lat), lng: parseFloat(user.lng) },
            map: map,
            icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
            title: `${user.name} (${user.status}, ${user.time})`
          });
          markers.push(marker);
        });
  
      } else if (mode === "paths") {
        const grouped = {};
  
        allData.forEach(item => {
          if (!grouped[item.name]) grouped[item.name] = [];
          grouped[item.name].push(item);
        });
  
        Object.values(grouped).forEach(records => {
          records.sort((a, b) => new Date(a.time) - new Date(b.time));
  
          let data = records;
          if (document.getElementById("limitOption").checked) {
            data = data.slice(-50);
          }
  
          const pathCoords = data.map(item => ({
            lat: parseFloat(item.lat),
            lng: parseFloat(item.lng)
          }));
  
          const polyline = new google.maps.Polyline({
            path: pathCoords,
            geodesic: true,
            strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16),
            strokeOpacity: 1.0,
            strokeWeight: 2,
            map: map
          });
          polylines.push(polyline);
  
          data.forEach((d, idx) => {
            const marker = new google.maps.Marker({
              position: { lat: parseFloat(d.lat), lng: parseFloat(d.lng) },
              map: map,
              title: `${d.name} / ${d.time}`,
              icon: idx === data.length - 1
                ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                : "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
            });
            markers.push(marker);
          });
        });
      }
  
      if (document.getElementById("clusterOption").checked) {
        markerCluster = new MarkerClusterer(map, markers, {
          imagePath: 'https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/m'
        });
      }
  
      updateUserPanelContent();
    }
  
    /* ---------------------- 우측 패널 내용 업데이트 ---------------------- */
    function updateUserPanelContent() {
      const panel = document.getElementById("user-content");
      panel.innerHTML = "";
  
      const latestByUser = {};
  
      allData.forEach(item => {
        if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
          latestByUser[item.name] = item;
        }
      });
  
      Object.values(latestByUser).forEach(latest => {
        const div = document.createElement("div");
        div.style.marginBottom = "10px";
        div.innerHTML = `
          <strong>${latest.name}</strong><br>
          📍 위치: ${latest.location}<br>
          🕒 최초 입력: ${latest.connectTime}<br>
          🕒 마지막 갱신: ${latest.time}<br>
          상태: ${latest.status}<br>
          좌표: (${latest.lat}, ${latest.lng})
        `;
        panel.appendChild(div);
      });
    }
  
    /* ---------------------- 갱신 주기 설정 ---------------------- */
    function setCustomInterval() {
      const value = parseInt(document.getElementById("intervalValue").value);
      const unit = document.getElementById("intervalUnit").value;
  
      if (isNaN(value) || value <= 0) {
        alert("1 이상의 값을 입력하세요.");
        return;
      }
  
      let newInterval = unit === "seconds" ? value * 1000 : value * 60000;
  
      clearInterval(intervalId);
      intervalId = setInterval(loadData, newInterval);
  
      alert("갱신 주기가 변경되었습니다.");
    }
  
    /* ---------------------- 패널 동작 ---------------------- */
    const btnConnection = document.getElementById("btn-connection");
    const btnSettings = document.getElementById("btn-settings");
    const connectionPanel = document.getElementById("connection-panel");
    const settingsPanel = document.getElementById("settings-panel");
    const userPanel = document.getElementById("user-panel");
  
    btnConnection.onclick = () => {
      settingsPanel.style.display = "none";
      connectionPanel.style.left = btnConnection.getBoundingClientRect().left + "px";
      connectionPanel.style.display =
        connectionPanel.style.display === "block" ? "none" : "block";
    };
  
    btnSettings.onclick = () => {
      connectionPanel.style.display = "none";
      settingsPanel.style.left = btnSettings.getBoundingClientRect().left + "px";
      settingsPanel.style.display =
        settingsPanel.style.display === "block" ? "none" : "block";
    };
  
    function openUserPanel(mode) {
      connectionPanel.style.display = "none";
      userPanel.style.display = "block";
  
      if (mode === "current") {
        mode = "current";
      } else if (mode === "all") {
        mode = "current"; // 전체 사용자도 최신 위치 기준
      } else if (mode === "detail") {
        mode = "current"; // 상세 보기 모드도 최신 위치 기준
      }
  
      showMap();
    }
  
    function closeUserPanel() {
      userPanel.style.display = "none";
    }
  
    /* 화면 클릭 시 패널 닫기 */
    document.addEventListener("click", function(e) {
      if (!btnConnection.contains(e.target) && !connectionPanel.contains(e.target)) {
        connectionPanel.style.display = "none";
      }
      if (!btnSettings.contains(e.target) && !settingsPanel.contains(e.target)) {
        settingsPanel.style.display = "none";
      }
    });
  
    /* ---------------------- 초기 실행 ---------------------- */
    window.onload = () => {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7
      });
  
      loadData();
      intervalId = setInterval(loadData, 30000);
    };
  </script>
  </body>
  </html>
