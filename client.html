<body>
  <!-- 상단바 -->
  <div id="top-bar">
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn"><span class="icon">📡</span> 접속현황</div>
      <div id="btn-settings" class="menu-btn"><span class="icon">⚙️</span> 환경설정</div>
    </div>
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- 접속현황 패널 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="openUserPanel('current')">현재 접속자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('all')">전체 사용자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('paths')">위치 / 경로 보기</div>
  
    <!-- 위치찾기 -->
    <div class="dropdown-item">
      <strong>위치찾기</strong><br>
      <div class="location-search">
        <input type="number" id="latInput" placeholder="위도 입력" step="0.0001">
        <input type="number" id="lngInput" placeholder="경도 입력" step="0.0001">
        <button id="location-check" class="btn-check">확인</button> 
      </div>
    </div>
  </div>

  <!-- 환경설정 패널 -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item">
      <strong>라이트/다크 모드</strong><br>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>

    <!-- 갱신 주기 설정 -->  
    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <div style="display:flex; align-items:center; gap:8px; margin-top:6px;">
        <input type="number" id="intervalValue" value="5" min="1" 
               style="width:70px; font-size:18px; padding:6px;">
        <select id="intervalUnit" style="font-size:18px; padding:6px;">
          <option value="minutes">분</option>
          <option value="seconds">초</option>
        </select>
        <button onclick="setCustomInterval()" 
                style="font-size:18px; padding:6px 12px;">적용</button>
      </div>
    </div>

    <!-- 마커 클러스터링 옵션 -->
    <div class="dropdown-item">
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
    </div>

    <!-- 최근 50개 데이터만 표시 옵션 -->
    <div class="dropdown-item">
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </div>
  </div>

  <!-- 사용자 정보 패널 -->
  <div id="user-panel">
    <div class="panel-header">
      <h3 id="user-panel-title">사용자 정보</h3>
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <div id="path-select-container">
      <label for="path-user-select">경로 보기 선택:</label>
      <select id="path-user-select" onchange="updateUserPanelContent('paths')">
        <option value="all">전체</option>
      </select>
    </div>
    <div id="user-content">
      <table id="user-table">
        <thead>
          <tr id="user-table-header"></tr>
        </thead>
        <tbody id="user-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 지도 영역 -->
  <div id="map"></div>

  <!-- 메시지 박스 -->
  <div id="message-box"></div>

  <!-- ✅ 라이트/다크 스타일 JSON 정의 및 이벤트 연결 -->
  <script>
    const lightStyle = [
      { elementType: "geometry", stylers: [{ color: "#f5f5f5" }] },
      { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#616161" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#f5f5f5" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#dadada" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#c9e6ff" }] },
      { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#dcedc8" }] }
    ];

    const darkStyle = [
      { elementType: "geometry", stylers: [{ color: "#212121" }] },
      { elementType: "labels.icon", stylers: [{ visibility: "off" }] },
      { elementType: "labels.text.fill", stylers: [{ color: "#757575" }] },
      { elementType: "labels.text.stroke", stylers: [{ color: "#212121" }] },
      { featureType: "road", elementType: "geometry", stylers: [{ color: "#383838" }] },
      { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#616161" }] },
      { featureType: "water", elementType: "geometry", stylers: [{ color: "#0f1c2c" }] },
      { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#1b5e20" }] }
    ];

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7,
        mapTypeId: "roadmap",   // ✅ 기본은 일반 지도
        styles: lightStyle,     // 기본 라이트 모드
        mapTypeControl: true,   // ✅ 지도 유형 전환 버튼 활성화
        mapTypeControlOptions: {
          style: google.maps.MapTypeControlStyle.DEFAULT,
          position: google.maps.ControlPosition.TOP_RIGHT,
          mapTypeIds: ["roadmap", "satellite"] // 일반 ↔ 위성 전환 가능
        }
      });

      const themeToggle = document.getElementById("themeToggle");
      if (themeToggle) {
        themeToggle.addEventListener("change", () => {
          document.body.classList.toggle("dark-mode", themeToggle.checked);

          // ✅ 일반 지도일 때만 라이트/다크 스타일 적용
          if (map.getMapTypeId() === "roadmap") {
            if (themeToggle.checked) {
              map.setOptions({ styles: darkStyle });
            } else {
              map.setOptions({ styles: lightStyle });
            }
          }
        });
      }

      loadData();
      intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
    }
    window.initMap = initMap;
  </script>

  <!-- 3. MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <!-- 4. Google Maps API -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
  </script>

</body>
</html>
