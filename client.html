<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관리자용 위치정보 시스템</title>
  <style>
    .button-group {
      display: flex;
      justify-content: center;
      align-items: center;   /* 버튼 세로 정렬 보정 */
      gap: 12px;
      margin: 20px auto;
      max-width: 420px;
      flex-wrap: wrap;       /* 화면이 좁을 때 줄바꿈 허용 */
    }
    .button-group button {
      flex: 1;
      min-width: 100px;      /* 버튼 최소 크기 확보 */
      font-size: 16px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #2196F3;
      color: white;
      transition: background-color 0.3s;
    }
    .button-group button:hover {
      background-color: #1976D2; /* hover 시 색상 변경 */
    }
    #map {
      width: 100%;
      height: 500px;
      margin-top: 20px;
      border: 2px solid #ccc;   /* 지도 영역 테두리 */
      border-radius: 8px;
    }
  </style>
  <!-- ✅ 구글 지도 API 키 반드시 교체 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
</head>
<body>
  <header>
    <h2>관리자용 위치정보 시스템</h2>
  </header>

  <div class="button-group">
    <!-- 지도맵 버튼 이미지 추가 -->
    <img src="btn-current.png"
         alt="지도 메뉴"
         style="cursor:pointer; width:60px; height:60px; margin:10px;"
         onclick="mode='current'; showMap()">

    <button type="button" onclick="mode='current'; showMap()">현재 위치 보기</button>
    <button type="button" onclick="mode='paths'; showMap()">경로 보기</button>
  </div>

  <div id="map"></div>

  <script>
    let map;
    let mode = "current";

    function showMap() {
      fetch("https://script.google.com/macros/s/AKfycbyt5uK3WQ0-xH73ntMfcpaK6o9VLwL2I-sGDixj2fS-ayRgJEwvyF_UwJnyjBhsEHj16Q/exec")
        .then(response => response.json())
        .then(data => {
          map = new google.maps.Map(document.getElementById("map"), {
            center: {lat: 36.5, lng: 127.5},
            zoom: 7
          });

          if (mode === "current") {
            // ✅ 사용자별 최신 위치만 표시
            const latestByUser = {};
            data.forEach(item => {
              if (!latestByUser[item.phone] || new Date(item.time) > new Date(latestByUser[item.phone].time)) {
                latestByUser[item.phone] = item;
              }
            });

            Object.values(latestByUser).forEach(user => {
              const marker = new google.maps.Marker({
                position: {lat: parseFloat(user.lat), lng: parseFloat(user.lng)},
                map: map,
                icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
                title: user.phone + " (" + user.status + ", " + user.time + ")"
              });

              // ✅ 마커에 사용자 식별자 저장
              marker.phone = user.phone;

              // ✅ 마커 클릭 시 해당 사용자 경로 표시
              marker.addListener("click", () => {
                const records = data.filter(item => item.phone === marker.phone);
                records.sort((a, b) => new Date(a.time) - new Date(b.time));

                const pathCoords = records.map(item => ({
                  lat: parseFloat(item.lat),
                  lng: parseFloat(item.lng)
                }));

                new google.maps.Polyline({
                  path: pathCoords,
                  geodesic: true,
                  strokeColor: "#FF0000",
                  strokeOpacity: 1.0,
                  strokeWeight: 2,
                  map: map
                });
              });
            });

          } else {
            // ✅ 사용자별 전체 경로 표시 (시간순 정렬)
            const grouped = {};
            data.forEach(item => {
              if (!grouped[item.phone]) grouped[item.phone] = [];
              grouped[item.phone].push(item);
            });

            Object.values(grouped).forEach(records => {
              records.sort((a, b) => new Date(a.time) - new Date(b.time));
              const pathCoords = records.map(item => ({
                lat: parseFloat(item.lat),
                lng: parseFloat(item.lng)
              }));
              new google.maps.Polyline({
                path: pathCoords,
                geodesic: true,
                strokeColor: "#FF0000",
                strokeOpacity: 1.0,
                strokeWeight: 2,
                map: map
              });
            });
          }
        })
        .catch(err => { alert("데이터 불러오기 실패: " + err.message); });
    }
  </script>
</body>
</html>
