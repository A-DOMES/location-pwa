<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

<!-- 1. config.js 먼저 (CONFIG 객체 정의) -->
<script src="config.js"></script>

<!-- 2. 사용자 코드 -->
<script>
// ---------------------- 전역 변수 ----------------------
let map, mode = "current", markers = [], polylines = [], markerCluster, intervalId, allData = [];
const btnConnection = document.getElementById("btn-connection");
const connectionPanel = document.getElementById("connection-panel");
const btnSettings = document.getElementById("btn-settings");
const settingsPanel = document.getElementById("settings-panel");

/* ---------------------- 거리 계산 ---------------------- */
function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

/* ---------------------- 색상 함수 ---------------------- */
function stringToColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
  return "#" + "00000".substring(0, 6 - c.length) + c;
}

/* ---------------------- 데이터 로딩 ---------------------- */
async function loadData(token = null) {
  try {
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);

    const response = await fetch(url);
    allData = await response.json();

    populatePathSelect();
    showMap();
    updateSummary(allData);
    updateUserPanelContent(mode);
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    showMessage("⚠️ 데이터를 불러오지 못했습니다.");
  }
}

/* ---------------------- 지도 초기화 보조 ---------------------- */
function clearMap() {
  if (markerCluster) {
    markerCluster.clearMarkers();
    markerCluster = null;
  }
  markers.forEach(m => m.setMap(null));
  markers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];
}

/* ---------------------- 지도 표시 ---------------------- */
function showMap() {
  clearMap();
  if (!map) return;

  if (mode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    Object.values(latestByUser).forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
        title: `${user.phone} (${user.status}, ${user.updated})`
      });
      markers.push(marker);
    });
  } else if (mode === "all") {
    allData.forEach(user => {
      const marker = new google.maps.Marker({
        position: { lat: user.lat, lng: user.lng },
        map: map,
        title: `${user.phone} (${user.status}, ${user.time})`
      });
      markers.push(marker);
    });
  } else if (mode === "paths") {
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";
    let users = selectedPhone === "all" ? allData : allData.filter(u => u.phone === selectedPhone);

    users.forEach(user => {
      const pathCoords = [];
      for (let j = 0; j < user.path.length; j += 2) {
        const lat = user.path[j];
        const lng = user.path[j + 1];
        if (lat && lng) pathCoords.push({ lat, lng });
      }
      if (pathCoords.length > 0) {
        const polyline = new google.maps.Polyline({
          path: pathCoords,
          geodesic: true,
          strokeColor: stringToColor(user.phone),
          strokeOpacity: 1.0,
          strokeWeight: 2,
          map: map
        });
        polylines.push(polyline);
      }
    });
  }

  if (document.getElementById("clusterOption")?.checked) {
    markerCluster = new markerClusterer.MarkerClusterer({ map: map, markers: markers });
  }
}

/* ---------------------- 드롭다운 채우기 ---------------------- */
function populatePathSelect() {
  const select = document.getElementById("path-user-select");
  if (!select) return;
  select.innerHTML = `<option value="all">전체</option>`;
  const phones = [...new Set(allData.map(u => u.phone))];
  phones.forEach(phone => {
    const opt = document.createElement("option");
    opt.value = phone;
    opt.textContent = phone;
    select.appendChild(opt);
  });
}

/* ---------------------- 메시지 표시 ---------------------- */
function showMessage(text) {
  const msgBox = document.getElementById("message-box");
  msgBox.innerText = text;
  msgBox.style.display = "block";
  setTimeout(() => msgBox.style.display = "none", 3000);
}

/* ---------------------- 요약 패널 ---------------------- */
function updateSummary(users) {
  const activeCount = users.filter(u => u.status === "정상" || u.status === "active").length;
  const blockedCount = users.filter(u => u.status === "차단" || u.status === "blocked").length;
  const stopCount = users.filter(u => u.status === "해제" || u.status === "stop").length;

  document.getElementById("summaryActive").textContent = `정상: ${activeCount}명`;
  document.getElementById("summaryBlocked").textContent = `차단: ${blockedCount}명`;
  document.getElementById("summaryStop").textContent = `해제: ${stopCount}명`;
}

/* ---------------------- 상세 카드 ---------------------- */
function showDetailCard(user) {
  document.getElementById("cardName").textContent = user.phone || "전화번호 없음";
  document.getElementById("cardPhone").textContent = user.phone || "";
  document.getElementById("cardStatus").textContent = user.status || "";
  document.getElementById("cardUpdated").textContent = user.updated || "";
  document.getElementById("cardLocation").textContent = `${user.lat}, ${user.lng}`;
  document.getElementById("cardAddress").textContent = user.address || "";
  document.getElementById("cardToken").textContent = user.token || "";
}
function closeCard() {
  document.getElementById("cardName").textContent = "사용자 선택 없음";
  document.getElementById("cardPhone").textContent = "";
  document.getElementById("cardStatus").textContent = "";
  document.getElementById("cardUpdated").textContent = "";
  document.getElementById("cardLocation").textContent = "";
  document.getElementById("cardAddress").textContent = "";
  document.getElementById("cardToken").textContent = "";
}

/* ---------------------- 사용자 패널 업데이트 ---------------------- */
function updateUserPanelContent(viewMode) {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];
  if (viewMode === "current") {
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);
  } else if (viewMode === "all") {
    users = allData;
  } else if (viewMode === "paths") {
    const select = document.getElementById("path-user-select");
    const selectedPhone = select ? select.value : "all";
    users = selectedPhone === "all" ? allData : allData.filter(u => u.phone === selectedPhone);
  }

  // 테이블 렌더링
  window.renderUserTable = function(users) {
    const tbody = document.getElementById("user-table-body");
    tbody.innerHTML = "";
  
    users.forEach(user => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${user.phone}</td>
        <td>${user.status}</td>
        <td>${user.updated}</td>
        <td>${user.address || "-"}</td>
        <td>(${user.lat}, ${user.lng})</td>
        <td>
          <button onclick="focusOnUser(${user.lat}, ${user.lng})">위치 보기</button>
          <button onclick='showDetailCard(${JSON.stringify(user)})'>상세 보기</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  };
}   // ← updateUserPanelContent 함수 닫기

/* ---------------------- 지도에서 특정 사용자 위치로 이동 ---------------------- */
window.focusOnUser = function(lat, lng) {
  map.setCenter({ lat: lat, lng: lng });
  map.setZoom(15);
};

/* ---------------------- 지도 초기화 ---------------------- */
function getMapIdByDevice() {
  const ua = navigator.userAgent.toLowerCase();
  if (/android/.test(ua)) return CONFIG.mapIds.android;
  if (/iphone|ipad|ipod/.test(ua)) return CONFIG.mapIds.ios;
  if (/windows|macintosh|linux/.test(ua)) return CONFIG.mapIds.javascript;
  return CONFIG.mapIds.fixed;
}

function initMap() {
  const mapId = getMapIdByDevice();
  map = new google.maps.Map(document.getElementById("map"), {
    center: CONFIG.DEFAULT_CENTER || { lat: 36.5, lng: 127.5 },
    zoom: 7,
    mapId: mapId
  });

  const originalCenter = map.getCenter();
  google.maps.event.addListener(map, 'rightclick', function() {
    map.setCenter(originalCenter);
    map.setZoom(7);
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        new google.maps.Marker({ position: myPos, map: map, title: "내 위치" });
      },
      () => {
        new google.maps.Marker({ position: CONFIG.DEFAULT_CENTER, map: map, title: "기본 위치" });
      }
    );
  }

  const closeBtn = document.getElementById("close-user-panel");
  if (closeBtn) {
    closeBtn.addEventListener("click", window.closeUserPanel);
  }

  document.addEventListener("click", function(e) {
    if (!btnConnection.contains(e.target) && !connectionPanel.contains(e.target)) {
      connectionPanel.classList.remove("open");
    }
    if (!btnSettings.contains(e.target) && !settingsPanel.contains(e.target)) {
      settingsPanel.classList.remove("open");
    }
  });

  loadData();
  intervalId = setInterval(loadData, CONFIG.DEFAULT_INTERVAL || 300000);
}

window.initMap = initMap;

/* ---------------------- 위치찾기 기능 ---------------------- */
window.moveToLatLng = function() {
  const lat = parseFloat(document.getElementById("latInput").value);
  const lng = parseFloat(document.getElementById("lngInput").value);

  if (isNaN(lat) || isNaN(lng)) {
    alert("올바른 위도와 경도를 입력하세요.");
    return;
  }
  if (!map) {
    alert("지도가 아직 초기화되지 않았습니다.");
    return;
  }
  map.setCenter({ lat: lat, lng: lng });
  map.setZoom(15);
};

/* ---------------------- 사용자 카드 클릭 시 지도 이동 ---------------------- */
window.moveToUser = function(lat, lng, phone) {
  if (!map) return;
  map.setCenter({ lat: lat, lng: lng });
  map.setZoom(15);
  new google.maps.Marker({
    position: { lat: lat, lng: lng },
    map: map,
    title: `사용자: ${phone}`,
    animation: google.maps.Animation.BOUNCE
  });
};

/* ---------------------- 라이트/다크 모드 전환 ---------------------- */
const themeToggle = document.getElementById("themeToggle");
if (themeToggle) {
  themeToggle.addEventListener("change", () => {
    if (themeToggle.checked) {
      document.body.classList.add("dark-mode");
    } else {
      document.body.classList.remove("dark-mode");
    }
  });
}

/* ---------------------- 갱신 주기 설정 ---------------------- */
window.setCustomInterval = function() {
  const value = parseInt(document.getElementById("intervalValue").value, 10);
  const unit = document.getElementById("intervalUnit").value;

  let intervalMs = 300000;
  if (unit === "minutes") {
    intervalMs = value * 60000;
  } else if (unit === "seconds") {
    intervalMs = value * 1000;
  }

  clearInterval(intervalId);
  intervalId = setInterval(loadData, intervalMs);

  const msgBox = document.getElementById("message-box");
  msgBox.textContent = `갱신 주기: ${value} ${unit === "minutes" ? "분" : "초"}`;
  msgBox.style.display = "block";
  setTimeout(() => { msgBox.style.display = "none"; }, 2000);
};

/* ---------------------- DOMContentLoaded: 버튼 이벤트 연결 ---------------------- */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("location-check").addEventListener("click", moveToLatLng);
});
</script>


  <!-- 스타일 -->
  <style>
    /* 상단바, 패널, 지도, 카드, 테이블, 반응형, 다크모드 */
    html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:Arial,sans-serif; }
    #top-bar { position:fixed; top:0; left:0; width:100%; height:50px; background:#1a237e; color:white;
               display:flex; justify-content:space-between; align-items:center; z-index:1000; padding:0 20px; }
    #menu-buttons { display:flex; gap:20px; margin-top:4px; }
    .menu-btn { cursor:pointer; padding:6px 12px; background:#3949ab; border-radius:4px; user-select:none;
                display:flex; align-items:center; gap:6px; }
    .icon { font-size:16px; }
    #title { font-size:20px; font-weight:bold; text-align:right; margin-right:50px; }
    #map { position:absolute; top:50px; left:0; width:100%; height:calc(100% - 50px); background:#ddd; z-index:1; }

    .dropdown-panel { position:absolute; top:50px; background:white; border:1px solid #ccc; width:260px;
                      display:none; z-index:2000; box-shadow:0 2px 6px rgba(0,0,0,0.25); padding:10px 0; }
    .dropdown-panel.open { display:block; }
    .dropdown-item { padding:12px 18px; cursor:pointer; border-bottom:1px solid #eee; font-size:16px; font-weight:500; }
    .dropdown-item:hover { background:#e3f2fd; }

    #user-panel { position:absolute; top:50px; right:0; width:340px; height:calc(100% - 50px); background:white;
                  border-left:1px solid #ccc; display:none; z-index:3000; padding:15px; overflow-y:auto; }
    #user-panel.open { display:block; }
    .panel-header { display:flex; justify-content:space-between; align-items:center; }
    #close-user-panel { background:#e53935; color:white; border:none; padding:4px 8px; cursor:pointer;
                        border-radius:4px; font-size:14px; }
    #close-user-panel:hover { background:#c62828; }

    #summaryPanel span { margin-right:20px; font-weight:bold; }
    #detailCard { border:1px solid #ccc; padding:15px; background:#fafafa; overflow:auto; margin-top:10px; }
    #detailCard h3 { margin-top:0; }

    #user-table { width:100%; border-collapse:collapse; margin-top:10px; }
    #user-table th, #user-table td { border:1px solid #ccc; padding:8px; text-align:center; }
    #user-table th { background:#f5f5f5; }

    #message-box { position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
                   background:#333; color:#fff; padding:8px 16px; border-radius:4px;
                   display:none; z-index:4000; font-size:16px; }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
      #user-panel { width:100%; height:40%; bottom:0; top:auto; border-left:none; border-top:1px solid #ccc;
                    border-radius:12px 12px 0 0; }
      #user-table th, #user-table td { font-size:16px; }
      #message-box { font-size:18px; }
    }
  </style>
</head>

<body>
  <!-- 상단바 -->
  <div id="top-bar">
    <div id="menu-buttons">
      <div id="btn-connection" class="menu-btn"><span class="icon">📡</span> 접속현황</div>
      <div id="btn-settings" class="menu-btn"><span class="icon">⚙️</span> 환경설정</div>
    </div>
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- 접속현황 패널 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" onclick="openUserPanel('current')">현재 접속자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('all')">전체 사용자 보기</div>
    <div class="dropdown-item" onclick="openUserPanel('paths')">경로 보기</div>
    <div class="dropdown-item">
      <strong>위치찾기</strong><br>
      <div class="location-search">
        <input type="number" id="latInput" placeholder="위도 입력" step="0.0001">
        <input type="number" id="lngInput" placeholder="경도 입력" step="0.0001">
        <button id="location-check" class="btn-check">확인</button>
      </div>
    </div>
  </div>

  <!-- 환경설정 패널 -->
  <div id="settings-panel" class="dropdown-panel">
    <div class="dropdown-item">
      <strong>라이트/다크 모드</strong><br>
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <input type="number" id="intervalValue" value="5" min="1" style="width:70px;">
      <select id="intervalUnit">
        <option value="minutes">분</option>
        <option value="seconds">초</option>
      </select>
      <button onclick="setCustomInterval()">적용</button>
    </div>
    <div class="dropdown-item"><label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label></div>
    <div class="dropdown-item"><label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label></div>
  </div>

  <!-- 요약 패널 -->
  <div id="summaryPanel">
    <span id="summaryActive" style="color:green;">정상: 0명</span>
    <span id="summaryBlocked" style="color:red;">차단: 0명</span>
    <span id="summaryStop" style="color:orange;">해제: 0명</span>
  </div>

  <!-- 사용자 정보 패널 -->
  <div id="user-panel">
    <div class="panel-header">
      <h3 id="user-panel-title">사용자 정보</h3>
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <div id="path-select-container">
      <label for="path-user-select">경로 보기 선택:</label>
      <select id="path-user-select" onchange="updateUserPanelContent('paths')">
        <option value="all">전체</option>
      </select>
    </div>
    <table id="user-table">
      <thead>
        <tr>
          <th>전화번호</th>
          <th>상태</th>
          <th>마지막 갱신</th>
          <th>주소</th>
          <th>좌표</th>
          <th>상세</th>
        </tr>
      </thead>
      <tbody id="user-table-body"></tbody>
    </table>
  </div>

  <!-- 상세 카드 -->
  <div id="detailCard">
    <h3 id="cardName">사용자 선택 없음</h3>
    <p><strong>전화번호:</strong> <span id="cardPhone"></span></p>
    <p><strong>상태:</strong> <span id="cardStatus"></span></p>
    <p><strong>업데이트:</strong> <span id="cardUpdated"></span></p>
    <p><strong>위치:</strong> <span id="cardLocation"></span></p>
    <p><strong>주소:</strong> <span id="cardAddress"></span></p>
    <p><strong>토큰:</strong> <span id="cardToken"></span></p>
    <!-- 상세 카드용 지도는 별도 ID -->
    <div id="detailMap" style="width:100%; height:250px; margin-top:10px;"></div>
    <button onclick="closeCard()">닫기</button>
  </div>
  
  <!-- 전체 지도 영역 -->
  <div id="map"></div>

  <!-- 메시지 박스 -->
  <div id="message-box"></div>

  <!-- 3. MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  
  <!-- 4. Google Maps API는 맨 마지막 -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
  </script>
</body>
</html>
