<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>차량 위치 추적 관리자 화면</title>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY"></script>
  <script src="https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/markerclusterer.js"></script>
  <style>
    body { font-family:'Segoe UI',Arial,sans-serif; margin:0; background:#f5f7fa; color:#333; font-size:15px; }
    h2 { margin:0; padding:20px; background:linear-gradient(90deg,#2196F3,#21CBF3); color:white; text-align:center; font-weight:600; font-size:20px; border-bottom:3px solid #1976D2; }
    #controls { display:flex; justify-content:center; gap:20px; padding:15px; background:#fff; border-bottom:1px solid #ddd; }
    #controls button { padding:10px 20px; border:none; border-radius:6px; background:#2196F3; color:white; font-weight:600; cursor:pointer; }
    #controls button:hover { background:#1976D2; }
    #layout { display:flex; justify-content:space-between; gap:20px; padding:20px; }
    #map { flex:2; height:600px; border:1px solid #ccc; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.12); }
    #infoPanel { flex:1; height:600px; background:#fff; border-radius:12px; border:1px solid #ddd; box-shadow:0 4px 10px rgba(0,0,0,0.12); overflow-y:auto; padding:15px; font-size:14px; }
    #infoPanel h3 { margin-top:0; color:#2196F3; font-size:16px; border-bottom:2px solid #eee; padding-bottom:8px; }
    #userInfo div { background:#f5f7fa; margin-bottom:14px; padding:12px; border-radius:8px; font-size:14px; line-height:1.5; box-shadow:inset 0 1px 3px rgba(0,0,0,0.05); }
  </style>
</head>
<body>
  <h2>🚗 차량 위치 추적 관리자 화면</h2>

  <div id="controls">
    <button onclick="showAllUsers()">전체 사용자 보기</button>
    <button onclick="showSelectedUsers()">선택된 사용자 보기</button>
    <select id="userSelect" multiple size="5" style="width:200px;"></select>
  </div>

  <p id="lastUpdate" style="padding-left:20px;">마지막 갱신: -</p>

  <div id="layout">
    <div id="map"></div>
    <div id="infoPanel">
      <h3>📋 사용자 정보 패널</h3>
      <div id="userInfo"></div>
    </div>
  </div>
  
  <script>
    let allData=[], map, markers=[], polylines=[], markerCluster, intervalId;

    async function loadData() {
      const response = await fetch("https://script.google.com/macros/s/AKfycb.../exec");
      allData = await response.json();
      document.getElementById("lastUpdate").textContent =
        "마지막 갱신: " + new Date().toLocaleTimeString();

      // 사용자 목록 채우기 (중복 제거)
      const users = [...new Set(allData.map(d => d.phone))];
      const select = document.getElementById("userSelect");
      select.innerHTML = "";
      users.forEach(u => {
        const option = document.createElement("option");
        option.value = u;
        option.textContent = u;
        select.appendChild(option);
      });
    }

    function clearMap() {
      markers.forEach(m=>m.setMap(null)); markers=[];
      polylines.forEach(p=>p.setMap(null)); polylines=[];
      if(markerCluster) markerCluster.clearMarkers();
    }

    function showSelectedUsers() {
      const selected = Array.from(document.getElementById("userSelect").selectedOptions).map(o=>o.value);
      if(selected.length===0){ alert("사용자를 선택하세요."); return; }
      updateInfoPanel(selected);
      drawUsers(selected);
    }

    function showAllUsers() {
      const users = [...new Set(allData.map(d=>d.phone))];
      updateInfoPanel(users);
      drawUsers(users);
    }

    function drawUsers(userList) {
      clearMap();
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 7, center: { lat: 36.5, lng: 127.5 }
      });

      userList.forEach(user=>{
        let userData = allData.filter(d=>d.phone===user);
        userData=userData.slice(-50); // 최근 50개만
        drawUserPath(userData);
      });

      markerCluster=new MarkerClusterer(map,markers,{
        imagePath:'https://developers.google.com/maps/documentation/javascript/examples/markerclusterer/m'
      });
    }

    function drawUserPath(userData) {
      if(userData.length===0) return;
      const pathCoords=[];
      userData.forEach((d,idx)=>{
        const pos={lat:d.lat,lng:d.lng};
        pathCoords.push(pos);
        const marker=new google.maps.Marker({
          position:pos,
          title:d.phone+" / "+d.update_time+" / "+d.location,
          icon: idx===userData.length-1 ? "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
                                       : "http://maps.google.com/mapfiles/ms/icons/red-dot.png"
        });
        markers.push(marker);
      });
      const polyline=new google.maps.Polyline({
        path:pathCoords, geodesic:true,
        strokeColor:"#"+Math.floor(Math.random()*16777215).toString(16),
        strokeOpacity:1.0, strokeWeight:2, map:map
      });
      polylines.push(polyline);
    }

    function updateInfoPanel(selectedUsers){
      const panel=document.getElementById("userInfo");
      panel.innerHTML="";
      selectedUsers.forEach(user=>{
        const userData=allData.filter(d=>d.phone===user);
        if(userData.length===0) return;
        const latest=userData[userData.length-1];
        const div=document.createElement("div");
        div.innerHTML=`
          <strong>${latest.phone}</strong><br>
          📍 위치: ${latest.location}<br>
          🕒 갱신시간: ${latest.update_time}<br>
          좌표: (${latest.lat}, ${latest.lng})
        `;
        panel.appendChild(div);
      });
    }

    window.onload = async () => {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 36.5, lng: 127.5 },
        zoom: 7
      });
      await loadData();
      intervalId = setInterval(loadData, 30000);
    };
  </script>
</body>
</html>
