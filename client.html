<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A-DOMES 위치정보시스템</title>

  <!-- ====================== CSS 통합 ====================== -->
  <style>
    /* ---------------------- 공통 스타일 ---------------------- */
    body {
      font-family: Arial, sans-serif; /* 기본 글꼴 */
      color: #333;                    /* 기본 글자색 */
      background-color: #f9f9f9;      /* 전체 배경색 */
      margin: 0;                      /* 여백 제거 */
      padding: 0;                     /* 패딩 제거 */
      width: 100%; height: 100%;      /* 전체 화면 크기 */
      overflow: hidden;               /* 스크롤 숨김 */
    }

    h1, h2, h3 {
      font-weight: bold;              /* 제목 굵게 */
      color: #1a237e;                 /* 제목 색상 (짙은 파랑) */
    }

    button {
      cursor: pointer;                /* 버튼에 커서 표시 */
      border: none;                   /* 기본 테두리 제거 */
      border-radius: 4px;             /* 모서리 둥글게 */
      padding: 6px 12px;              /* 버튼 내부 여백 */
      font-size: 14px;                /* 글자 크기 */
    }
    button:hover { opacity: 0.9; }    /* 버튼 hover 효과 */

    /* ---------------------- 상단바 ---------------------- */
    #top-bar {
      position: fixed;                /* 화면 상단 고정 */
      top: 0; left: 0;
      width: 100%; height: 50px;      /* 상단바 높이 */
      background: #1a237e;            /* 상단바 배경색 */
      color: white;                   /* 글자색 흰색 */
      display: flex;                  /* flex 레이아웃 */
      justify-content: space-between; /* 좌우 배치 */
      align-items: center;            /* 수직 가운데 정렬 */
      z-index: 1000;                  /* 지도보다 위에 표시 */
      padding: 0 20px;                /* 좌우 여백 */
    }

    #menu-buttons {
      display: flex;                  /* 버튼 가로 배치 */
      gap: 20px;                      /* 버튼 간격 */
      margin-top: 4px;                /* 살짝 아래로 */
    }

    .menu-btn {
      cursor: pointer;
      padding: 6px 12px;
      background: #3949ab;            /* 버튼 배경색 */
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;                       /* 아이콘과 텍스트 간격 */
    }

    .icon { font-size: 16px; }        /* 아이콘 크기 */

    /* ---------------------- 제목 문구 ---------------------- */
    #title {
      font-size: 20px;                /* 제목 글자 크기 */
      font-weight: bold;              /* 굵게 */
      margin-right: 20px;             /* 오른쪽 여백 */
    }

    /* ---------------------- 지도 ---------------------- */
    #map {
      position: fixed;                /* 화면에 고정 */
      top: 50px; left: 0;             /* 상단바 아래 위치 */
      width: 100%;                    /* 전체 너비 */
      height: calc(100% - 50px);      /* 상단바 제외 높이 */
      background: #ddd;               /* 기본 배경 */
      z-index: 0;                     /* 패널보다 뒤에 */
    }

    /* ---------------------- 드롭다운 패널 ---------------------- */
    .dropdown-panel {
      position: absolute;
      top: 50px;                      /* 상단바 바로 아래 */
      background: white;
      border: 1px solid #ccc;
      width: 260px;
      display: none;                  /* 기본은 숨김 */
      z-index: 2000;                  /* 지도 위, 패널 아래 */
      box-shadow: 0 2px 6px rgba(0,0,0,0.25); /* 그림자 */
      padding: 10px 0;
    }

    .dropdown-item {
      padding: 12px 18px;             /* 항목 여백 */
      cursor: pointer;
      border-bottom: 1px solid #eee;  /* 항목 구분선 */
      font-size: 16px;
      font-weight: 500;
    }
    .dropdown-item:hover { background: #f0f0f0; } /* hover 효과 */

    /* ---------------------- 사용자 정보 패널 ---------------------- */
    #user-panel {
      position: fixed;
      top: 50px; right: 0;            /* 화면 오른쪽에 고정 */
      width: 320px;
      height: calc(100% - 50px);      /* 상단바 제외 높이 */
      background: white;
      border-left: 1px solid #ccc;    /* 왼쪽 경계선 */
      display: none;                  /* 기본은 숨김 */
      z-index: 3000;                  /* 가장 위에 표시 */
      padding: 15px;
      overflow-y: auto;               /* 내용 많으면 스크롤 */
    }

    .panel-header {
      display: flex;
      justify-content: space-between; /* 제목과 닫기 버튼 좌우 배치 */
      align-items: center;
    }

    #close-user-panel {
      background: #e53935;            /* 빨간색 닫기 버튼 */
      color: white;
      border: none;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }
    #close-user-panel:hover { background: #c62828; } /* hover 효과 */
    #user-panel h3 { margin: 0; }     /* 제목 여백 제거 */
  </style>

  <!-- ====================== 외부 라이브러리 ====================== -->
  <!-- Google Maps API -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCOmWcR48yf1sp2RABZFQ52qnDCoWc8AJY&callback=initMap">
  </script>
  <!-- MarkerClusterer 라이브러리 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  <!-- config.js 반드시 먼저 로드 -->
  <script src="config.js"></script>
</head>

<body>
  <!-- ---------------------- 상단바 ---------------------- -->
  <!-- 화면 최상단에 고정되는 메뉴바 -->
  <div id="top-bar">
    <div id="menu-buttons">
      <!-- 접속현황 버튼 -->
      <div id="btn-connection" class="menu-btn">
        <span class="icon">📡</span> 접속현황
      </div>
      <!-- 환경설정 버튼 -->
      <div id="btn-settings" class="menu-btn">
        <span class="icon">⚙️</span> 환경설정
      </div>
    </div>
    <!-- 시스템 제목 -->
    <div id="title">A-DOMES | 위치정보시스템</div>
  </div>

  <!-- ---------------------- 접속현황 패널 ---------------------- -->
  <!-- 접속현황 버튼 클릭 시 열리는 드롭다운 메뉴 -->
  <div id="connection-panel" class="dropdown-panel">
    <div class="dropdown-item" id="view-current">현재 접속자 보기</div>
    <div class="dropdown-item" id="view-all">전체 사용자 보기</div>
    <div class="dropdown-item" id="view-detail">사용자별 상세 보기</div>
  </div>

  <!-- ---------------------- 환경설정 패널 ---------------------- -->
  <!-- 환경설정 버튼 클릭 시 열리는 드롭다운 메뉴 -->
  <div id="settings-panel" class="dropdown-panel">
    <!-- 현재 위치 보기 모드 -->
    <div class="dropdown-item" id="view-current-location">현재 위치 보기</div>
    <!-- 경로 보기 모드 -->
    <div class="dropdown-item" id="view-paths">경로 보기</div>
    <!-- 갱신 주기 설정 -->
    <div class="dropdown-item">
      <strong>갱신 주기 설정</strong><br>
      <input type="number" id="intervalValue" value="5" min="1" style="width:80px;">
      <select id="intervalUnit">
        <option value="minutes">분</option>
        <option value="seconds">초</option>
      </select>
      <button id="apply-interval">적용</button>
    </div>
    <!-- 마커 클러스터링 옵션 -->
    <div class="dropdown-item">
      <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
    </div>
    <!-- 최근 50개 데이터만 표시 옵션 -->
    <div class="dropdown-item">
      <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
    </div>
  </div>

  <!-- ---------------------- 사용자 정보 패널 ---------------------- -->
  <!-- 접속현황에서 특정 모드를 선택했을 때 열리는 패널 -->
  <div id="user-panel">
    <div class="panel-header">
      <h3>사용자 정보</h3>
      <!-- 닫기 버튼 -->
      <button id="close-user-panel">✖ 닫기</button>
    </div>
    <!-- 사용자 정보가 동적으로 표시되는 영역 -->
    <div id="user-content"></div>
  </div>

  <!-- ---------------------- 지도 ---------------------- -->
  <!-- Google Maps API로 표시되는 지도 영역 -->
  <div id="map"></div>

  <!-- ---------------------- 스크립트 ---------------------- -->
  <!-- client.js는 마지막에 불러오기 (JS 로직 통합 시 이 부분에 직접 삽입) -->
  <script type="module" src="client.js"></script>


 <!-- JS 통합 -->
<script>
  // ====================== 설정값 불러오기 ======================
  // config.js에서 정의된 CONFIG 객체를 사용
  const API_URL = CONFIG.USER_URL;          // 사용자 서버 URL
  const DEFAULT_CENTER = CONFIG.DEFAULT_CENTER; // 기본 지도 중심 좌표
  const DEFAULT_INTERVAL = CONFIG.DEFAULT_INTERVAL; // 기본 갱신 주기(ms)
  const mapIds = CONFIG.mapIds;             // 기기별 mapId 설정

  /* ---------------------- 전역 변수 ---------------------- */
  let map;                                  // 구글맵 객체
  let mode = "current";                     // 표시 모드 (current / paths)
  let markers = [];                         // 지도에 표시된 마커 배열
  let polylines = [];                       // 지도에 표시된 경로 배열
  let markerCluster;                        // 마커 클러스터 객체
  let intervalId;                           // 데이터 갱신 setInterval ID
  let allData = [];                         // 서버에서 가져온 전체 데이터
  const previousCoords = {};                // 사용자별 이전 좌표/시간 저장

  /* ---------------------- 지도 초기화 ---------------------- */
  // ✅ 기기 환경에 따라 mapId 선택
  function getMapIdByDevice() {
    const ua = navigator.userAgent.toLowerCase();
    if (/android/.test(ua)) return mapIds.android;
    if (/iphone|ipad|ipod/.test(ua)) return mapIds.ios;
    if (/windows|macintosh|linux/.test(ua)) return mapIds.javascript;
    return mapIds.fixed; // 기본값
  }

  // ✅ 구글맵 초기화
  function initMap() {
    const mapId = getMapIdByDevice();

    // 기본 지도 생성 (대한민국 중앙 좌표)
    map = new google.maps.Map(document.getElementById("map"), {
      center: DEFAULT_CENTER,
      zoom: 7,                       // 위성에서 보는 듯한 높이
      mapTypeId: "roadmap",          // 기본 지도 모드
      mapId: mapId
    });

    // ✅ 내 위치 가져오기
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const myPos = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };

          // 내 위치 마커 표시
          new google.maps.Marker({
            position: myPos,
            map: map,
            title: "내 위치"
          });
        },
        (error) => {
          console.warn("위치 정보를 가져오지 못했습니다:", error.message);
          // 실패 시 기본 좌표에 마커 표시
          new google.maps.Marker({
            position: DEFAULT_CENTER,
            map: map,
            title: "기본 위치"
          });
        }
      );
    } else {
      console.warn("이 브라우저는 Geolocation을 지원하지 않습니다.");
      new google.maps.Marker({
        position: DEFAULT_CENTER,
        map: map,
        title: "기본 위치"
      });
    }
  }

  /* ---------------------- 지도 표시 ---------------------- */
  // 지도 초기화: 기존 마커/경로 제거
  function clearMap() {
    markers.forEach(m => m.setMap(null)); markers = [];
    polylines.forEach(p => p.setMap(null)); polylines = [];
    if (markerCluster) markerCluster.clearMarkers();
  }

  // 지도 표시: 모드에 따라 current 또는 paths
  function showMap() {
    clearMap();

    if (mode === "current") {
      drawCurrentMarkers();
    } else if (mode === "paths") {
      drawPaths();
    }

    // 마커 클러스터링 옵션 적용
    if (document.getElementById("clusterOption")?.checked) {
      markerCluster = new MarkerClusterer({ map, markers });
    }

    // 사용자 패널 업데이트
    updateUserPanelContent(mode);
  }

  /* ---------------------- 현재 위치 표시 ---------------------- */
  function drawCurrentMarkers() {
    const latestByUser = {};
    // 사용자별 최신 데이터만 추출
    allData.forEach(item => {
      if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
        latestByUser[item.name] = item;
      }
    });

    // 최신 데이터 기준으로 마커 표시
    Object.values(latestByUser).forEach(user => {
      if (user.status === "정상") {
        const prev = previousCoords[user.name];
        const timeChanged = !prev || prev.time !== user.time;
        if (timeChanged) {
          const marker = new google.maps.Marker({
            position: { lat: parseFloat(user.lat), lng: parseFloat(user.lng) },
            map: map,
            icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
            title: `${user.name} (${user.status}, ${user.time})`
          });
          markers.push(marker);
        }
        // 사용자별 이전 좌표 갱신
        previousCoords[user.name] = { lat: user.lat, lng: user.lng, time: user.time };
      }
    });
  }

  /* ---------------------- 경로 표시 ---------------------- */
  function drawPaths() {
    const grouped = {};
    // 사용자별 데이터 그룹화
    allData.forEach(item => {
      if (!grouped[item.name]) grouped[item.name] = [];
      grouped[item.name].push(item);
    });

    // 사용자별 경로 그리기
    Object.values(grouped).forEach(records => {
      records.sort((a, b) => new Date(a.time) - new Date(b.time));
      let data = records;
      // 최근 50개 데이터만 표시 옵션
      if (document.getElementById("limitOption")?.checked) data = data.slice(-50);

      // 경로 좌표 배열 생성
      const pathCoords = data.map(item => ({ lat: parseFloat(item.lat), lng: parseFloat(item.lng) }));
      const polyline = new google.maps.Polyline({
        path: pathCoords, geodesic: true,
        strokeColor: "#" + Math.floor(Math.random() * 16777215).toString(16), // 랜덤 색상
        strokeOpacity: 1.0, strokeWeight: 2, map: map
      });
      polylines.push(polyline);

      // 각 지점에 마커 표시
      data.forEach((d, idx) => {
        const marker = new google.maps.Marker({
          position: { lat: parseFloat(d.lat), lng: parseFloat(d.lng) },
          map: map,
          title: `${d.name} / ${d.time}`,
          icon: idx === data.length - 1
            ? "https://maps.google.com/mapfiles/ms/icons/green-dot.png" // 마지막 지점
            : "https://maps.google.com/mapfiles/ms/icons/red-dot.png"   // 중간 지점
        });
        markers.push(marker);
      });
    });
  }

/* ---------------------- 우측 패널 내용 업데이트 ---------------------- */
// 사용자 패널에 표시할 내용을 모드(viewMode)에 따라 갱신
function updateUserPanelContent(viewMode = "current") {
  const panel = document.getElementById("user-content");
  if (!panel) return;
  panel.innerHTML = "";

  // ✅ 현재 접속자 보기 모드
  if (viewMode === "current") {
    const latestByUser = {};
    // 사용자별 최신 데이터만 추출
    allData.forEach(item => {
      if (!latestByUser[item.name] || new Date(item.time) > new Date(latestByUser[item.name].time)) {
        latestByUser[item.name] = item;
      }
    });

    let hasCurrent = false;

    Object.values(latestByUser).forEach(user => {
      const prev = previousCoords[user.name];
      const timeChanged = !prev || prev.time !== user.time;

      if (user.status === "정상" && timeChanged) {
        hasCurrent = true;
        // 사용자 카드 HTML 추가
        panel.innerHTML += `
          <div class="user-card">
            <div class="user-name">👤 ${user.name}</div>
            <div>📍 위치: ${user.location}</div>
            <div>🕒 최초 입력(A열): ${user.connectTime}</div>
            <div>🕒 마지막 갱신(F열): ${user.time}</div>
            <div>✅ 상태: ${user.status}</div>
            <div class="coords">좌표: (${user.lat}, ${user.lng})</div>
          </div>
        `;
        // 이전 좌표 갱신
        previousCoords[user.name] = { lat: user.lat, lng: user.lng, time: user.time };
      }
    });

    if (!hasCurrent) {
      panel.innerHTML = `<div class="no-user">현재 접속자가 없습니다</div>`;
    }
  }

  // ✅ 전체 사용자 보기 모드
  if (viewMode === "all") {
    let hasUser = false;
    allData.forEach(user => {
      if (user.status === "정상") {
        hasUser = true;
        panel.innerHTML += `
          <div class="user-card">
            <div class="user-name">👤 ${user.name}</div>
            <div>📍 위치: ${user.location}</div>
            <div>🕒 최초 입력(A열): ${user.connectTime}</div>
            <div>🕒 마지막 갱신(F열): ${user.time}</div>
            <div>✅ 상태: ${user.status}</div>
            <div class="coords">좌표: (${user.lat}, ${user.lng})</div>
          </div>
        `;
      }
    });

    if (!hasUser) {
      panel.innerHTML = `<div class="no-user">현재 접속자가 없습니다</div>`;
    }
  }
}

/* ---------------------- 패널 열기/닫기 ---------------------- */
function openUserPanel(viewMode) {
  document.getElementById("connection-panel").style.display = "none"; // 접속현황 패널 닫기
  document.getElementById("user-panel").style.display = "block";      // 사용자 패널 열기
  updateUserPanelContent(viewMode);                                   // 내용 갱신
}

function closeUserPanel() {
  document.getElementById("user-panel").style.display = "none";       // 사용자 패널 닫기
}

/* ---------------------- 갱신 주기 설정 ---------------------- */
function setCustomInterval() {
  const value = parseInt(document.getElementById("intervalValue").value);
  const unit = document.getElementById("intervalUnit").value;
  if (isNaN(value) || value <= 0) { alert("1 이상의 값을 입력하세요."); return; }
  let newInterval = unit === "seconds" ? value * 1000 : value * 60000;
  clearInterval(intervalId);                  // 기존 주기 제거
  intervalId = setInterval(loadData, newInterval); // 새로운 주기 설정
  alert("갱신 주기가 변경되었습니다.");
}

/* ---------------------- 패널 동작 ---------------------- */
document.addEventListener("DOMContentLoaded", () => {
  const btnConnection = document.getElementById("btn-connection");
  const btnSettings = document.getElementById("btn-settings");
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const closeBtn = document.getElementById("close-user-panel");

  // 접속현황 버튼 클릭
  btnConnection.addEventListener("click", () => {
    settingsPanel.style.display = "none"; // 다른 패널 닫기
    connectionPanel.style.left = btnConnection.getBoundingClientRect().left + "px";
    connectionPanel.style.display = connectionPanel.style.display === "block" ? "none" : "block";
  });

  // 환경설정 버튼 클릭
  btnSettings.addEventListener("click", () => {
    connectionPanel.style.display = "none"; // 다른 패널 닫기
    settingsPanel.style.left = btnSettings.getBoundingClientRect().left + "px";
    settingsPanel.style.display = settingsPanel.style.display === "block" ? "none" : "block";
  });

  // 사용자 패널 닫기 버튼
  if (closeBtn) {
    closeBtn.addEventListener("click", closeUserPanel);
  }

  // 외부 클릭 시 패널 닫기
  document.addEventListener("click", (e) => {
    if (!btnConnection.contains(e.target) && !connectionPanel.contains(e.target)) {
      connectionPanel.style.display = "none";
    }
    if (!btnSettings.contains(e.target) && !settingsPanel.contains(e.target)) {
      settingsPanel.style.display = "none";
    }
  });

  // ✅ connection-panel 내부 버튼 동작
  const viewCurrentBtn = document.getElementById("view-current");
  const viewAllBtn = document.getElementById("view-all");
  const viewDetailBtn = document.getElementById("view-detail");

  if (viewCurrentBtn) {
    viewCurrentBtn.addEventListener("click", () => {
      mode = "current";          // 현재 접속자 보기 모드
      showMap();                 // 지도 갱신
      openUserPanel("current");  // 사용자 패널 열기
    });
  }

  if (viewAllBtn) {
    viewAllBtn.addEventListener("click", () => {
      mode = "all";              // 전체 사용자 보기 모드
      showMap();                 // 지도 갱신
      openUserPanel("all");      // 사용자 패널 열기
    });
  }

  if (viewDetailBtn) {
    viewDetailBtn.addEventListener("click", () => {
      mode = "paths";            // 사용자별 상세 보기 (경로 모드)
      showMap();                 // 지도 갱신
      openUserPanel("paths");    // 사용자 패널 열기
    });
  }

  // ✅ settings-panel 내부 버튼 동작
  const viewCurrentLocationBtn = document.getElementById("view-current-location");
  const viewPathsBtn = document.getElementById("view-paths");
  const applyIntervalBtn = document.getElementById("apply-interval");

  if (viewCurrentLocationBtn) {
    viewCurrentLocationBtn.addEventListener("click", () => {
      mode = "current";      // 현재 위치 보기 모드
      showMap();             // 지도 갱신
      // 환경설정에서는 user-panel을 열지 않음
    });
  }

  if (viewPathsBtn) {
    viewPathsBtn.addEventListener("click", () => {
      mode = "paths";        // 경로 보기 모드
      showMap();             // 지도 갱신
      // 환경설정에서는 user-panel을 열지 않음
    });
  }

  if (applyIntervalBtn) {
    applyIntervalBtn.addEventListener("click", () => {
      setCustomInterval();   // 갱신 주기 설정 적용
      // 환경설정에서는 user-panel을 열지 않음
    });
  }
});

/* ---------------------- 화면 복귀 시 갱신 ---------------------- */
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    console.log("화면 복귀 → 데이터 갱신 실행");
    loadData(); // 패널과 지도 즉시 갱신
  }
});

/* ---------------------- 위치 전송 ---------------------- */
// 현재 브라우저의 위치 정보를 서버로 전송
async function sendLocation() {
  if (!navigator.geolocation) {
    alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
    return;
  }
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    await fetch(`${API_URL}/send`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: document.getElementById("username")?.value || "익명", // 사용자 이름 입력값 또는 기본값
        lat: lat,
        lng: lng,
        status: "정상", // 상태값
        time: new Date().toISOString() // 현재 시간
      })
    });
  });
}

/* ---------------------- 데이터 로드 ---------------------- */
// 서버에서 사용자 위치 데이터를 가져와서 지도에 표시
async function loadData() {
  try {
    const res = await fetch(`${API_URL}/data`);
    const data = await res.json();
    allData = data;   // 전체 데이터 갱신
    showMap();        // 지도 갱신
  } catch (err) {
    console.error("데이터 로드 실패:", err);
  }
}

/* ---------------------- 초기 실행 ---------------------- */
document.addEventListener("DOMContentLoaded", () => {
  // ✅ 지도 초기화 직접 실행 (Google Maps API callback으로도 실행됨)
  /* initMap(); */

  // ✅ 첫 데이터 로드
  loadData();

  // ✅ 데이터 주기적 갱신 (기본 5분)
  intervalId = setInterval(loadData, DEFAULT_INTERVAL);

  // ✅ 위치 자동 전송 (1분마다)
  setInterval(sendLocation, 60000);
});

// Google Maps API에서 callback으로 호출할 수 있도록 전역에 등록
window.initMap = initMap;
</script>
