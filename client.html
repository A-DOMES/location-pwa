  function clearMarkers() {

  // ---------------------- 거리 계산 함수 ----------------------
  function calculateDistance(lat1, lng1, lat2, lng2) {
    const R = 6371; // 지구 반지름 (km)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
              Math.sin(dLng/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }
  
  // ---------------------- 사용자 상태 판별 함수 ----------------------
  // A열(time: 로그인 시각), F열(updated: 마지막 이동 시각)을 비교해서 상태 구분
  function getUserStatus(user) {
    const now = new Date();
    const loginTime = user.time ? new Date(user.time) : null;     // A열
    const moveTime  = user.updated ? new Date(user.updated) : null; // F열
  
    let isLoggedIn = false;
    let isMoving = false;
  
    // ✅ 로그인 여부: 현재 시각 기준 5분 이내 로그인
    if (loginTime) {
      const diffMinutes = (now - loginTime) / 1000 / 60;
      isLoggedIn = diffMinutes <= 5;
    }
  
    // ✅ 이동 여부: F열이 A열보다 크면 이동 발생
    if (loginTime && moveTime) {
      isMoving = moveTime > loginTime;
    }
  
    return { isLoggedIn, isMoving };
  }


// ---------------------- path 기록 처리 ----------------------
function handleNewPath(user, lat, lng) {
  // ✅ path가 비어있을 때 첫 기록이면 startTime 저장
  if (!user.path || user.path.length === 0) {
    // startTime이 없을 때만 최초 기록 시각 저장 (중간 로그인 시 덮어쓰지 않음)
    if (!user.startTime) {
      user.startTime = new Date(); // 최초 path 기록 시각
    }
  }

  // path 배열에 좌표 추가
  if (!user.path) user.path = [];
  user.path.push({ lat, lng });
}

// ---------------------- 총 이동시간 계산 함수 ----------------------
function calculateTotalTime(user) {
  // ✅ startTime이 있으면 우선 사용, 없으면 기존 user.time 사용
  const startTime = new Date(user.startTime || user.time);
  const endTime   = new Date(user.updated);

  // ✅ 두 값이 유효한 날짜일 경우 차이를 계산
  if (!isNaN(startTime) && !isNaN(endTime)) {
    const diffMinutes = (endTime - startTime) / 1000 / 60;
    return diffMinutes > 0 ? diffMinutes : 0; // 음수 방지
  }

  return 0;
}

    
  // ---------------------- 문자열 기반 색상 함수 ----------------------
  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
    return "#" + "00000".substring(0, 6 - c.length) + c;
  }

// ---------------------- 데이터 로딩 ----------------------
async function loadData(token = null) {
  try {
    // ✅ 서버에서 위치 데이터 가져오기
    let url = CONFIG.ADMIN_URL + "?mode=getLocations";
    if (token) url += "&token=" + encodeURIComponent(token);

    const response = await fetch(url);
    allData = await response.json();

    console.log("서버 응답 allData:", allData);
    console.log("현재 사용자 phone:", currentUserPhone);

    // ✅ 내 계정 phone 값 세팅 (처음 로딩 시)
    if (!currentUserPhone && allData.length > 0) {
      // ⚠️ 현재는 첫 번째 사용자 기준으로 내 계정을 세팅
      // 필요하다면 로그인 시 받은 phone 값과 비교해서 지정 가능
      currentUserPhone = allData[0].phone;
      console.log("내 계정 세팅 완료:", currentUserPhone);
    }

    // ✅ 드롭다운 갱신
    populatePathSelect();

    // ✅ 지도 표시 (내 계정 기준)
    showMap(currentUserPhone);

    // ✅ 위치 정보 박스 갱신 (모달창)
    if (allData.length > 0) {
      const user = allData[0]; // 첫 번째 사용자 기준

      const loadingMessage = document.getElementById("loadingMessage");
      const latBox = document.getElementById("latBox");
      const lngBox = document.getElementById("lngBox");
      const addressBox = document.getElementById("addressBox");
      const locationHeaderTitle = document.querySelector("#locationHeader h3");

      // ✅ 로딩 메시지 숨기기
      if (loadingMessage) loadingMessage.style.display = "none";

      // ✅ 모달창에 위치정보 표시
      locationHeaderTitle.textContent = `${user.name || user.phone || "사용자"}의 현재 위치`;
      latBox.textContent = user.lat ? user.lat.toFixed(6) : "-";
      lngBox.textContent = user.lng ? user.lng.toFixed(6) : "-";
      addressBox.textContent = user.address || "-";

      // ✅ 공유 버튼 이벤트
      const shareBtn = document.getElementById("shareBtn");
      if (shareBtn) {
        shareBtn.onclick = async () => {
          const shareUrl =
            `https://www.google.com/maps/search/?api=1&query=${user.lat},${user.lng}`;
          await navigator.clipboard.writeText(shareUrl);

          const popup = document.getElementById("popupMessage");
          popup.style.display = "block";
          popup.style.opacity = "1";
          setTimeout(() => {
            popup.style.opacity = "0";
            setTimeout(() => { popup.style.display = "none"; }, 2000);
          }, 3000);
        };
      }

      // ---------------------- 상대방 움직임 감지 ----------------------
      allData.forEach(otherUser => {
        const normalize = str => (str || "").replace(/[^0-9a-zA-Z가-힣]/g, "").trim().toLowerCase();

        // ✅ 내 계정이 아닌 경우만 체크
        if (normalize(otherUser.phone) !== normalize(currentUserPhone)) {
          if (!window.prevPositions) window.prevPositions = {};

          const prev = window.prevPositions[otherUser.phone];
          const curr = { lat: otherUser.lat, lng: otherUser.lng };

          if (prev) {
            const dist = google.maps.geometry.spherical.computeDistanceBetween(
              new google.maps.LatLng(prev.lat, prev.lng),
              new google.maps.LatLng(curr.lat, curr.lng)
            );

            // ✅ 움직임이 2m 이상일 때만 레이더 표시
            if (dist > 2) {
              updateRadarPolygon(curr, 0);
            }
          }

          // ✅ 현재 좌표를 prevPositions에 저장
          window.prevPositions[otherUser.phone] = curr;
        }
      });
    } else {
      document.getElementById("locationBox").innerHTML =
        "❌ 위치 데이터를 불러올 수 없습니다.";
    }
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    showMessage("⚠️ 데이터를 불러오지 못했습니다. 서버 상태를 확인하세요.");
  }
}
    
  // ---------------------- 갱신 주기 설정 ----------------------
  function setCustomInterval() {
    const value = parseInt(document.getElementById("intervalValue").value);
    const unit = document.getElementById("intervalUnit").value;

    if (isNaN(value) || value <= 0) {
      alert("1 이상의 값을 입력하세요.");
      return;
    }

    let newInterval = unit === "seconds" ? value * 1000 : value * 60000;

    clearInterval(intervalId);
    intervalId = setInterval(loadData, newInterval);

    const msgBox = document.getElementById("message-box");
    msgBox.textContent = `갱신 주기: ${value} ${unit === "minutes" ? "분" : "초"}`;
    msgBox.style.display = "block";
    setTimeout(() => { msgBox.style.display = "none"; }, 2000);
  }

  // ---------------------- 지도 초기화  로딩시  ----------------------
  window.onload = () => {
    // ✅ 초기 중심 좌표 저장
    const initialCenter = { lat: 36.5, lng: 127.5 };
  
    // ✅ 지도 생성
    map = new google.maps.Map(document.getElementById("map"), {
      center: initialCenter,
      zoom: 7,
      mapTypeId: "roadmap",
      styles: null
    });
  
    // ✅ 마우스 우클릭 시 초기 상태로 복귀
    map.addListener("rightclick", () => {
      map.setZoom(7);
      map.setCenter(initialCenter);
    });
  
    // ✅ 라이트/다크 모드 토글
    const themeToggle = document.getElementById("themeToggle");
    if (themeToggle) {
      themeToggle.addEventListener("change", () => {
        document.body.classList.toggle("dark-mode", themeToggle.checked);
        map.setOptions({ styles: themeToggle.checked ? darkStyle : lightStyle });
      });
    }
  
    // ✅ 데이터 로딩 및 기본 갱신 주기 시작
    loadData();
    startAutoRefresh(); // ← 기존 setInterval 대신 함수 호출
  };
      
  
  // ---------------------- 자동 갱신 제어 ----------------------
  function startAutoRefresh(intervalMs = CONFIG.DEFAULT_INTERVAL || 60000) {
    if (!intervalId) {
      intervalId = setInterval(loadData, intervalMs);
    }
  }
  
  function stopAutoRefresh() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
  }
    
  // ---------------------- 드롭다운 갱신 ----------------------
  function populatePathSelect(viewMode = "all") {
    const select = document.getElementById("path-user-select");
    if (!select) return;
    select.innerHTML = "";

    const allOption = document.createElement("option");
    allOption.value = "all";
    allOption.textContent = "전체";
    select.appendChild(allOption);

    let users = [];
    if (viewMode === "current") {
      const now = new Date();
      users = allData.filter(u => {
        const updated = new Date(u.updated);
        return (now - updated <= 5 * 60 * 1000);
      });
    } else {
      users = allData;
    }

    users.forEach(user => {
      const option = document.createElement("option");
      option.value = user.phone;
      option.textContent = user.phone;
      select.appendChild(option);
    });
  }

// ---------------------- 지도 초기화 보조 ----------------------
function clearMap() {
  if (markerCluster) {
    markerCluster.clearMarkers();
    markerCluster = null;
  }
  markers.forEach(m => m.setMap(null));
  markers = [];
  polylines.forEach(p => p.setMap(null));
  polylines = [];

  // ✅ 내/상대방 경로 초기화
  myPath = [];
  myPolyline = null;
  userPaths = {};
  userPolylines = {};
}

// ---------------------- 지도 표시 ----------------------
function showMap(currentUserPhone) {
  clearMap();
  if (!map) return;

  // ✅ 커스텀 마커 아이콘 (빨간색)
  const customRedMarker = {
    url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="48" viewBox="0 0 32 48">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 12 16 32 16 32s16-20 16-32C32 7.163 24.837 0 16 0z"
              fill="#FF0000" stroke="#FFFFFF" stroke-width="2"/>
        <circle cx="16" cy="16" r="6" fill="#FFFFFF"/>
      </svg>
    `),
    scaledSize: new google.maps.Size(32, 48),
    anchor: new google.maps.Point(16, 48)
  };

  const normalize = str => (str || "").replace(/[^0-9a-zA-Z가-힣]/g, "").trim().toLowerCase();

  // ✅ 모든 사용자 데이터 반복
  allData.forEach(user => {
    const marker = new google.maps.Marker({
      position: { lat: user.lat, lng: user.lng },
      map: map,
      icon: customRedMarker,
      title: `${user.phone} (${user.status}, ${user.updated})`,
      animation: google.maps.Animation.DROP
    });
    markers.push(marker);

    // ✅ 내 계정일 경우 → 파란색 경로
    if (normalize(user.phone) === normalize(currentUserPhone)) {
      radarTargetMarker = marker;
      const pos = radarTargetMarker.getPosition();
      updateRadarPolygon({ lat: pos.lat(), lng: pos.lng() }, 0);

      if (!myPolyline) {
        myPolyline = new google.maps.Polyline({
          path: myPath,
          geodesic: true,
          strokeColor: "#0000FF",
          strokeOpacity: 1.0,
          strokeWeight: 5,
          map: map
        });
      }

      const newLatLng = { lat: pos.lat(), lng: pos.lng() };
      myPath.push(newLatLng);
      myPolyline.setPath(myPath);

    } else {
      // ✅ 다른 사용자 → 파란색 경로
      if (!userPaths[user.phone]) userPaths[user.phone] = [];
      userPaths[user.phone].push({ lat: user.lat, lng: user.lng });

      if (!userPolylines[user.phone]) {
        userPolylines[user.phone] = new google.maps.Polyline({
          path: userPaths[user.phone],
          geodesic: true,
          strokeColor: "#0000FF",
          strokeOpacity: 1.0,
          strokeWeight: 5,
          map: map
        });
      } else {
        userPolylines[user.phone].setPath(userPaths[user.phone]);
      }
    }

    // ✅ 마커 클릭 시 모달창 갱신
    marker.addListener("click", () => {
      updateLocationBox(user);
      document.getElementById("locationBox").style.display = "block";

      const latBox = document.getElementById("latBox");
      const lngBox = document.getElementById("lngBox");
      const addressBox = document.getElementById("addressBox");
      const locationHeaderTitle = document.querySelector("#locationHeader h3");

      locationHeaderTitle.textContent = `${user.name || user.phone}의 현재 위치`;
      latBox.textContent = user.lat ? user.lat.toFixed(6) : "-";
      lngBox.textContent = user.lng ? user.lng.toFixed(6) : "-";
      addressBox.textContent = user.address || "-";

      const loadingMessage = document.getElementById("loadingMessage");
      if (loadingMessage) loadingMessage.style.display = "none";

      map.setCenter({ lat: parseFloat(user.lat), lng: parseFloat(user.lng) });
      map.setZoom(15);
    });
  });

  // ✅ 클러스터 옵션 체크 시 클러스터링 적용
  if (document.getElementById("clusterOption")?.checked) {
    markerCluster = new markerClusterer.MarkerClusterer({ map: map, markers: markers });
  }

    // ✅ 첫 번째 사용자 정보 박스 갱신
  if (allData.length > 0) {
    const user = allData[0];
    updateLocationBox(user);
    document.getElementById("locationBox").style.display = "block";

    // ✅ 모달창 갱신 (첫 사용자 기준)
    const latBox = document.getElementById("latBox");
    const lngBox = document.getElementById("lngBox");
    const addressBox = document.getElementById("addressBox");
    const locationHeaderTitle = document.querySelector("#locationHeader h3");

    locationHeaderTitle.textContent = `${user.name || user.phone}의 현재 위치`;
    latBox.textContent = user.lat ? user.lat.toFixed(6) : "-";
    lngBox.textContent = user.lng ? user.lng.toFixed(6) : "-";
    addressBox.textContent = user.address || "-";

    // ✅ 로딩 메시지 숨기기
    const loadingMessage = document.getElementById("loadingMessage");
    if (loadingMessage) loadingMessage.style.display = "none";

  } else {
    // ✅ 데이터가 없을 경우 모달창에 오류 메시지 표시
    document.getElementById("locationBox").innerHTML = "❌ 위치 데이터를 불러올 수 없습니다.";
  }

  // ✅ 사용자 패널 갱신 (예: 사용자 리스트, 상태 표시 등)
  updateUserPanelContent(mode);
}

    
  // ---------------------- 사용자 패널 ----------------------
  document.addEventListener("DOMContentLoaded", () => {
    const btnConnection = document.getElementById("btn-connection");
    const btnSettings = document.getElementById("btn-settings");
    const connectionPanel = document.getElementById("connection-panel");
    const settingsPanel = document.getElementById("settings-panel");
    const userPanel = document.getElementById("user-panel");
    const select = document.getElementById("path-user-select");

    // ✅ 드롭다운 선택 이벤트
    if (select) {
      select.addEventListener("change", e => {
        const selectedPhone = e.target.value;
        const title = document.getElementById("user-panel-title");

        if (selectedPhone === "all") {
          updateUserPanelContent("all");
          renderUserTable(allData, "all");
        } else {
          const user = allData.find(u => u.phone === selectedPhone);
          if (user) {
            const modeForTable = (title && title.textContent === "위치/경로 보기") ? "paths" : "current";
            updateUserPanelContent(modeForTable);
            renderUserTable([user], modeForTable);

            if (modeForTable === "paths") {
              const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
              if (pathPoints.length > 0) {
                let distanceKm = 0;
                for (let i = 1; i < pathPoints.length; i++) {
                  distanceKm += calculateDistance(
                    pathPoints[i-1].lat, pathPoints[i-1].lng,
                    pathPoints[i].lat, pathPoints[i].lng
                  );
                }
                drawPath(pathPoints, distanceKm);
              }
            } else {
              moveToUser(user.lat, user.lng, user.phone);
            }
          } else {
            renderUserTable([], "current");
          }
        }
      });
    }

    // ✅ 버튼 이벤트
    btnConnection.onclick = () => {
      settingsPanel.classList.remove("open");
      connectionPanel.classList.toggle("open");
    };

    btnSettings.onclick = () => {
      connectionPanel.classList.remove("open");
      settingsPanel.classList.toggle("open");
    };

    // ✅ 닫기 버튼 이벤트
    const closeBtn = document.getElementById("close-user-panel");
    if (closeBtn) {
      closeBtn.onclick = () => {
        userPanel.classList.remove("open");
      };
    }
  });
    

// ---------------------- 사용자 패널 열기 ----------------------
window.openUserPanel = function(viewMode) {
  const connectionPanel = document.getElementById("connection-panel");
  const settingsPanel = document.getElementById("settings-panel");
  const userPanel = document.getElementById("user-panel");

  // 다른 패널 닫기
  connectionPanel?.classList.remove("open");
  settingsPanel?.classList.remove("open");
  userPanel?.classList.add("open");

  // 모드 갱신
  mode = viewMode;

  // ✅ 기존 마커/경로 제거
  clearMarkers();
  polylines.forEach(line => line.setMap(null));
  polylines = [];

  // ✅ radarPolygon도 제거 (실제로 사용 중이므로 반드시 필요)
  // if (radarPolygon) {
  //   radarPolygon.setMap(null);
  //  radarPolygon = null;
  // }

  // ✅ 경로보기 모드에서도 내 레이더 강제 표시
  if (viewMode === "paths" && radarTargetMarker) {
    const pos = radarTargetMarker.getPosition().toJSON();
    updateRadarPolygon(pos, 0);
  }

  // ✅ 특정 모드에서는 자동 갱신 중지
  if (viewMode === "current" || viewMode === "all" || viewMode === "paths") {
    stopAutoRefresh();
  } else {
    startAutoRefresh();
  }

// ---------------------- path 배열 변환 ----------------------
function parsePathArray(pathArray) {
  const points = [];
  for (let i = 0; i < pathArray.length; i += 2) {
    const lat = parseFloat(pathArray[i]);
    const lng = parseFloat(pathArray[i+1]);
    if (!isNaN(lat) && !isNaN(lng)) {
      points.push({ lat, lng });
    }
  }
  return points;
}

// ---------------------- 경로 그리기 ----------------------
// ✅ isMyPath 파라미터를 추가해서 내 계정인지 아닌지 구분
function drawPath(points, distanceKm, isMyPath = false) {
  if (!map || !points || points.length === 0) return;

  // ✅ 기존 경로 지우기
  polylines.forEach(line => line.setMap(null));
  polylines = [];

  // ✅ 구간별 Polyline 생성
  for (let i = 1; i < points.length; i++) {
    const start = new google.maps.LatLng(points[i-1].lat, points[i-1].lng);
    const end = new google.maps.LatLng(points[i].lat, points[i].lng);

    // ✅ 내 계정이면 파란색, 다른 사람은 노란색
    const color = isMyPath ? "#0000FF" : "#0000FF";

    const segment = new google.maps.Polyline({
      path: [points[i-1], points[i]], // 두 점을 연결
      geodesic: true,
      strokeColor: color,             // 색상 구분 적용
      strokeOpacity: 1.0,
      strokeWeight: 5,                // 선 두께
      map: map
    });

    segment.setMap(map);
    polylines.push(segment);
  }
}

function updateUserPanelContent(viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  if (!tbody) return;
  tbody.innerHTML = "";

  let users = [];

  if (viewMode === "current") {
    // ✅ 최근 5분 이내 접속자만 추출
    const now = new Date();
    const latestByUser = {};
    allData.forEach(user => {
      const updated = new Date(user.updated);
      if (now - updated <= 5 * 60 * 1000) {
        const key = user.phone;
        if (!latestByUser[key] || updated > new Date(latestByUser[key].updated)) {
          latestByUser[key] = user;
        }
      }
    });
    users = Object.values(latestByUser);

  } else if (viewMode === "all") {
    // ✅ 전체 사용자
    users = allData;

  } else if (viewMode === "paths") {
    // ✅ 전체 사용자 경로
    users = allData;
    users.forEach(user => {
      const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];
      user.distance = 0;
      if (pathPoints.length > 1) {
        for (let i = 1; i < pathPoints.length; i++) {
          user.distance += calculateDistance(
            pathPoints[i-1].lat, pathPoints[i-1].lng,
            pathPoints[i].lat, pathPoints[i].lng
          );
        }
      }
      if (pathPoints.length > 0) {
        drawPath(pathPoints, user.distance);
      }
    });
  }

  updateTableHeader(viewMode);
  renderUserTable(users, viewMode); // ✅ 항상 전체 목록 출력
}

// ---------------------- 관리자 모드 위치 추적 ----------------------
// 특징: 지도 중심은 고정, 마커만 움직임, 방향 레이더(부채꼴) 표시
// ✅ 기본 반경은 50m, 단위는 m (필요시 km로 표시 가능)

// ---------------------- 관리자 모드 위치 추적 ----------------------
// ✅ 단위 변환 함수 (미터 → 도 단위)
function convertToDegrees(meters) {
  return meters / 111000; // 1도 ≈ 111,000m
}

// ✅ 레이더 갱신 함수
function updateRadarPolygon(myPos, heading) {
  if (!radarEnabled) {
    if (radarPolygon) radarPolygon.setMap(null);
    return;
  }

  const angle = 90; // ✅ 레이더 각도 (좌우 45도)
  const points = [];
  const radiusInDegrees = convertToDegrees(radarRadiusMeters);

  // ✅ 레이더 부채꼴 좌표 계산
  for (let a = -angle/2; a <= angle/2; a += 5) {
    const rad = (heading + a) * Math.PI / 180;
    const latOffset = radiusInDegrees * Math.cos(rad);
    const lngOffset = radiusInDegrees * Math.sin(rad);
    points.push({
      lat: myPos.lat + latOffset,
      lng: myPos.lng + lngOffset
    });
  }

  // ✅ 중심점(레이더 대상 사용자 마커 위치) 추가
  points.unshift(myPos);

  if (radarPolygon) {
    radarPolygon.setPath(points); 
    radarPolygon.setMap(map);
  } else {
    radarPolygon = new google.maps.Polygon({
      paths: points,
      strokeColor: "#00BFFF",   // ✅ 레이더 테두리 색
      strokeOpacity: 0.8,
      strokeWeight: 5,
      fillColor: "#00BFFF",     // ✅ 레이더 내부 색
      fillOpacity: 0.25,
      map: map
    });
  }
}


// ---------------------- 내 위치 추적 ----------------------
// 특징: 내 위치는 항상 레이더 표시
// 서버 기록은 이미 1분마다 자동으로 처리되므로 여기서는 중복 호출하지 않음

      const heading = pos.coords.heading || 0;

      // ⚠️ 서버 기록은 이미 1분마다 자동으로 되고 있음

      if (radarTargetMarker) {

        radarTargetMarker.setPosition(myPos);

        // ✅ 내 위치에는 항상 레이더 붙이기
        updateRadarPolygon(myPos, heading);

        // ✅ 레이더 탐지 (POI 탐색)도 내 위치 기준으로 항상 실행

    },

    { enableHighAccuracy: true } // ✅ 고정밀 위치 추적 옵션
  );
}


    
// ---------------------- 슬라이더/단위 변경 + 버튼 + on/off ----------------------
document.addEventListener("DOMContentLoaded", () => {
  const slider = document.getElementById("radiusSlider");
  const radiusValue = document.getElementById("radiusValue");
  const radiusUnitSelect = document.getElementById("radiusUnit");
  const radarToggle = document.getElementById("radarToggle");
  const btnIncrease = document.getElementById("btnIncrease"); // ➕ 버튼
  const btnDecrease = document.getElementById("btnDecrease"); // ➖ 버튼

  // ✅ 슬라이더는 항상 미터 단위 (min=1, max=300000 → 300km)
  if (slider) {
    slider.min = 1;
    slider.max = 300000;
    slider.value = radarRadiusMeters;

    slider.addEventListener("input", (e) => {
      radarRadiusMeters = parseInt(e.target.value, 10);
      updateDisplay();
      if (radarTargetMarker) {   // ✅ 수정
        const pos = radarTargetMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ 단위 변경
  if (radiusUnitSelect) {
    radiusUnitSelect.addEventListener("change", (e) => {
      radarUnit = e.target.value;
      updateDisplay();
      if (radarTargetMarker) {   // ✅ 수정
        const pos = radarTargetMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ on/off 버튼
  if (radarToggle) {
    radarToggle.addEventListener("change", (e) => {
      radarEnabled = e.target.checked;
      if (!radarEnabled && radarPolygon) {
        radarPolygon.setMap(null);
      } else if (radarEnabled && radarTargetMarker) {   // ✅ 수정
        const pos = radarTargetMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ ➕ 버튼 (미세조정: 50m씩 증가)
  if (btnIncrease) {
    btnIncrease.addEventListener("click", () => {
      radarRadiusMeters += 50;
      if (radarRadiusMeters > 300000) radarRadiusMeters = 300000;
      slider.value = radarRadiusMeters; // ✅ 슬라이더 값도 갱신
      updateDisplay();
      if (radarTargetMarker) {   // ✅ 수정
        const pos = radarTargetMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ ➖ 버튼 (미세조정: 50m씩 감소)
  if (btnDecrease) {
    btnDecrease.addEventListener("click", () => {
      radarRadiusMeters -= 50;
      if (radarRadiusMeters < 1) radarRadiusMeters = 1;
      slider.value = radarRadiusMeters; // ✅ 슬라이더 값도 갱신
      updateDisplay();
      if (radarTargetMarker) {   // ✅ 수정
        const pos = radarTargetMarker.getPosition().toJSON();
        updateRadarPolygon(pos, 0);
      }
    });
  }

  // ✅ 표시 업데이트 함수
  function updateDisplay() {
    if (radiusUnit === "m") {
      radiusValue.textContent = radarRadiusMeters + " m";
    } else {
      radiusValue.textContent = (radarRadiusMeters / 1000).toFixed(1) + " km";
    }
  }

  updateDisplay();
});

    
/* ---------------------- 한국표준시 변환 ---------------------- */  
function formatToKST(isoString) {
  if (!isoString) return "-";
  const date = new Date(isoString);
  return date.toLocaleString("ko-KR", {
    timeZone: "Asia/Seoul",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

window.renderUserTable = function(users, viewMode = "current") {
  const tbody = document.getElementById("user-table-body");
  tbody.innerHTML = "";

  // ✅ DocumentFragment 사용 → 성능 최적화 (1000명도 문제 없음)
  const fragment = document.createDocumentFragment();

  users.forEach(user => {
    const row = document.createElement("tr");
    row.style.cursor = "pointer";

    // ✅ 사용자 상태 계산
    const status = getUserStatus(user);

    // ✅ path 배열 파싱 (경로보기 모드일 때만 의미 있음)
    const pathPoints = Array.isArray(user.path) ? parsePathArray(user.path) : [];

    // ✅ 최초 path 기록 시각을 startTime으로 저장
    //    - 로그인 직후 path가 처음 기록될 때만 startTime을 설정
    if (!user.startTime && pathPoints.length > 0) {
      user.startTime = new Date(user.time); // 최초 path 기록 시각
    }

    // ✅ 총 이동시간 계산 (startTime vs updated)
    let totalTime = 0;
    if (user.startTime && user.updated) {
      const startTime = new Date(user.startTime);
      const endTime   = new Date(user.updated);
      if (!isNaN(startTime) && !isNaN(endTime)) {
        const diffMinutes = (endTime - startTime) / 1000 / 60;
        totalTime = diffMinutes > 0 ? diffMinutes : 0;
      }
    }

    // ✅ 시간과 분으로 변환 (소수점 대신 "시간+분" 형식으로 표시)
    let timeText = "-";
    if (totalTime > 0) {
      const hours = Math.floor(totalTime / 60);       // 총 시간
      const minutes = Math.floor(totalTime % 60);     // 남은 분
      timeText = hours > 0 ? `${hours}시간 ${minutes}분` : `${minutes}분`;
    }

    // ✅ 총 이동거리 계산
    let distanceKm = 0;
    if (pathPoints.length > 1) {
      for (let i = 1; i < pathPoints.length; i++) {
        distanceKm += calculateDistance(
          pathPoints[i-1].lat, pathPoints[i-1].lng,
          pathPoints[i].lat, pathPoints[i].lng
        );
      }
    }

    if (viewMode === "paths") {
      // ✅ 경로보기 모드 → 이동거리/총 이동시간 표시
      row.innerHTML = `
        <td>${user.phone || "-"}</td>
        <td>${distanceKm ? distanceKm.toFixed(2) + " km" : "-"}</td>   <!-- 총 이동거리 -->
        <td>${user.startTime ? formatToKST(user.startTime) : "-"}</td> <!-- 최초 path 기록 시각 -->
        <td>${user.updated ? formatToKST(user.updated) : "-"}</td>     <!-- 마지막 갱신 시각 -->

    row.addEventListener("click", () => {
      if (user.lat && user.lng) {
        clearMarkers();
        polylines.forEach(line => line.setMap(null));
        polylines = [];

        const marker = new google.maps.Marker({
          position: { lat: user.lat, lng: user.lng },
          map,
          title: `사용자: ${user.phone}`,
          animation: google.maps.Animation.BOUNCE
        });
        markers.push(marker);
        map.setCenter({ lat: user.lat, lng: user.lng });
        map.setZoom(15);

        if (viewMode === "paths" && user.path && user.path.length > 0) {
          const pathPoints = parsePathArray(user.path);
          if (pathPoints.length > 1) {
            drawPath(pathPoints, distanceKm); // ✅ 경로 그리기 + 이동거리 전달
          }
        }
      }
    });

    fragment.appendChild(row);
  });

  // ✅ 마지막에 한 번만 DOM 갱신
  tbody.appendChild(fragment);
};

// ---------------------- 드래그 기능 (locationBox) ----------------------
function makeDraggable(element) {
  let offsetX = 0, offsetY = 0, isDown = false;

  // ▶ PC 드래그 시작
  element.addEventListener('mousedown', (e) => {
    isDown = true;
    offsetX = e.clientX - element.offsetLeft;
    offsetY = e.clientY - element.offsetTop;
    element.style.right = ""; // 오른쪽 고정 해제
  });

  // ▶ PC 드래그 종료
  document.addEventListener('mouseup', () => { isDown = false; });

  // ▶ PC 드래그 이동
  document.addEventListener('mousemove', (e) => {
    if (isDown) {
      element.style.left = (e.clientX - offsetX) + 'px';
      element.style.top = (e.clientY - offsetY) + 'px';
    }
  });

  // ▶ 모바일 드래그 시작
  element.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    offsetX = touch.clientX - element.offsetLeft;
    offsetY = touch.clientY - element.offsetTop;
    element.style.right = "";
    isDown = true;
  });

  // ▶ 모바일 드래그 종료
  document.addEventListener('touchend', () => { isDown = false; });

  // ▶ 모바일 드래그 이동
  document.addEventListener('touchmove', (e) => {
    if (isDown) {
      const t = e.touches[0];
      element.style.left = (t.clientX - offsetX) + 'px';
      element.style.top = (t.clientY - offsetY) + 'px';
    }
  });
}

// ---------------------- 패널 드래그 + Snap ----------------------
function makePanelDraggable(panelId) {
  const panel = document.getElementById(panelId);
  const header = panel.querySelector(".panel-header"); // 헤더만 드래그 핸들로 지정
  let isDragging = false, offsetX = 0, offsetY = 0;

  // ▶ PC 드래그 시작
  header.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  });

  // ▶ PC 드래그 이동
  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      panel.style.left = (e.clientX - offsetX) + "px";
      panel.style.top = (e.clientY - offsetY) + "px";
    }
  });

  // ▶ PC 드래그 종료 + Snap 처리
  document.addEventListener("mouseup", () => {
    if (isDragging) {
      isDragging = false;
      const rect = panel.getBoundingClientRect();
      if (rect.left < 50) {
        // 좌측 Snap
        panel.style.left = "0px"; panel.style.right = "auto";
        panel.classList.add("snap-left"); panel.classList.remove("snap-right");
      } else if (window.innerWidth - rect.right < 50) {
        // 우측 Snap → collapsed 상태로 숨김
        panel.style.right = "0px"; panel.style.left = "auto";
        panel.classList.add("collapsed", "snap-right");
        panel.classList.remove("snap-left");
      } else {
        panel.classList.remove("snap-left", "snap-right");
      }
    }
  });

  // ▶ 모바일 드래그 시작
  header.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    offsetX = touch.clientX - panel.offsetLeft;
    offsetY = touch.clientY - panel.offsetTop;
    isDragging = true;
  });

  // ▶ 모바일 드래그 이동
  document.addEventListener("touchmove", (e) => {
    if (isDragging) {
      const t = e.touches[0];
      panel.style.left = (t.clientX - offsetX) + "px";
      panel.style.top = (t.clientY - offsetY) + "px";
    }
  });

  // ▶ 모바일 드래그 종료 + Snap 처리
  document.addEventListener("touchend", () => {
    if (isDragging) {
      isDragging = false;
      const rect = panel.getBoundingClientRect();
      if (rect.left < 50) {
        panel.style.left = "0px"; panel.style.right = "auto";
        panel.classList.add("snap-left"); panel.classList.remove("snap-right");
      } else if (window.innerWidth - rect.right < 50) {
        panel.style.right = "0px"; panel.style.left = "auto";
        panel.classList.add("collapsed", "snap-right");
        panel.classList.remove("snap-left");
      } else {
        panel.classList.remove("snap-left", "snap-right");
      }
    }
  });
}

// ---------------------- 네 면 리사이즈 ----------------------
function makeResizable(panelId) {
  const panel = document.getElementById(panelId);
  const handles = panel.querySelectorAll(".resize-handle");
  let isResizing = false, currentHandle = null;

  function getHandleType(handle) {
    if (handle.classList.contains("left")) return "left";
    if (handle.classList.contains("right")) return "right";
    if (handle.classList.contains("top")) return "top";
    return "bottom";
  }

  // ▶ PC 리사이즈 시작
  handles.forEach(handle => {
    handle.addEventListener("mousedown", () => {
      isResizing = true; currentHandle = getHandleType(handle);
      document.body.style.userSelect = "none";
    });
  });

  // ▶ PC 리사이즈 이동
  document.addEventListener("mousemove", (e) => {
    if (!isResizing) return;
    const rect = panel.getBoundingClientRect();
    if (currentHandle === "right") {
      const newWidth = e.clientX - rect.left;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "left") {
      const newWidth = rect.right - e.clientX;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "bottom") {
      const newHeight = e.clientY - rect.top;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    } else if (currentHandle === "top") {
      const newHeight = rect.bottom - e.clientY;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    }
  });

  // ▶ PC 리사이즈 종료
  document.addEventListener("mouseup", () => {
    isResizing = false; document.body.style.userSelect = "auto";
  });

  // ▶ 모바일 리사이즈 시작
  handles.forEach(handle => {
    handle.addEventListener("touchstart", () => {
      isResizing = true; currentHandle = getHandleType(handle);
      document.body.style.userSelect = "none";
    });
  });

  // ▶ 모바일 리사이즈 이동
  document.addEventListener("touchmove", (e) => {
    if (!isResizing) return;
    const t = e.touches[0];
    const rect = panel.getBoundingClientRect();

    if (currentHandle === "right") {
      const newWidth = t.clientX - rect.left;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "left") {
      const newWidth = rect.right - t.clientX;
      if (newWidth > 200) panel.style.width = newWidth + "px";
    } else if (currentHandle === "bottom") {
      const newHeight = t.clientY - rect.top;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    } else if (currentHandle === "top") {
      const newHeight = rect.bottom - t.clientY;
      if (newHeight > 100) panel.style.height = newHeight + "px";
    }
  });

  // ▶ 모바일 리사이즈 종료
  document.addEventListener("touchend", () => {
    isResizing = false;
    document.body.style.userSelect = "auto";
  });
}

document.addEventListener("DOMContentLoaded", () => {
  const panel = document.getElementById("user-panel");
  const maximizeBtn = document.getElementById("maximize-btn");
  const minimizeBtn = document.getElementById("minimize-btn");
  const closeBtn = document.getElementById("close-user-panel");
  const leftEdge = document.getElementById("left-edge");
  const rightEdge = document.getElementById("right-edge");

  // ---------------------- 최소화 버튼 ----------------------
  minimizeBtn.addEventListener("click", () => {
    // 모든 상태 초기화
    panel.classList.remove("maximized", "collapsed-left", "collapsed-right", "touch-active");

    if (panel.classList.contains("snap-left")) {
      panel.classList.add("collapsed-left");
    } else {
      panel.classList.add("collapsed-right");
    }

    // 인라인 스타일 제거 → CSS 규칙만 적용
    panel.style = "";
  });

  // ---------------------- 최대화 버튼 ----------------------
  maximizeBtn.addEventListener("click", () => {
    if (panel.classList.contains("maximized")) {
      panel.classList.remove("maximized");
      if (panel.classList.contains("snap-left")) {
        panel.classList.add("collapsed-left");
      } else {
        panel.classList.add("collapsed-right");
      }
      panel.style = "";
    } else if (panel.classList.contains("collapsed-left") || panel.classList.contains("collapsed-right")) {
      panel.classList.remove("collapsed-left", "collapsed-right");
      if (window.innerWidth <= 768) {
        panel.style.width = "100%";
        panel.style.height = "40%";
        panel.style.top = "auto";
        panel.style.bottom = "0";
        panel.style.left = "0";
        panel.style.right = "0";
      } else {
        panel.style.width = "600px";
        panel.style.height = "calc(100% - 50px)";
        panel.style.top = "50px";
        panel.style.right = "0";
        panel.style.left = "auto";
        panel.style.bottom = "auto";
      }
    } else {
      panel.classList.add("maximized");
      panel.style.width = "100%";
      panel.style.height = "100%";
      panel.style.top = "0";
      panel.style.left = "0";
      panel.style.right = "0";
      panel.style.bottom = "0";
    }
  });

  // ---------------------- 닫기 버튼 ----------------------
  closeBtn.addEventListener("click", () => {
    panel.classList.remove(
      "open",
      "collapsed-left",
      "collapsed-right",
      "maximized",
      "snap-left",
      "snap-right",
      "touch-active"
    );
    panel.style = "";
  });

  // ---------------------- 끝부분 이벤트 처리 ----------------------
  if (leftEdge) {
    leftEdge.addEventListener("mouseenter", () => {
      if (panel.classList.contains("collapsed-left")) {
        panel.classList.add("touch-active");
      }
    });
    leftEdge.addEventListener("touchstart", () => {
      if (panel.classList.contains("collapsed-left")) {
        panel.classList.add("touch-active");
      }
    });
  }

  if (rightEdge) {
    rightEdge.addEventListener("mouseenter", () => {
      if (panel.classList.contains("collapsed-right")) {
        panel.classList.add("touch-active");
      }
    });
    rightEdge.addEventListener("touchstart", () => {
      if (panel.classList.contains("collapsed-right")) {
        panel.classList.add("touch-active");
      }
    });
  }

  // ---------------------- 드래그 + Snap 기능 적용 ----------------------
  makePanelDraggable("user-panel");

  // ---------------------- 네 면 리사이즈 기능 적용 ----------------------
  makeResizable("user-panel");
});

  // ---------------------- 드래그 가능 함수 ----------------------
  function makeDraggableAndResizable(element) {
    let isDragging = false, offsetX, offsetY;

    element.addEventListener('mousedown', e => {
      isDragging = true;
      offsetX = e.clientX - element.offsetLeft;
      offsetY = e.clientY - element.offsetTop;
      element.style.right = "";
    });

    document.addEventListener('mousemove', e => {
      if (isDragging) {
        let newLeft = e.clientX - offsetX;
        let newTop = e.clientY - offsetY;

        // 화면 경계 체크
        newLeft = Math.max(0, Math.min(window.innerWidth - element.offsetWidth, newLeft));
        newTop = Math.max(0, Math.min(window.innerHeight - element.offsetHeight, newTop));

        element.style.left = newLeft + 'px';
        element.style.top = newTop + 'px';
      }
    });

    document.addEventListener('mouseup', () => isDragging = false);

    // 모바일 터치
    element.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true;
        offsetX = e.touches[0].clientX - element.offsetLeft;
        offsetY = e.touches[0].clientY - element.offsetTop;
        element.style.right = "";
      }
    });

    document.addEventListener('touchmove', e => {
      if (isDragging && e.touches.length === 1) {
        let newLeft = e.touches[0].clientX - offsetX;
        let newTop = e.touches[0].clientY - offsetY;

        newLeft = Math.max(0, Math.min(window.innerWidth - element.offsetWidth, newLeft));
        newTop = Math.max(0, Math.min(window.innerHeight - element.offsetHeight, newTop));

        element.style.left = newLeft + 'px';
        element.style.top = newTop + 'px';
      }
    });

    document.addEventListener('touchend', () => isDragging = false);
  }

  // 적용
  makeDraggableAndResizable(toggleBtn);
});

      <select id="radiusUnit">
        <option value="m" selected>m</option>
        <option value="km">km</option>
      </select>
    </div>
    <div style="display:flex; align-items:center; gap:10px; margin-top:8px;">
      <button id="btnDecrease" style="font-size:18px; padding:6px 12px;">➖ 줄이기</button>
      <button id="btnIncrease" style="font-size:18px; padding:6px 12px;">➕ 늘리기</button>
    </div>
  </div>

  <!-- 마커 클러스터링 옵션 -->
  <div class="dropdown-item">
    <label><input type="checkbox" id="clusterOption" checked> 마커 클러스터링</label>
  </div>

  <!-- 최근 50개 데이터만 표시 옵션 -->
  <div class="dropdown-item">
    <label><input type="checkbox" id="limitOption" checked> 최근 50개 데이터만 표시</label>
  </div>
</div>


<!-- 실시간 위치공유 -->
<header>📍 A-DOMES | 관리자 위치 공유 시스템</header>

<!-- ✅ 좌표 창 -->
<div id="locationBox">
  <div id="locationHeader">
    <h3>📍 현 재 좌 표</h3>
    <button id="closeBtn">×</button>
  </div>
  <div id="locationContent">
    <div id="loadingMessage">위치 정보를 가져오는 중...</div>
    <span id="latBox"></span>
    <span id="lngBox"></span>
    <small id="directionBox"></small>
    <small id="timeBox"></small>
    <div id="addressBox"></div>
  </div>
  <button id="shareBtn">📌 현재 위치 공유</button>
</div>

<!-- ✅ 좌표창 다시 열기 버튼 -->
<div id="reopenBtn">현재 좌표 열기</div>

<!-- ✅ 지도 영역 -->
<div id="map"></div>

<!-- ✅ 좌표 표시 영역 -->
<div id="locationDisplay"></div>

<!-- ✅ 공유 팝업 -->
<div id="popupMessage" style="display:none; opacity:0;">
  📍 현재 위치 링크가 복사되었습니다.<br>
  원하는 앱에 붙여넣어 공유하세요.
</div>

<!-- ✅ 알림음 -->
<audio id="notifySound" src="notify.mp3" preload="auto"></audio>

<!-- ✅ 사용자 패널 컨테이너 -->
<div class="panel-container">
  <div id="left-edge"></div>
  <div id="right-edge"></div>

  <div id="user-panel">
    <div class="panel-header">
      <h3 id="user-panel-title">사용자 정보</h3>
      <div class="panel-controls">
        <button id="minimize-btn">━</button>
        <button id="maximize-btn">⬜</button>
        <button id="close-user-panel">✖ 닫기</button>
      </div>
    </div>
    <div class="panel-content">
      <div id="path-select-container">
        <label for="path-user-select">경로 보기 선택:</label>
        <select id="path-user-select" onchange="updateUserPanelContent('paths')">
          <option value="all">전체</option>
        </select>
      </div>
      <div id="user-content">
        <table id="user-table">
          <thead><tr id="user-table-header"></tr></thead>
          <tbody id="user-table-body"></tbody>
        </table>
      </div>
    </div>
    <div class="resize-handle left"></div>
    <div class="resize-handle right"></div>
    <div class="resize-handle top"></div>
    <div class="resize-handle bottom"></div>
  </div>
</div>

<!-- ✅ 메시지 박스 -->
<div id="message-box"></div>

</script>

<div id="toggleFollowBtn">
  <span class="icon">👤</span>
  <span class="label">사람중심</span>
</div>
